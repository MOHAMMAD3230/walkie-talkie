<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM v10.8 | PRO_TACTICAL</title>
    <script src="https://cdn.jsdelivr.net/npm/mqtt@5.10.4/dist/mqtt.min.js"></script>
    <style>
        :root{--neon-g:#39ff14;--neon-b:#00d4ff;--neon-r:#ff3131;--neon-y:#ffcc00;--case:#111;--metal:#2a2a2a}
        *{box-sizing: border-box; touch-action: manipulation;}
        body{background:#000;color:var(--neon-g);font-family:'Courier New',monospace;margin:0;overflow:hidden;display:flex;justify-content:center;align-items:center;min-height:100vh}
        
        #scannerCanvas{position:fixed;inset:0;z-index:-1;opacity:0.12}

        /* Rugged Industrial Chassis */
        .chassis {
            width: 92vw; max-width: 320px; background: var(--case);
            border: 8px solid #222; border-radius: 30px 30px 50px 50px;
            padding: 15px; box-shadow: inset 0 0 40px #000, 0 30px 60px #000;
            position: relative; border-bottom: 15px solid #0a0a0a;
        }

        /* Hardware Details */
        .antenna {position:absolute; top:-45px; left:30px; width:15px; height:60px; background:#111; border-radius:5px; border:2px solid #222}
        .knob {position:absolute; top:-25px; right:40px; width:40px; height:35px; background:linear-gradient(90deg, #111, #333, #111); border-radius:5px; border:2px solid #222}

        /* LED Status Cluster */
        .led-cluster {display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; padding: 0 10px;}
        .led { width: 10px; height: 10px; border-radius: 50%; background: #1a0000; transition: 0.3s; }
        .blink {animation: led-blink 0.6s infinite;}
        @keyframes led-blink { 50% { opacity: 0.2; } }

        /* Small Power Buttons */
        .power-strip {display:flex; gap:8px; margin-bottom:12px; justify-content: center;}
        .pwr-btn {
            width: 80px; padding: 6px; font-family:inherit; font-weight:900; font-size:0.6rem;
            cursor:pointer; border:2px solid #333; text-transform:uppercase; background:#050505;
            transition: 0.2s; color: #444;
        }
        .pwr-on.active { color: var(--neon-g); border-color: var(--neon-g); box-shadow: 0 0 10px var(--neon-g); }
        .pwr-off.active { color: var(--neon-r); border-color: var(--neon-r); box-shadow: 0 0 10px var(--neon-r); }

        /* Constant Hardware Screen */
        .screen-frame {
            background: #050505; border: 5px solid #2a2a2a; border-radius: 8px; padding: 8px;
            margin-bottom: 15px; position: relative; height: 140px;
            box-shadow: inset 0 0 15px #000; transition: background 0.4s;
        }
        .lit.screen-frame { background: #001200; border-color: #3a3a3a; box-shadow: inset 0 0 30px rgba(0,255,0,0.1); }
        
        #scope {width:100%; height:60px; opacity:0; transition: opacity 0.5s}
        .lit #scope {opacity:1}

        .monitor {
            height: 50px; overflow-y:auto; font-size:0.65rem; font-weight:bold; 
            padding:5px; scrollbar-width:none; opacity:0; line-height:1.2;
        }
        .lit .monitor {opacity:1}

        /* Control Input Grid */
        .input-grid {display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 12px;}
        .field { background:#000; border:1px solid #333; color:var(--neon-b); padding:6px; font-family:inherit; font-size:0.8rem; font-weight:bold; text-align:center; width:100%; }
        .link-btn { padding:8px; font-family:inherit; font-weight:900; font-size:0.65rem; cursor:pointer; border:1px solid #444; background:#0a0a0a; color:#555; text-transform:uppercase; }
        .active-link { border-color: var(--neon-b); color: var(--neon-b); box-shadow: 0 0 8px var(--neon-b); }

        /* PTT Hardware Button */
        .ptt-wrap { background: #111; padding: 10px; border-radius: 50%; width: 110px; height: 110px; margin: 0 auto; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px #000;}
        .ptt-btn {
            width:90px; height:90px; background:#1a0000; border:4px solid #300; 
            border-radius:50%; color:#300; font-weight:900; font-size:1.1rem; 
            cursor:pointer; transition: 0.1s;
        }
        .ptt-btn.ready { border-color: var(--neon-r); color: var(--neon-r); box-shadow: 0 0 15px rgba(255,0,0,0.2); }
        .ptt-btn:active:not(:disabled) { background:var(--neon-r); color:#000; transform: scale(0.95); }

        .footer {margin-top:15px; font-size:0.5rem; font-weight:bold; display:flex; justify-content:space-between; color:#333; border-top: 1px solid #222; padding-top: 5px;}
    </style>
</head>
<body>

<canvas id="scannerCanvas"></canvas>

<div class="chassis">
    <div class="antenna"></div>
    <div class="knob"></div>

    <div class="led-cluster">
        <span style="font-size:0.5rem; color:#444">LINK_STATE:</span>
        <div id="statusLed" class="led"></div>
    </div>

    <div class="power-strip">
        <button id="bOn" class="pwr-btn pwr-on" onclick="pwr(true)">ON</button>
        <button id="bOff" class="pwr-btn pwr-off active" onclick="pwr(false)">OFF</button>
    </div>

    <div class="screen-frame" id="scr">
        <div style="font-size: 0.5rem; color: #222; margin-bottom: 2px;">V_OSCILLOSCOPE</div>
        <canvas id="scope"></canvas>
        <div id="sys" class="monitor" style="color:var(--neon-g)"></div>
    </div>

    <div class="input-grid">
        <input type="number" id="ch" class="field" value="88">
        <input type="password" id="key" class="field" value="TAC">
        <button id="hBtn" class="link-btn" onclick="conn('host')">Host</button>
        <button id="jBtn" class="link-btn" onclick="conn('client')">Join</button>
    </div>

    <div class="ptt-wrap">
        <button id="ptt" class="ptt-btn" disabled>TALK</button>
    </div>

    <div class="footer">
        <span>RF_LINK: <span id="mSt" style="color:#555">DISCONNECTED</span></span>
        <span>DROP: <span id="dSt" style="color:#555">0</span></span>
    </div>
</div>

<script>
let mc, mic, actx, ana, pG, ck, isTx=false, nxt=0, isPwr=false;
const SR=12000, TP='tactical_v10_8/';

function setLed(mode) {
    const led = document.getElementById('statusLed');
    led.className = "led blink";
    if(mode === 'red') led.style.background = "var(--neon-r)", led.style.boxShadow = "0 0 10px var(--neon-r)";
    if(mode === 'orange') led.style.background = "var(--neon-y)", led.style.boxShadow = "0 0 10px var(--neon-y)";
    if(mode === 'green') led.style.background = "var(--neon-g)", led.style.boxShadow = "0 0 10px var(--neon-g)";
    if(mode === 'off') led.className = "led", led.style.background = "#1a0000", led.style.boxShadow = "none";
}

function pwr(s) {
    isPwr = s;
    const scr = document.getElementById('scr');
    document.getElementById('bOn').classList.toggle('active', s);
    document.getElementById('bOff').classList.toggle('active', !s);
    
    if(s) {
        scr.classList.add('lit');
        setLed('red');
        log("SYS_START...");
    } else {
        scr.classList.remove('lit');
        setLed('off');
        if(mc) mc.end(); if(mic) mic.getTracks().forEach(t=>t.stop());
        document.getElementById('ptt').disabled = true;
        document.getElementById('ptt').classList.remove('ready');
        document.getElementById('hBtn').classList.remove('active-link');
        document.getElementById('jBtn').classList.remove('active-link');
        document.getElementById('mSt').innerText = "DISCONNECTED";
        document.getElementById('mSt').style.color = "#555";
    }
}

function log(m) {
    const el = document.getElementById("sys");
    const d = document.createElement('div');
    d.innerText = `> ${m}`;
    el.appendChild(d); el.scrollTop = el.scrollHeight;
}

// ═══ BG & SCOPE ═══
const bcvs = document.getElementById('scannerCanvas');
const bctx = bcvs.getContext('2d');
let bgCols = [];
function initBg() {
    bcvs.width = window.innerWidth; bcvs.height = window.innerHeight;
    bgCols = new Array(Math.floor(bcvs.width/20)).fill(0).map(()=>Math.random()*bcvs.height);
}
window.onresize = initBg; initBg();

function draw() {
    bctx.fillStyle = 'rgba(0,0,0,0.12)'; bctx.fillRect(0,0,bcvs.width,bcvs.height);
    bctx.font = 'bold 12px monospace'; bctx.fillStyle = '#020';
    bgCols.forEach((y, i) => {
        bctx.fillText(Math.random()>0.8?"1":"0", i*20, y);
        bgCols[i] = y > bcvs.height ? 0 : y + 12;
    });
    
    if(ana && isPwr) {
        const scvs = document.getElementById('scope');
        const sctx = scvs.getContext('2d');
        const data = new Uint8Array(ana.frequencyBinCount);
        ana.getByteTimeDomainData(data);
        sctx.clearRect(0,0,scvs.width,scvs.height);
        sctx.lineWidth = 3; sctx.strokeStyle = '#39ff14';
        sctx.beginPath();
        let x = 0; const step = scvs.width/data.length;
        for(let i=0; i<data.length; i++) {
            let v = data[i]/128.0; let y = v * scvs.height/2;
            if(i===0) sctx.moveTo(x,y); else sctx.lineTo(x,y);
            x += step;
        }
        sctx.stroke();
    }
    requestAnimationFrame(draw);
}
draw();

async function conn(role) {
    if(!isPwr) return;
    setLed('orange');
    document.getElementById(role==='host'?'hBtn':'jBtn').classList.add('active-link');
    const channel = document.getElementById('ch').value;
    const pass = document.getElementById('key').value;
    
    try {
        mic = await navigator.mediaDevices.getUserMedia({audio:true});
        actx = new (window.AudioContext || window.webkitAudioContext)();
        const src = actx.createMediaStreamSource(mic);
        ana = actx.createAnalyser(); src.connect(ana);
        const proc = actx.createScriptProcessor(2048, 1, 1);
        proc.onaudioprocess = (e) => { if(isTx) transmit(e.inputBuffer.getChannelData(0), channel, role); };
        ana.connect(proc); proc.connect(actx.destination);
        pG = actx.createGain(); pG.gain.value = 2.0; pG.connect(actx.destination);

        const enc = new TextEncoder();
        const km = await crypto.subtle.importKey('raw', enc.encode(pass), 'PBKDF2', false, ['deriveKey']);
        ck = await crypto.subtle.deriveKey({name:'PBKDF2', salt:enc.encode('X'), iterations:1000, hash:'SHA-256'}, km, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);

        mc = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        mc.on('connect', () => {
            setLed('green');
            document.getElementById('mSt').innerText = "SECURE_LINK";
            document.getElementById('mSt').style.color = "var(--neon-g)";
            document.getElementById('ptt').disabled = false;
            document.getElementById('ptt').classList.add('ready');
            mc.subscribe(`${TP}${channel}/${role==='host'?'client':'host'}`);
            log("UPLINK_SUCCESS");
        });

        mc.on('message', async (t, pay) => {
            try {
                const iv = pay.slice(0, 12);
                const dec = await crypto.subtle.decrypt({name:'AES-GCM', iv}, ck, pay.slice(12));
                play(dec);
            } catch(e) { }
        });

        const ptt = document.getElementById('ptt');
        const down = (e) => { e.preventDefault(); isTx = true; };
        const up = (e) => { e.preventDefault(); isTx = false; };
        ptt.onmousedown = down; ptt.onmouseup = up;
        ptt.ontouchstart = down; ptt.ontouchend = up;

    } catch(err) { setLed('red'); log("FAIL: ACCESS"); }
}

async function transmit(samples, ch, role) {
    const i16 = new Int16Array(samples.length);
    for(let i=0; i<samples.length; i++) i16[i] = samples[i] * 32767;
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = await crypto.subtle.encrypt({name:'AES-GCM', iv}, ck, i16.buffer);
    const pkt = new Uint8Array(12 + enc.byteLength);
    pkt.set(iv); pkt.set(new Uint8Array(enc), 12);
    mc.publish(`${TP}${ch}/${role}`, pkt);
}

function play(d) {
    const i16 = new Int16Array(d); const f32 = new Float32Array(i16.length);
    for(let i=0; i<i16.length; i++) f32[i] = i16[i] / 32768;
    const buffer = actx.createBuffer(1, f32.length, SR);
    buffer.getChannelData(0).set(f32);
    const src = actx.createBufferSource();
    src.buffer = buffer; src.connect(pG);
    let start = Math.max(actx.currentTime + 0.05, nxt);
    src.start(start); nxt = start + buffer.duration;
}
</script>
</body>
</html>
