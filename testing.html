<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 | CROSS-NETWORK FIXED</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --amber: #ffb000; --bg: #0d0900; --red: #8c3024; --blue: #00d4ff; --green: #39ff14; }
        body { background: #050505; color: var(--amber); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; touch-action: manipulation; overflow: hidden; }
        .mainframe { width: 95%; max-width: 850px; background: #222; border: 6px solid #111; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 0 60px #000; box-sizing: border-box; }
        @media (min-width: 768px) { .mainframe { display: grid; grid-template-columns: 1fr 320px; height: 680px; gap: 20px; } }
        .monitor { background: var(--bg); border: 10px solid #1a1a1a; border-radius: 15px; padding: 20px; flex-grow: 1; display: flex; flex-direction: column; box-shadow: inset 0 0 20px #000; }
        #output { height: 300px; overflow-y: auto; font-size: 0.78rem; scrollbar-width: none; border-bottom: 1px solid #333; margin-bottom: 12px; color: var(--amber); }
        .module { background: #111; padding: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .btn-ptt { width: 100%; height: 145px; background: var(--red); color: white; border: 5px solid #5e1e16; font-weight: bold; font-size: 1.35rem; cursor: pointer; transition: 0.1s; box-shadow: 0 6px 0 #401010; }
        .btn-ptt:active:not(:disabled) { background: #f00; transform: translateY(4px); box-shadow: 0 2px 0 #401010; }
        .btn-ptt:disabled { background: #333; opacity: 0.45; box-shadow: none; }
        .btn-action { width: 100%; padding: 11px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; font-weight: bold; font-size: 0.72rem; text-transform: uppercase; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--amber); padding: 10px; box-sizing: border-box; outline: none; text-align: center; font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 8px; }
        .status-led { width: 13px; height: 13px; border-radius: 50%; background: #200; display: inline-block; vertical-align: middle; }
        .online { background: var(--blue); box-shadow: 0 0 12px var(--blue); }
        .tx { background: #f00; box-shadow: 0 0 15px #f00; animation: pulse 0.7s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
        #meter { width: 100%; height: 11px; background: #000; border: 1px solid #333; margin-top: auto; }
        #meter-fill { width: 0%; height: 100%; background: var(--green); transition: width 0.08s linear; box-shadow: 0 0 10px var(--green); }
    </style>
</head>
<body>
<div class="mainframe">
    <div class="monitor">
        <div style="font-size: 0.65rem; display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>FREQ: <span id="curFreq" style="color:var(--blue)">UNSET</span></span>
            <span>UPLINK: <span id="stat">OFFLINE</span></span>
        </div>
        <div id="output"><div>> CROSS-NETWORK DEBUG MODE ACTIVE</div></div>
        <div id="meter"><div id="meter-fill"></div></div>
    </div>
    <div class="side-panel">
        <div class="module">
            <div style="font-size: 0.6rem; color: #555; margin-bottom: 5px;">CHANNEL (1-99)</div>
            <input type="number" id="chanInput" value="42" min="1" max="99">
            <div style="font-size: 0.6rem; color: #555; margin: 8px 0 5px;">SHARED SECRET</div>
            <input type="password" id="secretInput" value="tacsecure2026">
            <button class="btn-action" id="bootBtn" onclick="initChannel()" style="margin-top:8px; border-color:var(--green); color:var(--green);">INITIATE SECURE LINK</button>
        </div>
        <div class="module" style="text-align:center;">
            <button class="btn-ptt" id="pttBtn" disabled>HOLD TO TALK</button>
            <div style="margin-top:12px; font-size:0.55rem; display:flex; justify-content:space-around;">
                <span><div class="status-led" id="ledNet"></div> SYNC</span>
                <span><div class="status-led" id="ledTx"></div> TX</span>
            </div>
        </div>
        <button class="btn-action" onclick="location.reload()" style="background:#200; color:#fff;">HARD RESET</button>
    </div>
</div>

<script>
    let peer, conn, localStream, audioCtx, recorder, analyser, streamSource, cryptoKey;
    let isPTTActive = false;
    let reconnectAttempts = 0;
    const APP_PREFIX = "TAC-SECURE-V33-";

    function log(msg, color = "#ffb000") {
        const out = document.getElementById('output');
        const div = document.createElement('div');
        div.innerText = `> ${msg}`;
        div.style.color = color;
        out.appendChild(div);
        out.scrollTop = out.scrollHeight;
        console.log("[TAC]", msg);
    }

    async function deriveKey(password) {
        const enc = new TextEncoder();
        const base = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]);
        return crypto.subtle.deriveKey({ name: "PBKDF2", salt: enc.encode("tac-salt"), iterations: 100000, hash: "SHA-256" }, base, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
    }

    async function encryptData(data) {
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const enc = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, cryptoKey, data);
        const combined = new Uint8Array(12 + enc.byteLength);
        combined.set(iv); combined.set(new Uint8Array(enc), 12);
        return combined.buffer;
    }

    async function decryptData(buffer) {
        const data = new Uint8Array(buffer);
        const iv = data.slice(0, 12);
        const ct = data.slice(12);
        return crypto.subtle.decrypt({ name: "AES-GCM", iv }, cryptoKey, ct);
    }

    async function initChannel() {
        const chan = document.getElementById('chanInput').value.trim();
        const pass = document.getElementById('secretInput').value.trim();

        if (!chan || chan < 1 || chan > 99) return log("INVALID CHANNEL", "red");
        if (pass.length < 6) return log("SECRET TOO SHORT", "red");

        try {
            cryptoKey = await deriveKey(pass);
            localStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true, sampleRate: 48000 }});

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;
            streamSource = audioCtx.createMediaStreamSource(localStream);
            streamSource.connect(analyser);

            recorder = new MediaRecorder(localStream, { mimeType: 'audio/webm;codecs=opus' });
            recorder.ondataavailable = async (e) => {
                if (!conn?.open || !isPTTActive || !e.data?.size) return;
                const buf = await e.data.arrayBuffer();
                const enc = await encryptData(buf);
                conn.send(enc);
            };

            document.getElementById('bootBtn').disabled = true;
            document.getElementById('curFreq').innerText = "CH-" + chan;
            document.getElementById('stat').innerText = "CONNECTING (CROSS-NETWORK)...";

            initPeer(APP_PREFIX + chan);
            updateMeter();
            log("INITIALIZING CROSS-NETWORK LINK...", "#39ff14");
        } catch(e) {
            log("MIC PERMISSION DENIED", "red");
        }
    }

    function initPeer(myId) {
        const config = {
            iceServers: [
                { urls: ["stun:stun.l.google.com:19302", "stun:stun1.l.google.com:19302", "stun:stun2.l.google.com:19302"] },
                { urls: "turn:openrelay.metered.ca:80", username: "openrelayproject", credential: "openrelayproject" },
                { urls: "turn:openrelay.metered.ca:443", username: "openrelayproject", credential: "openrelayproject" },
                { urls: "turn:openrelay.metered.ca:443?transport=tcp", username: "openrelayproject", credential: "openrelayproject" },
                { urls: "turn:global.relay.metered.ca:80", username: "metered", credential: "metered" },
                { urls: "turn:global.relay.metered.ca:443", username: "metered", credential: "metered" }
            ]
        };

        peer = new Peer(myId, { config, debug: 3 });

        peer.on('open', () => {
            log("DEVICE ONLINE ON CHANNEL " + myId.split('-').pop(), "#39ff14");
            setTimeout(tryConnect, 1200);
        });

        peer.on('connection', c => setupConnection(c));

        peer.on('error', err => {
            log("WEBRTC ERROR: " + err.type, "red");
            console.error("Full error:", err);

            if (err.type === "unavailable-id" || err.type === "peer-unavailable") {
                log("OTHER DEVICE NOT DETECTED YET - RETRYING...", "#ffb000");
                if (reconnectAttempts < 5) {
                    reconnectAttempts++;
                    setTimeout(() => initPeer(myId), 2000);
                } else {
                    log("Try different channel or make sure both devices clicked INITIATE", "#ffb000");
                }
            } else if (err.type === "ice-failed" || err.type === "negotiation-failed") {
                log("ICE FAILED - TURN servers struggling. Try Wi-Fi on both if possible.", "red");
            }
        });
    }

    function tryConnect() {
        if (conn && conn.open) return;
        log("ATTEMPTING TO CONNECT TO OTHER DEVICE...", "#ffb000");
        const c = peer.connect(peer.id, { reliable: true });
        setupConnection(c);
    }

    function setupConnection(c) {
        conn = c;
        conn.on('open', () => {
            document.getElementById('ledNet').classList.add('online');
            document.getElementById('pttBtn').disabled = false;
            document.getElementById('stat').innerText = "LINK ACTIVE (E2EE)";
            log("✅ SUCCESS! CROSS-NETWORK CONNECTION ESTABLISHED", "#39ff14");
            playBeep(950, 0.15);
        });

        conn.on('data', async data => {
            if (!(data instanceof ArrayBuffer)) return;
            document.getElementById('ledTx').classList.add('tx');
            try {
                const dec = await decryptData(data);
                const blob = new Blob([dec], { type: 'audio/webm' });
                const audio = new Audio(URL.createObjectURL(blob));
                audio.onended = () => URL.revokeObjectURL(audio.src);
                await audio.play();
            } catch(e) {
                log("DECRYPT FAILED - Check secret", "red");
            }
            setTimeout(() => document.getElementById('ledTx').classList.remove('tx'), 900);
        });

        conn.on('close', () => {
            log("CONNECTION LOST - Will retry", "red");
            document.getElementById('ledNet').classList.remove('online');
            document.getElementById('pttBtn').disabled = true;
        });
    }

    function playBeep(f, d) {
        if (!audioCtx) return;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.frequency.value = f; g.gain.value = 0.04;
        o.connect(g).connect(audioCtx.destination);
        o.start(); g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + d);
        o.stop(audioCtx.currentTime + d);
    }

    function updateMeter() {
        if (!analyser) return;
        const data = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(data);
        const avg = data.reduce((a,b)=>a+b,0) / data.length;
        document.getElementById('meter-fill').style.width = Math.min(100, avg*2.8) + "%";
        requestAnimationFrame(updateMeter);
    }

    const pttBtn = document.getElementById('pttBtn');
    function startPTT() { 
        if (conn?.open && recorder) { 
            if (recorder.state === 'inactive') recorder.start(160); 
            isPTTActive = true; 
            document.getElementById('ledTx').classList.add('tx'); 
        } else {
            log("No active link yet", "red");
        }
    }
    function stopPTT() { 
        isPTTActive = false; 
        if (recorder?.state === 'recording') recorder.stop(); 
        document.getElementById('ledTx').classList.remove('tx'); 
    }

    pttBtn.onmousedown = startPTT;
    pttBtn.onmouseup = stopPTT;
    pttBtn.ontouchstart = e => { e.preventDefault(); startPTT(); };
    pttBtn.ontouchend = e => { e.preventDefault(); stopPTT(); };

    window.addEventListener('beforeunload', () => {
        if (recorder?.state === 'recording') recorder.stop();
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        if (peer) peer.destroy();
    });

    log("CROSS-NETWORK VERSION LOADED", "#39ff14");
    log("Make sure BOTH devices click INITIATE with same channel & secret", "#ffb000");
</script>
</body>
</html>
