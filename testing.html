<script>
/* ========================================================================
   TAC/COM v12.4.1 — Production Build
   Fixes: CSP blob support, Mobile KDF tiering, Full Topic Obfuscation
   ======================================================================== */

// ==================== SECURITY CONSTANTS ====================
// Mobile devices get lower iterations to prevent 5-8s UI freezes.
// Desktop gets max iterations per OWASP 2023 guidelines.
const KDF_ITERATIONS   = /Mobi|Android/i.test(navigator.userAgent) ? 120000 : 310000;
const MIN_KEY_LENGTH   = 8;
const PUBLISH_MIN_MS   = 35;
const AUTH_TIMEOUT_MS  = 10000;
const NONCE_SIZE       = 16;
const MAX_SEQ          = 65535;

// ==================== APPLICATION STATE ====================
let mc=null, mic=null, actx=null, ana=null, pG=null, ck=null, audioProc=null;
let isTx=false, isPwr=false, isConn=false, isAnc=false, nxt=0, rotA=0;
let txSeq=0, rxSeq=-1, lastPub=0, battInterval=null;
let myRole='', myChannel='', currentTopic='', authState='none', authTimer=null;
let myNonce=null, peerNonce=null;

// ==================== INPUT SANITIZATION ====================
function sanitizeChannel(input) {
    const clean = String(input).replace(/[^0-9a-zA-Z\-_]/g, '');
    return (!clean || clean.length > 32) ? null : clean;
}

function validateKey(key) {
    return typeof key === 'string' && key.length >= MIN_KEY_LENGTH && !/[\x00-\x1F\x7F]/.test(key);
}

// ==================== CRYPTOGRAPHY ====================
async function deriveKey(password, channel) {
    const enc = new TextEncoder();
    // Deterministic salt unique per channel
    const saltBuf = await crypto.subtle.digest('SHA-256', enc.encode('TACCOM_KDF_SALT_v12:' + channel));
    const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: new Uint8Array(saltBuf), iterations: KDF_ITERATIONS, hash: 'SHA-256' },
        baseKey, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
    );
}

/**
 * FULL TOPIC OBFUSCATION:
 * Generates the entire MQTT topic as a SHA-256 hash.
 * Since there is no hardcoded prefix, reading the source code 
 * does not reveal a namespace to wildcard-subscribe to.
 */
async function computeTopic(channel, password) {
    const enc = new TextEncoder();
    const hash = await crypto.subtle.digest('SHA-256', enc.encode('TACCOM_NS_v2:' + channel + ':' + password));
    const hex = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
    return 'v/' + hex.substring(0, 24); // e.g., v/a3f1b2c4d5e6f7a8b9c0d1e2
}

async function encryptPayload(plaintext) {
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const ct = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, ck, plaintext);
    const pkt = new Uint8Array(12 + ct.byteLength);
    pkt.set(iv, 0); pkt.set(new Uint8Array(ct), 12);
    return pkt;
}

async function decryptPayload(packet) {
    if (packet.byteLength < 13) throw new Error('PKT_SHORT');
    return crypto.subtle.decrypt({ name: 'AES-GCM', iv: packet.slice(0, 12) }, ck, packet.slice(12));
}

// ==================== PAYLOAD ENVELOPE ====================
function buildEnvelope(type, seq, role, data) {
    const buf = new Uint8Array(4 + data.byteLength);
    buf[0] = type; buf[1] = (seq >> 8) & 0xFF; buf[2] = seq & 0xFF;
    buf[3] = role === 'host' ? 0 : 1;
    buf.set(new Uint8Array(data instanceof ArrayBuffer ? data : data.buffer), 4);
    return buf;
}

function parseEnvelope(buf) {
    if (!buf || buf.byteLength < 4) return null;
    return { type: buf[0], seq: (buf[1] << 8) | buf[2], role: buf[3] === 0 ? 'host' : 'client', data: buf.slice(4) };
}

// ==================== REPLAY & RATE PROTECTION ====================
function isFreshSequence(received) {
    if (rxSeq === -1) return true;
    const diff = ((received - rxSeq) % MAX_SEQ + MAX_SEQ) % MAX_SEQ;
    return diff > 0 && diff < 32768;
}

function canPublish() {
    const now = performance.now();
    if (now - lastPub < PUBLISH_MIN_MS) return false;
    lastPub = now; return true;
}

function arraysEqual(a, b) {
    if (a.byteLength !== b.byteLength) return false;
    const va = new Uint8Array(a instanceof ArrayBuffer ? a : a.buffer);
    const vb = new Uint8Array(b instanceof ArrayBuffer ? b : b.buffer);
    for (let i = 0; i < va.length; i++) { if (va[i] !== vb[i]) return false; }
    return true;
}

// ==================== AUTH HANDSHAKE ====================
function resetAuth() { authState = 'none'; if (authTimer) { clearTimeout(authTimer); authTimer = null; } }
function startAuthTimer() { if (authTimer) clearTimeout(authTimer); authTimer = setTimeout(authFailed, AUTH_TIMEOUT_MS); }
function authFailed() { log('AUTH_TIMEOUT'); resetAuth(); updateUI('idle'); document.getElementById('ptt').innerText = 'AUTH FAIL'; document.getElementById('ptt').classList.remove('unlocked', 'ready'); isConn = false; }
function authSucceeded() {
    resetAuth(); isConn = true; txSeq = 0; rxSeq = -1;
    updateUI('connected');
    document.getElementById('ptt').innerText = 'PUSH TO TALK';
    document.getElementById('ptt').classList.add('unlocked', 'ready');
    log('LINK_SECURE_ESTABLISHED');
    ['ch','key','hBtn','jBtn'].forEach(id => document.getElementById(id).disabled = true);
}

async function initiateHostAuth() {
    myRole = 'host'; authState = 'send_challenge';
    myNonce = crypto.getRandomValues(new Uint8Array(NONCE_SIZE));
    log('AUTH_INIT_HOST...');
    const enc = await encryptPayload(buildEnvelope(0, 0, 'host', myNonce.buffer));
    mc.publish(currentTopic, enc); log('CHALLENGE_SENT');
    authState = 'wait_response'; startAuthTimer();
}

async function handleHostPacket(p) {
    if (authState !== 'wait_response' || p.type !== 1 || p.role !== 'client') return;
    const data = new Uint8Array(p.data);
    if (data.byteLength !== NONCE_SIZE * 2) { log('AUTH_MALFORMED'); return; }
    if (!arraysEqual(data.slice(0, NONCE_SIZE), myNonce)) { log('AUTH_NONCE_FAIL'); return; }
    peerNonce = data.slice(NONCE_SIZE); log('RESPONSE_VERIFIED');
    const enc = await encryptPayload(buildEnvelope(2, 0, 'host', peerNonce.buffer));
    mc.publish(currentTopic, enc); authSucceeded();
}

async function handleClientPacket(p) {
    if (authState === 'wait_challenge' && p.type === 0 && p.role === 'host') {
        peerNonce = new Uint8Array(p.data); myNonce = crypto.getRandomValues(new Uint8Array(NONCE_SIZE));
        log('CHALLENGE_RX');
        const combined = new Uint8Array(NONCE_SIZE * 2);
        combined.set(peerNonce, 0); combined.set(myNonce, NONCE_SIZE);
        const enc = await encryptPayload(buildEnvelope(1, 0, 'client', combined.buffer));
        mc.publish(currentTopic, enc); log('RESPONSE_SENT');
        authState = 'wait_complete'; startAuthTimer();
    } else if (authState === 'wait_complete' && p.type === 2 && p.role === 'host') {
        if (!arraysEqual(new Uint8Array(p.data), myNonce)) { log('AUTH_NONCE_FAIL'); return; }
        authSucceeded();
    }
}

// ==================== MESSAGE DISPATCHER ====================
async function onMessage(topic, packet) {
    try {
        const dec = await decryptPayload(packet);
        const parsed = parseEnvelope(new Uint8Array(dec));
        if (!parsed || parsed.role === myRole) return;
        if (!isConn) { if (myRole === 'host') await handleHostPacket(parsed); else await handleClientPacket(parsed); }
        else if (parsed.type === 3) playIncomingAudio(dec);
    } catch (e) { /* Silent: tamper, wrong key, or not our message */ }
}

// ==================== AUDIO I/O ====================
async function transmitAudio(float32Data) {
    if (!isTx || !isConn || !mc?.connected || !canPublish()) return;
    let samples = float32Data;
    if (isAnc) { for (let i = 0; i < samples.length; i++) { if (Math.abs(samples[i]) < 0.02) samples[i] = 0; } }
    const i16 = new Int16Array(samples.length);
    for (let i = 0; i < samples.length; i++) i16[i] = Math.max(-32768, Math.min(32767, samples[i] * 32767));
    txSeq = (txSeq + 1) % MAX_SEQ;
    try { mc.publish(currentTopic, await encryptPayload(buildEnvelope(3, txSeq, myRole, i16.buffer)), { qos: 0 }); } catch(e) {}
}

function playIncomingAudio(decryptedBuf) {
    const parsed = parseEnvelope(new Uint8Array(decryptedBuf));
    if (!parsed || parsed.type !== 3 || !isFreshSequence(parsed.seq)) return;
    rxSeq = parsed.seq;
    const i16 = new Int16Array(parsed.data), f32 = new Float32Array(i16.length);
    for (let i = 0; i < i16.length; i++) f32[i] = i16[i] / 32768;
    // CRITICAL FIX: Use native sample rate (actx.sampleRate) instead of hardcoded 12000
    const buf = actx.createBuffer(1, f32.length, actx.sampleRate);
    buf.getChannelData(0).set(f32);
    const src = actx.createBufferSource(); src.buffer = buf; src.connect(pG);
    const startAt = Math.max(actx.currentTime + 0.03, nxt);
    src.start(startAt); nxt = startAt + buf.duration;
}

async function setupAudioProcessor(sourceNode) {
    try {
        const code = `class T extends AudioWorkletProcessor{process(i){if(i[0]&&i[0][0])this.port.postMessage(new Float32Array(i[0][0]));return true}}registerProcessor('t',T);`;
        const blob = new Blob([code], { type: 'text/javascript' });
        await actx.audioWorklet.addModule(URL.createObjectURL(blob));
        audioProc = new AudioWorkletNode(actx, 't');
        audioProc.port.onmessage = (e) => transmitAudio(e.data);
        sourceNode.connect(audioProc); log('WORKLET_ACTIVE');
    } catch (e) {
        const proc = actx.createScriptProcessor(2048, 1, 1);
        proc.onaudioprocess = (ev) => { if (isTx) transmitAudio(ev.inputBuffer.getChannelData(0)); };
        sourceNode.connect(proc); proc.connect(actx.destination); audioProc = proc; log('LEGACY_PROC_ACTIVE');
    }
}

function setupPTT() {
    const el = document.getElementById('ptt');
    const down = (e) => { if (isConn) { e.preventDefault(); isTx = true; } };
    const up   = (e) => { if (isConn) { e.preventDefault(); isTx = false; } };
    ['mousedown','touchstart'].forEach(e => el.addEventListener(e, down, {passive:false}));
    ['mouseup','mouseleave','touchend','touchcancel'].forEach(e => el.addEventListener(e, up, {passive:false}));
}

// ==================== LIFECYCLE ====================
function cleanup() {
    isTx=false; isConn=false; resetAuth();
    if(mc) try{mc.end(true)}catch(e){} mc=null;
    if(mic) mic.getTracks().forEach(t=>t.stop()); mic=null;
    if(actx) try{actx.close()}catch(e){} actx=null;
    ck=ana=pG=audioProc=null; currentTopic=''; txSeq=0; rxSeq=-1; myNonce=peerNonce=null;
    updateUI('idle');
    const ptt = document.getElementById('ptt'); ptt.innerText='LOCKED'; ptt.classList.remove('unlocked','ready');
    ['ch','key','hBtn','jBtn'].forEach(id => document.getElementById(id).disabled = false);
}

async function conn(role) {
    if (!isPwr || isConn) return;
    const rawCh = document.getElementById('ch').value;
    const rawKey = document.getElementById('key').value;
    myChannel = sanitizeChannel(rawCh);
    if (!myChannel) { log('ERR:INVALID_CHANNEL'); return; }
    if (!validateKey(rawKey)) { log('ERR:KEY_MIN_'+MIN_KEY_LENGTH+'_CHARS'); return; }
    if (!navigator.mediaDevices?.getUserMedia) { log('ERR:SECURE_CTX_REQ'); return; }

    updateUI('connecting');
    try {
        log('INIT_HARDWARE...');
        mic = await navigator.mediaDevices.getUserMedia({ audio: true });
        actx = new (window.AudioContext || window.webkitAudioContext)();
        const src = actx.createMediaStreamSource(mic);
        ana = actx.createAnalyser(); ana.fftSize = 2048; src.connect(ana);
        pG = actx.createGain(); pG.gain.value = 2.5; pG.connect(actx.destination);
        await setupAudioProcessor(src);

        log('DERIVING_KEYS...');
        // Yield to main thread so "DERIVING_KEYS..." renders BEFORE PBKDF2 blocks microtasks
        await new Promise(r => setTimeout(r, 50));
        ck = await deriveKey(rawKey, myChannel);
        log('KEY_DERIVED');

        currentTopic = await computeTopic(myChannel, rawKey);

        log('BROKER_CONNECT...');
        mc = mqtt.connect('wss://broker.emqx.io:8084/mqtt', { clean: true, connectTimeout: 8000, reconnectPeriod: 0 });
        mc.on('connect', () => {
            log('BROKER_OK'); mc.subscribe(currentTopic, { qos: 0 }); log('TOPIC_BOUND');
            if (role === 'host') initiateHostAuth();
            else { myRole = 'client'; authState = 'wait_challenge'; log('AWAIT_HOST...'); startAuthTimer(); }
        });
        mc.on('message', onMessage);
        mc.on('error', () => { log('BROKER_ERR'); cleanup(); });
        mc.on('close', () => { if (isConn) { log('LINK_TERMINATED'); cleanup(); } });
        setupPTT();
    } catch (e) {
        log('SYS_FAIL:' + (e.message||'UNKNOWN').toUpperCase().replace(/[^A-Z0-9_ ]/g,''));
        cleanup();
    }
}

// ==================== UI LOGIC ====================
function updateUI(mode, noise) {
    const rf=document.getElementById('rfSt'), led=document.getElementById('led'), rssi=document.getElementById('rssi'), al=document.getElementById('ancLed');
    rf.className='val-norm'; led.className='status-led'; rssi.className='signal-block'; al.className='anc-led';
    if (!isPwr) return;
    if (mode==='idle') { rf.innerText='OFFLINE'; rf.style.color='var(--r)'; led.classList.add('led-red'); rssi.classList.add('sig-red'); }
    else if (mode==='connecting') { rf.innerText='SYNCING'; rf.style.color='var(--y)'; led.classList.add('led-orange'); rssi.classList.add('sig-orange'); }
    else if (mode==='connected') { rf.innerText='ONLINE'; rf.style.color='var(--g)'; led.classList.add('led-green'); rssi.classList.add('sig-green'); if(noise>0.5) al.classList.add('led-red'); else al.classList.add('led-green'); }
}

function pwr(s) {
    isPwr = s;
    document.getElementById('bOn').classList.toggle('active', s);
    document.getElementById('bOff').classList.toggle('active', !s);
    if (s) {
        document.getElementById('scr').classList.add('lit');
        document.getElementById('sys').style.opacity = '1';
        updateUI('idle'); log('FIELD_OS_BOOT_v12.4.1');
        battInterval = setInterval(() => { if(isPwr) document.getElementById('vlt').innerText = (11.8 + Math.random()*0.4).toFixed(2) + 'V'; }, 2000);
    } else {
        if (battInterval) { clearInterval(battInterval); battInterval = null; }
        cleanup(); location.reload();
    }
}

function toggleAnc() {
    if (!isPwr) return; isAnc = !isAnc;
    const b = document.getElementById('ancBtn'); b.innerText = isAnc ? 'ANC ON' : 'ANC OFF'; b.classList.toggle('on', isAnc);
}

document.getElementById('nozzle').addEventListener('click', (e) => {
    if (!isPwr) return;
    const r = document.getElementById('nozzle').getBoundingClientRect(), cin = document.getElementById('ch');
    if ((e.clientX - r.left) > (r.width / 2)) { rotA += 30; cin.value = parseInt(cin.value || 0) + 1; log('FREQ_INC'); }
    else { rotA -= 30; cin.value = parseInt(cin.value || 0) - 1; log('FREQ_DEC'); }
    document.getElementById('nozzle').style.transform = 'rotate(' + rotA + 'deg)';
});

function log(m) {
    const el = document.getElementById('sys'), d = document.createElement('div');
    d.innerText = '> ' + m; el.appendChild(d); el.scrollTop = el.scrollHeight;
    while (el.childElementCount > 50) el.removeChild(el.firstChild);
}

// ==================== VISUALIZATION ====================
const bcvs = document.getElementById('scannerCanvas'), bctx = bcvs.getContext('2d');
let bgCols = [];
function initBg() { bcvs.width=innerWidth; bcvs.height=innerHeight; bgCols=Array.from({length:Math.floor(bcvs.width/20)},()=>Math.random()*bcvs.height); }
addEventListener('resize', initBg); initBg();

function drawLoop() {
    bctx.fillStyle='rgba(0,0,0,0.1)'; bctx.fillRect(0,0,bcvs.width,bcvs.height);
    bctx.font='12px monospace'; bctx.fillStyle='#010';
    for(let i=0;i<bgCols.length;i++) { bctx.fillText(Math.random()>0.8?'1':'0',i*20,bgCols[i]); bgCols[i]=bgCols[i]>bcvs.height?0:bgCols[i]+10; }
    
    if (ana && isPwr) {
        const scvs=document.getElementById('scope'), sctx=scvs.getContext('2d'), data=new Uint8Array(ana.frequencyBinCount);
        ana.getByteTimeDomainData(data);
        let sum=0; for(let i=0;i<data.length;i++) sum+=Math.abs(data[i]-128);
        if(isTx) updateUI('connected', sum/data.length/50);
        sctx.clearRect(0,0,scvs.width,scvs.height); sctx.lineWidth=3; sctx.strokeStyle=isAnc?'#00d4ff':'#39ff14'; sctx.beginPath();
        const step=scvs.width/data.length;
        for(let i=0;i<data.length;i++) { const y=(data[i]/128.0)*scvs.height/2; if(i===0) sctx.moveTo(0,y); else sctx.lineTo(i*step,y); }
        sctx.stroke();
    }
    requestAnimationFrame(drawLoop);
}
drawLoop();
</script>
