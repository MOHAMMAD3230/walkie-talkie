<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM CHANNEL-SYNC</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --amber: #ffb000; --bg: #0d0900; --red: #8c3024; --green: #39ff14; }
        body { background: #050505; color: var(--amber); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        .mainframe { width: 90%; max-width: 400px; background: #1a1a1a; border: 4px solid #333; padding: 20px; box-shadow: 0 0 40px #000; }
        .display { background: var(--bg); border: 2px solid #222; padding: 15px; height: 200px; overflow-y: auto; font-size: 0.8rem; margin-bottom: 20px; color: var(--amber); }
        input { width: 100%; background: #000; border: 1px solid var(--amber); color: var(--amber); padding: 10px; margin: 5px 0; box-sizing: border-box; text-align: center; }
        .btn { width: 100%; padding: 12px; margin: 5px 0; cursor: pointer; font-weight: bold; border: none; text-transform: uppercase; }
        .btn-host { background: var(--green); color: #000; }
        .btn-join { background: #0055ff; color: #fff; }
        .btn-ptt { background: var(--red); color: #fff; height: 80px; font-size: 1.2rem; display: none; }
        .btn-ptt:active { background: #f00; }
        .status { font-size: 0.7rem; display: flex; justify-content: space-between; margin-top: 10px; }
        .led { width: 10px; height: 10px; border-radius: 50%; background: #300; display: inline-block; }
        .active-led { background: var(--green); box-shadow: 0 0 8px var(--green); }
    </style>
</head>
<body>

<div class="mainframe">
    <div id="log" class="display">> SELECT CHANNEL & MODE</div>
    
    <input type="number" id="chan" value="42" placeholder="CHANNEL NO.">
    <input type="password" id="key" value="secure123" placeholder="ENCRYPTION KEY">
    
    <button id="hostBtn" class="btn btn-host" onclick="init('host')">Start Channel Host</button>
    <button id="joinBtn" class="btn btn-join" onclick="init('join')">Join Channel</button>
    
    <button id="ptt" class="btn btn-ptt">PUSH TO TALK</button>

    <div class="status">
        <span>LINK: <span id="linkStat">OFF</span></span>
        <div id="led" class="led"></div>
    </div>
</div>

<script>
    let peer, conn, localStream, audioCtx, recorder, cryptoKey;
    const logEl = document.getElementById('log');
    const ptt = document.getElementById('ptt');

    function log(m) { logEl.innerHTML += `<div>> ${m}</div>`; logEl.scrollTop = logEl.scrollHeight; }

    async function getCryptoKey(pass) {
        const enc = new TextEncoder();
        const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(pass), "PBKDF2", false, ["deriveKey"]);
        return crypto.subtle.deriveKey({ name: "PBKDF2", salt: enc.encode("static-salt"), iterations: 100000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
    }

    async function init(mode) {
        const channel = document.getElementById('chan').value;
        const pass = document.getElementById('key').value;
        const channelID = `TAC-CH-${channel}`;

        try {
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            cryptoKey = await getCryptoKey(pass);
            
            // Peer Config with global STUN for 5G/WiFi traversal
            const config = { config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } };
            
            if (mode === 'host') {
                peer = new Peer(channelID, config);
                log(`OPENING CH: ${channel}`);
            } else {
                peer = new Peer(config);
                log(`SEARCHING CH: ${channel}`);
            }

            peer.on('open', (id) => {
                if (mode === 'host') log("WAITING FOR CLIENT...");
                else {
                    const c = peer.connect(channelID);
                    handleConn(c);
                }
            });

            peer.on('connection', handleConn);
            peer.on('error', e => log(`ERR: ${e.type}`));

        } catch (e) { log("MIC REQ. FAILED"); }
    }

    function handleConn(c) {
        conn = c;
        conn.on('open', () => {
            log("CHANNEL SYNCED");
            document.getElementById('led').classList.add('active-led');
            document.getElementById('linkStat').innerText = "ONLINE";
            document.getElementById('hostBtn').style.display = 'none';
            document.getElementById('joinBtn').style.display = 'none';
            ptt.style.display = 'block';
            setupAudio();
        });

        conn.on('data', async (data) => {
            const iv = data.slice(0, 12);
            const body = data.slice(12);
            const dec = await crypto.subtle.decrypt({ name: "AES-GCM", iv: new Uint8Array(iv) }, cryptoKey, body);
            const audio = new Audio(URL.createObjectURL(new Blob([dec], { type: 'audio/webm' })));
            audio.play();
        });
    }

    function setupAudio() {
        recorder = new MediaRecorder(localStream);
        recorder.ondataavailable = async (e) => {
            if (conn.open && e.data.size > 0) {
                const buf = await e.data.arrayBuffer();
                const iv = crypto.getRandomValues(new Uint8Array(12));
                const enc = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, cryptoKey, buf);
                const packet = new Uint8Array(iv.length + enc.byteLength);
                packet.set(iv); packet.set(new Uint8Array(enc), 12);
                conn.send(packet.buffer);
            }
        };

        const start = () => { if(recorder.state === 'inactive') recorder.start(); };
        const stop = () => { if(recorder.state === 'recording') recorder.stop(); };

        ptt.onmousedown = start; ptt.onmouseup = stop;
        ptt.ontouchstart = (e) => { e.preventDefault(); start(); };
        ptt.ontouchend = (e) => { e.preventDefault(); stop(); };
    }
</script>
</body>
</html>
