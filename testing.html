<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM v11.9 | RE-MAPPED_I/O</title>
    <script src="https://cdn.jsdelivr.net/npm/mqtt@5.10.4/dist/mqtt.min.js"></script>
    <style>
        :root {
            --g: #39ff14; --b: #00d4ff; --r: #ff3131; --y: #ffcc00;
            --case: #1a1a1a; --chassis-w: clamp(320px, 95vw, 380px);
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: var(--g); font-family: 'Courier New', monospace; margin: 0; padding: 15px; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; }
        
        #scannerCanvas { position: fixed; inset: 0; z-index: -1; opacity: 0.08; }

        .chassis {
            width: var(--chassis-w); min-height: 94vh; 
            background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
            border: 10px solid #252525; border-radius: 30px 30px 70px 70px;
            padding: 20px; box-shadow: inset 0 0 50px #000, 0 40px 100px rgba(0,0,0,0.9);
            position: relative; border-bottom: 30px solid #080808;
            display: flex; flex-direction: column; gap: 12px;
        }

        /* TOP CORNER INDICATORS */
        .signal-block { position: absolute; top: 15px; left: 20px; display: flex; flex-direction: column; gap: 2px; }
        .sig-bars { display: flex; gap: 3px; align-items: flex-end; height: 18px; }
        .bar { width: 4px; background: #111; border-radius: 1px; transition: 0.3s; }
        .bar:nth-child(1) { height: 5px; } .bar:nth-child(2) { height: 8px; } .bar:nth-child(3) { height: 11px; } .bar:nth-child(4) { height: 14px; } .bar:nth-child(5) { height: 18px; }
        
        /* Signal Glow Logic */
        .sig-red .bar { background: var(--r); box-shadow: 0 0 8px var(--r); }
        .sig-yellow .bar { background: var(--y); box-shadow: 0 0 8px var(--y); }
        .sig-green .bar { background: var(--g); box-shadow: 0 0 8px var(--g); }

        /* Top Right Indicator */
        .status-led { position: absolute; top: 18px; right: 22px; width: 16px; height: 16px; background: #000; border-radius: 50%; border: 2px solid #333; }

        /* Blink Animations */
        @keyframes blink-red { 0%, 100% { background: #300; opacity: 0.4; } 50% { background: var(--r); box-shadow: 0 0 15px var(--r); opacity: 1; } }
        @keyframes blink-orange { 0%, 100% { background: #320; opacity: 0.4; } 50% { background: var(--y); box-shadow: 0 0 15px var(--y); opacity: 1; } }
        @keyframes blink-green { 0%, 100% { background: #020; opacity: 0.4; } 50% { background: var(--g); box-shadow: 0 0 15px var(--g); opacity: 1; } }
        
        .led-red, .txt-red { animation: blink-red 1s infinite; }
        .led-orange, .txt-orange { animation: blink-orange 1s infinite; }
        .led-green, .txt-green { animation: blink-green 1s infinite; }

        /* DRAGGED DOWN CONTROLS */
        .module-controls { margin-top: 25px; display: flex; flex-direction: column; gap: 15px; }
        .pwr-strip { display: flex; gap: 10px; padding: 5px 0; }
        
        .mech-btn { flex: 1; padding: 14px; background: #1a1a1a; color: #333; font-weight: 900; font-size: 0.7rem; border: 1px solid #333; border-bottom: 5px solid #000; cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: 0.1s; }
        .mech-btn:active { transform: translateY(3px); border-bottom-width: 2px; }
        .pwr-on.active { color: var(--g); border-color: var(--g); }
        .pwr-off.active { color: var(--r); border-color: var(--r); }

        /* LCD DISPLAY */
        .screen { background: #050505; border: 4px solid #222; border-radius: 6px; height: 120px; position: relative; padding: 10px; box-shadow: inset 0 0 30px #000; }
        .lit.screen { background: #000a00; border-color: #333; }
        #scope { width: 100%; height: 50px; opacity: 0; }
        .lit #scope { opacity: 1; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .field { background: #000; border: 1px solid #333; color: var(--b); padding: 12px; font-family: inherit; text-align: center; width: 100%; font-weight: bold; border-radius: 4px; font-size: 1rem; }

        /* ACTION ZONE */
        .action-bay { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px; border: 1px solid #222; margin-top: auto; }
        .anc-stack { display: flex; flex-direction: column; align-items: center; gap: 8px; width: 70px; }
        .anc-led { width: 14px; height: 14px; background: #111; border-radius: 50%; border: 2px solid #333; }
        .anc-toggle { width: 100%; padding: 8px 0; background: #111; border: 1px solid #333; border-bottom: 4px solid #000; border-radius: 4px; color: #444; font-size: 0.55rem; font-weight: 900; cursor: pointer; }
        .anc-toggle.on { color: var(--b); border-color: var(--b); }

        .ptt-lever { flex-grow: 1; margin-left: 15px; height: 70px; background: #0a0a0a; border: 3px solid #1a1a1a; border-bottom: 8px solid #000; border-radius: 12px; color: #1a1a1a; font-weight: 900; font-size: 1.1rem; cursor: not-allowed; transition: 0.1s; }
        .ptt-lever.unlocked { background: #1a0000; border-color: #300; color: #300; cursor: pointer; pointer-events: auto; }
        .ptt-lever.unlocked.ready { border-color: var(--r); color: var(--r); }
        .ptt-lever.unlocked:active { transform: translateY(6px); border-bottom-width: 2px; background: var(--r); color: #000; }

        /* FOOTER TELEMETRY */
        .stats-footer { border-top: 2px solid #222; padding-top: 15px; display: flex; flex-direction: column; gap: 10px; }
        .stat-line { display: flex; flex-direction: column; }
        .stat-label { font-size: 0.65rem; font-weight: 900; color: #555; margin-bottom: 2px; }
        .glow-val { font-size: 0.8rem; font-weight: 900; letter-spacing: 1.5px; padding-left: 5px; }
    </style>
</head>
<body>

<canvas id="scannerCanvas"></canvas>

<div class="chassis">
    <div id="rssi" class="signal-block">
        <div class="sig-bars">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
    </div>
    <div id="led" class="status-led"></div>

    <div class="module-controls">
        <div class="pwr-strip">
            <button id="bOn" class="mech-btn pwr-on" onclick="pwr(true)">Pwr On</button>
            <button id="bOff" class="mech-btn pwr-off active" onclick="pwr(false)">Pwr Off</button>
        </div>
        <div class="screen" id="scr">
            <canvas id="scope"></canvas>
            <div id="sys" style="height:40px; overflow-y:auto; font-size:0.6rem; opacity:0; color:var(--g); padding:2px;"></div>
        </div>
    </div>

    <div class="input-grid">
        <input type="number" id="ch" class="field" value="88">
        <input type="password" id="key" class="field" value="TAC">
        <button id="hBtn" class="mech-btn" onclick="conn('host')">Host</button>
        <button id="jBtn" class="mech-btn" onclick="conn('client')">Join</button>
    </div>

    <div class="action-bay">
        <div class="anc-stack">
            <div id="ancLed" class="anc-led"></div>
            <button id="ancBtn" class="anc-toggle" onclick="toggleAnc()">ANC OFF</button>
        </div>
        <button id="ptt" class="ptt-lever">LOCKED</button>
    </div>

    <div class="stats-footer">
        <div class="stat-line">
            <span class="stat-label">RF_LINK_STATE:</span>
            <span id="rfSt" class="glow-val">OFFLINE</span>
        </div>
        <div class="stat-line">
            <span class="stat-label">ANC_TELEMETRY:</span>
            <span id="ancSt" class="glow-val">NO_DATA</span>
        </div>
    </div>
</div>

<script>
let mc, mic, actx, ana, pG, ck, isTx=false, isPwr=false, isConn=false, isAnc=false, nxt=0;
const SR=12000, TP='remap_v11_9/';

function updateTelemetry(mode, noise = 0) {
    const rf = document.getElementById('rfSt');
    const anc = document.getElementById('ancSt');
    const led = document.getElementById('led');
    const rssi = document.getElementById('rssi');
    const ancLed = document.getElementById('ancLed');

    // Reset Classes
    rf.className = "glow-val"; anc.className = "glow-val"; led.className = "status-led";
    rssi.className = "signal-block"; ancLed.className = "anc-led";

    if (!isPwr) return;

    if (mode === 'idle') {
        rf.innerText = "OFFLINE"; rf.classList.add('txt-red');
        anc.innerText = "NO_DATA"; anc.classList.add('txt-red');
        led.classList.add('led-red');
    } else if (mode === 'connecting') {
        rf.innerText = "UPLINKING..."; rf.classList.add('txt-orange');
        led.classList.add('led-orange');
    } else if (mode === 'connected') {
        rf.innerText = "SECURE_LINK"; rf.classList.add('txt-green');
        led.classList.add('led-green');
        rssi.classList.add('sig-green');

        if (noise > 0.7) { anc.innerText = "ECHO_HIGH"; anc.classList.add('txt-red'); ancLed.classList.add('led-red'); }
        else if (noise > 0.3) { anc.innerText = "AMB_NOISE"; anc.classList.add('txt-orange'); ancLed.classList.add('led-orange'); }
        else { anc.innerText = "CLEAN_FEED"; anc.classList.add('txt-green'); ancLed.classList.add('led-green'); }
    }
}

function pwr(s) {
    isPwr = s;
    const scr = document.getElementById('scr');
    document.getElementById('bOn').classList.toggle('active', s);
    document.getElementById('bOff').classList.toggle('active', !s);
    if(s) {
        scr.classList.add('lit');
        document.getElementById('sys').style.opacity = "1";
        updateTelemetry('idle');
        log("REMAP_BOOT_COMPLETE");
    } else { location.reload(); }
}

function toggleAnc() {
    if(!isPwr) return;
    isAnc = !isAnc;
    const btn = document.getElementById('ancBtn');
    btn.innerText = isAnc ? "ANC ON" : "ANC OFF";
    btn.classList.toggle('on', isAnc);
    log(isAnc ? "ANC_DSP_FILTER_ON" : "ANC_DSP_BYPASS");
}

function log(m) {
    const el = document.getElementById("sys");
    const d = document.createElement('div');
    d.innerText = `> ${m}`;
    el.appendChild(d); el.scrollTop = el.scrollHeight;
}

const bcvs = document.getElementById('scannerCanvas');
const bctx = bcvs.getContext('2d');
let bgCols = [];
function initBg() { bcvs.width = window.innerWidth; bcvs.height = window.innerHeight; bgCols = new Array(Math.floor(bcvs.width/20)).fill(0).map(()=>Math.random()*bcvs.height); }
window.onresize = initBg; initBg();

function draw() {
    bctx.fillStyle = 'rgba(0,0,0,0.1)'; bctx.fillRect(0,0,bcvs.width,bcvs.height);
    bctx.font = 'bold 12px monospace'; bctx.fillStyle = '#010';
    bgCols.forEach((y, i) => { bctx.fillText(Math.random()>0.8?"1":"0", i*20, y); bgCols[i] = y > bcvs.height ? 0 : y + 10; });
    
    if(ana && isPwr) {
        const scvs = document.getElementById('scope');
        const sctx = scvs.getContext('2d');
        const data = new Uint8Array(ana.frequencyBinCount);
        ana.getByteTimeDomainData(data);
        
        let sum = 0; for(let i=0; i<data.length; i++) sum += Math.abs(data[i]-128);
        if(isTx) updateTelemetry('connected', sum/data.length/50);

        sctx.clearRect(0,0,scvs.width,scvs.height);
        sctx.lineWidth = 3; sctx.strokeStyle = isAnc ? '#00d4ff' : '#39ff14';
        sctx.beginPath();
        let x = 0; const step = scvs.width/data.length;
        for(let i=0; i<data.length; i++) {
            let v = data[i]/128.0; let y = v * scvs.height/2;
            if(i===0) sctx.moveTo(x,y); else sctx.lineTo(x,y);
            x += step;
        }
        sctx.stroke();
    }
    requestAnimationFrame(draw);
}
draw();

async function conn(role) {
    if(!isPwr || isConn) return;
    updateTelemetry('connecting');
    const ch = document.getElementById('ch').value;
    const pass = document.getElementById('key').value;
    
    try {
        mic = await navigator.mediaDevices.getUserMedia({audio: { echoCancellation: true, noiseSuppression: true }});
        actx = new (window.AudioContext || window.webkitAudioContext)();
        const src = actx.createMediaStreamSource(mic);
        ana = actx.createAnalyser(); src.connect(ana);
        const proc = actx.createScriptProcessor(2048, 1, 1);
        proc.onaudioprocess = (e) => { if(isTx) transmit(e.inputBuffer.getChannelData(0), ch, role); };
        ana.connect(proc); proc.connect(actx.destination);
        pG = actx.createGain(); pG.gain.value = 2.5; pG.connect(actx.destination);

        const enc = new TextEncoder();
        const km = await crypto.subtle.importKey('raw', enc.encode(pass), 'PBKDF2', false, ['deriveKey']);
        ck = await crypto.subtle.deriveKey({name:'PBKDF2', salt:enc.encode('X'), iterations:1000, hash:'SHA-256'}, km, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);

        mc = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        mc.on('connect', () => {
            isConn = true;
            updateTelemetry('connected');
            const ptt = document.getElementById('ptt');
            ptt.innerText = "PTT READY";
            ptt.classList.add('unlocked', 'ready');
            mc.subscribe(`${TP}${ch}/${role==='host'?'client':'host'}`);
            log("UPLINK_STABLE");
        });

        mc.on('message', async (t, pay) => {
            try {
                const iv = pay.slice(0, 12);
                const dec = await crypto.subtle.decrypt({name:'AES-GCM', iv}, ck, pay.slice(12));
                play(dec);
            } catch(e) {}
        });

        const ptt = document.getElementById('ptt');
        const down = (e) => { if(isConn) { e.preventDefault(); isTx = true; } };
        const up = (e) => { if(isConn) { e.preventDefault(); isTx = false; } };
        ptt.onmousedown = down; ptt.onmouseup = up;
        ptt.ontouchstart = down; ptt.ontouchend = up;

    } catch(err) { log("I/O_ERROR"); }
}

async function transmit(samples, ch, role) {
    if(isAnc) { for(let i=0; i<samples.length; i++) { if(Math.abs(samples[i]) < 0.02) samples[i] = 0; } }
    const i16 = new Int16Array(samples.length);
    for(let i=0; i<samples.length; i++) i16[i] = samples[i] * 32767;
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = await crypto.subtle.encrypt({name:'AES-GCM', iv}, ck, i16.buffer);
    const pkt = new Uint8Array(12 + enc.byteLength);
    pkt.set(iv); pkt.set(new Uint8Array(enc), 12);
    mc.publish(`${TP}${ch}/${role}`, pkt);
}

function play(d) {
    const i16 = new Int16Array(d); const f32 = new Float32Array(i16.length);
    for(let i=0; i<i16.length; i++) f32[i] = i16[i] / 32768;
    const buffer = actx.createBuffer(1, f32.length, SR);
    buffer.getChannelData(0).set(f32);
    const src = actx.createBufferSource();
    src.buffer = buffer; src.connect(pG);
    let start = Math.max(actx.currentTime + 0.05, nxt);
    src.start(start); nxt = start + buffer.duration;
}
</script>
</body>
</html>
