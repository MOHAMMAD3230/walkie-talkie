<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 | SECURE VOICE</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        :root { --amber:#ffb000; --bg:#0d0900; --red:#ff3333; --blue:#00d4ff; --green:#39ff14; }
        *,*::before,*::after{box-sizing:border-box}
        body{background:#050505;color:var(--amber);font-family:'Courier New',monospace;display:flex;justify-content:center;align-items:center;min-height:100vh;margin:0;touch-action:manipulation;overflow:hidden}
        .mainframe{width:95%;max-width:880px;background:#1a1a1a;border:6px solid #0a0a0a;border-radius:8px;padding:12px;display:flex;flex-direction:column;box-shadow:0 0 80px #000}
        @media(min-width:800px){.mainframe{display:grid;grid-template-columns:1fr 310px;height:720px;gap:16px;padding:16px}}
        .monitor{background:var(--bg);border:10px solid #1a1a1a;border-radius:14px;padding:16px;flex-grow:1;display:flex;flex-direction:column;box-shadow:inset 0 0 30px #000;min-height:0;position:relative;overflow:hidden}
        .scanline{position:absolute;top:0;left:0;right:0;height:2px;background:rgba(255,176,0,0.04);animation:scan 4s linear infinite;pointer-events:none;z-index:2}
        @keyframes scan{0%{top:0}100%{top:100%}}
        .rx-badge{position:absolute;top:12px;right:16px;font-size:.6rem;color:var(--green);opacity:0;transition:opacity .12s;pointer-events:none;text-shadow:0 0 8px var(--green);z-index:3}
        .rx-badge.on{opacity:1}
        .hbar{font-size:.58rem;display:flex;justify-content:space-between;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #1a1a1a;flex-wrap:wrap;gap:4px}
        .hbar span{white-space:nowrap}
        #output{flex:1;min-height:0;overflow-y:auto;font-size:.7rem;line-height:1.55;scrollbar-width:none}
        #output::-webkit-scrollbar{display:none}
        .lo{padding:1px 0}.lok{color:var(--green)}.ler{color:var(--red)}.lw{color:#ffaa00}.li{color:var(--blue)}.ls{color:#666}
        .meter-w{margin-top:auto}.meter-lbl{font-size:.48rem;color:#444;display:flex;justify-content:space-between;margin-bottom:2px}
        #meter{width:100%;height:9px;background:#000;border:1px solid #1a1a1a;border-radius:2px;overflow:hidden}
        #meterFill{width:0;height:100%;background:linear-gradient(90deg,var(--green) 0%,#ccff00 70%,var(--red) 100%);transition:width .06s linear}
        .side{display:flex;flex-direction:column;gap:8px;min-height:0;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#222 transparent}
        .mod{background:#0e0e0e;padding:12px;border:1px solid #252525;border-radius:4px}
        .mod-t{font-size:.48rem;color:#444;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
        input{width:100%;background:#000;border:1px solid #2a2a2a;color:var(--amber);padding:10px 8px;outline:none;text-align:center;font-size:1.1rem;letter-spacing:3px;margin-bottom:8px;font-family:inherit;border-radius:2px;transition:border .2s}
        input:focus{border-color:var(--amber)}input:disabled{opacity:.25}
        .btn{width:100%;padding:12px 8px;background:#141414;color:#aaa;border:1px solid #333;cursor:pointer;font-weight:bold;font-size:.65rem;text-transform:uppercase;letter-spacing:1px;margin:5px 0;border-radius:3px;transition:all .12s;font-family:inherit}
        .btn:hover:not(:disabled){background:#1e1e1e}.btn:active:not(:disabled){transform:scale(.98)}.btn:disabled{opacity:.2;cursor:not-allowed}
        .btn-h{border-color:#1a4a1a;color:var(--green)}.btn-h:hover:not(:disabled){background:#0a1a0a}
        .btn-j{background:#0a150a;border-color:#0a3a0a;color:var(--green)}.btn-j:hover:not(:disabled){background:#0f200f}
        .btn-d{background:#150505;color:#ff5555;border-color:#300000}
        .ptt{width:100%;height:135px;background:linear-gradient(180deg,#8c3024,#5e1e16);color:#fff;border:4px solid #4a1510;border-radius:8px;font-weight:bold;font-size:1.15rem;cursor:pointer;box-shadow:0 6px 0 #2a0a08,inset 0 1px 0 rgba(255,255,255,.08);font-family:inherit;letter-spacing:2px;user-select:none;-webkit-user-select:none;transition:all .08s}
        .ptt:active:not(:disabled){transform:translateY(4px);box-shadow:0 2px 0 #2a0a08;background:linear-gradient(180deg,#cc3020,#882010)}
        .ptt:disabled{background:#111;color:#333;box-shadow:none;border-color:#1a1a1a}
        .ptt.tx{animation:pttx .5s infinite}
        @keyframes pttx{0%,100%{box-shadow:0 6px 0 #2a0a08,0 0 15px rgba(255,0,0,.25)}50%{box-shadow:0 6px 0 #2a0a08,0 0 35px rgba(255,0,0,.5)}}
        .leds{display:flex;justify-content:space-around;margin-top:10px;font-size:.48rem;text-transform:uppercase;letter-spacing:1px}
        .led-i{display:flex;align-items:center;gap:4px}
        .ld{width:9px;height:9px;border-radius:50%;background:#150505;border:1px solid #2a0000;transition:all .2s}
        .ld.nb{background:var(--blue);box-shadow:0 0 8px var(--blue);border-color:var(--blue)}
        .ld.nr{background:#f00;box-shadow:0 0 10px #f00;border-color:#f00;animation:lbp .5s infinite}
        .ld.ng{background:var(--green);box-shadow:0 0 8px var(--green);border-color:var(--green)}
        @keyframes lbp{0%,100%{opacity:1}50%{opacity:.25}}
        .icedbg{font-size:.46rem;color:#333;margin-top:6px;padding-top:6px;border-top:1px solid #151515;max-height:50px;overflow-y:auto;scrollbar-width:none;word-break:break-all;line-height:1.4}
        .icedbg::-webkit-scrollbar{display:none}
        .vpn-box{background:#0a0a18;border:1px solid #1a1a3a;padding:10px;margin-top:6px;border-radius:3px}
        .vpn-box .mod-t{color:#4466aa}
        .vpn-box p{font-size:.52rem;color:#556;margin:4px 0;line-height:1.4}
        .vpn-box strong{color:#6688cc}
        .turn-row{display:flex;gap:4px;margin:4px 0}
        .turn-row input{font-size:.6rem;padding:6px 4px;letter-spacing:0;margin:0;text-align:left}
    </style>
</head>
<body>
<div class="mainframe">
    <div class="monitor">
        <div class="scanline"></div>
        <div class="rx-badge" id="rxBadge">▶ RX</div>
        <div class="hbar">
            <span>CH: <span id="curCh" style="color:var(--blue)">--</span></span>
            <span>LINK: <span id="linkStat" style="color:#555">OFFLINE</span></span>
            <span>ICE: <span id="iceStat" style="color:#555">--</span></span>
        </div>
        <div id="output"></div>
        <div class="meter-w">
            <div class="meter-lbl"><span>MIC INPUT</span><span id="meterPct">0%</span></div>
            <div id="meter"><div id="meterFill"></div></div>
        </div>
    </div>
    <div class="side">
        <div class="mod">
            <div class="mod-t">Channel</div>
            <input type="number" id="inChan" value="42" min="1" max="99">
            <div class="mod-t" style="margin-top:2px">Secret</div>
            <input type="password" id="inSec" value="tacsecure2026">
            <button class="btn btn-h" id="bHost" onclick="goHost()">1. HOST (WiFi device)</button>
            <button class="btn btn-j" id="bJoin" onclick="goJoin()">2. JOIN (5G device)</button>
            <div class="vpn-box">
                <div class="mod-t">5G Connection Required</div>
                <p><strong>Airtel/Jio 5G uses CGNAT</strong> — P2P is blocked.</p>
                <p><strong>Solution:</strong> Enable ANY VPN on the 5G phone, then tap JOIN. No extra config needed.</p>
            </div>
        </div>
        <div class="mod" style="text-align:center">
            <button class="ptt" id="pttBtn" disabled>HOLD TO TX</button>
            <div class="leds">
                <div class="led-i"><div class="ld" id="ldNet"></div>LINK</div>
                <div class="led-i"><div class="ld" id="ldTx"></div>TX</div>
                <div class="led-i"><div class="ld" id="ldRx"></div>RX</div>
            </div>
            <div class="icedbg" id="iceDbg"></div>
        </div>
        <div class="mod" style="padding:8px 12px">
            <button class="btn btn-d" onclick="doReset()" style="margin:0">HARD RESET</button>
        </div>
    </div>
</div>

<script>
let peer=null, conn=null, localStream=null, audioCtx=null, recorder=null, analyser=null, cryptoKey=null;
let isPTT=false, role=null, retryT=null, connTimeout=null, iceCheckT=null;
const PFX="TAC04-";

/* ── Logging ── */
function L(m,c=''){
    const o=document.getElementById('output'),d=document.createElement('div');
    d.className='lo '+c;
    const t=new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
    d.textContent=`[${t}] ${m}`;
    o.appendChild(d);o.scrollTop=o.scrollHeight;
}
function iceLog(m){
    const el=document.getElementById('iceDbg');
    const t=new Date().toLocaleTimeString('en-US',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'});
    el.textContent=`[${t}] ${m}`;
}

/* ── Crypto ── */
async function deriveKey(pw){
    const e=new TextEncoder();
    const b=await crypto.subtle.importKey("raw",e.encode(pw),"PBKDF2",false,["deriveKey"]);
    return crypto.subtle.deriveKey({name:"PBKDF2",salt:e.encode("TAC04-SALT"),iterations:100000,hash:"SHA-256"},b,{name:"AES-GCM",length:256},false,["encrypt","decrypt"]);
}
async function enc(buf){
    const iv=crypto.getRandomValues(new Uint8Array(12));
    const ct=await crypto.subtle.encrypt({name:"AES-GCM",iv},cryptoKey,buf);
    const out=new Uint8Array(12+ct.byteLength);
    out.set(iv,0);out.set(new Uint8Array(ct),12);
    return out.buffer;
}
async function dec(buf){
    const d=new Uint8Array(buf);
    return crypto.subtle.decrypt({name:"AES-GCM",iv:d.slice(0,12)},cryptoKey,d.slice(12));
}

/* ── Audio ── */
async function initAudio(){
    localStream=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:true,noiseSuppression:true,autoGainControl:true,sampleRate:48000}});
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();analyser.fftSize=256;analyser.smoothingTimeConstant=0.5;
    audioCtx.createMediaStreamSource(localStream).connect(analyser);
    const mime=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus':'audio/webm';
    recorder=new MediaRecorder(localStream,{mimeType:mime});
    recorder.ondataavailable=async e=>{
        if(!conn?.open||!isPTT||!e.data?.size)return;
        try{conn.send(new Uint8Array(await enc(await e.data.arrayBuffer())))}catch(er){L("TX fail: "+er.message,"ler")}
    };
    meterLoop();
    L("Mic OK (48kHz Opus)","ls");
}
function meterLoop(){
    if(!analyser){requestAnimationFrame(meterLoop);return}
    const d=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(d);
    const v=Math.min(100,d.reduce((a,b)=>a+b,0)/d.length*2.5);
    document.getElementById('meterFill').style.width=v+'%';
    document.getElementById('meterPct').textContent=Math.round(v)+'%';
    requestAnimationFrame(meterLoop);
}

/* ── PTT ── */
function pttOn(){
    if(!conn?.open||!recorder)return;
    if(audioCtx?.state==='suspended')audioCtx.resume();
    if(recorder.state==='inactive')recorder.start(100);
    isPTT=true;
    document.getElementById('ldTx').classList.add('nr');
    document.getElementById('pttBtn').classList.add('tx');
}
function pttOff(){
    isPTT=false;
    if(recorder?.state==='recording'){recorder.stop();setTimeout(()=>{},60)}
    document.getElementById('ldTx').classList.remove('nr');
    document.getElementById('pttBtn').classList.remove('tx');
}
const pb=document.getElementById('pttBtn');
pb.addEventListener('mousedown',e=>{e.preventDefault();pttOn()});
pb.addEventListener('mouseup',e=>{e.preventDefault();pttOff()});
pb.addEventListener('mouseleave',()=>{if(isPTT)pttOff()});
pb.addEventListener('touchstart',e=>{e.preventDefault();pttOn()},{passive:false});
pb.addEventListener('touchend',e=>{e.preventDefault();pttOff()},{passive:false});
pb.addEventListener('touchcancel',()=>{if(isPTT)pttOff()});

/* ── ICE Servers (STUN only — VPN handles the rest) ── */
const STUN_ONLY=[
    {urls:"stun:stun.l.google.com:19302"},
    {urls:"stun:stun1.l.google.com:19302"},
    {urls:"stun:stun2.l.google.com:19302"},
    {urls:"stun:stun3.l.google.com:19302"},
    {urls:"stun:stun4.l.google.com:19302"},
    {urls:"stun:stun.stunprotocol.org:3478"},
    {urls:"stun:stun.voip.eutelia.it:3478"}
];

function getIceServers(){
    /* If user provided custom TURN, add it */
    const tu=document.getElementById('inTurn').value.trim();
    const tuu=document.getElementById('inTurnU').value.trim();
    const tuc=document.getElementById('inTurnC').value.trim();
    const servers=[...STUN_ONLY];
    if(tu&&tuu&&tuc){
        servers.push({urls:tu,username:tuu,credential:tuc});
        if(!tu.includes('transport=tcp')){
            servers.push({urls:tu.replace(/:\d+/,'')+':443?transport=tcp',username:tuu,credential:tuc});
        }
        L("Custom TURN server added","li");
    }
    return servers;
}

/* ── Connection handling ── */
function wireConn(c){
    conn=c;
    clearTimeout(connTimeout);

    /* Monitor ICE */
    iceCheckT=setInterval(()=>{
        try{
            const pc=conn._dc?.peerConnection;
            if(!pc)return;
            const s=pc.iceConnectionState;
            const el=document.getElementById('iceStat');
            if(s){el.textContent=s.toUpperCase();
                if(s==='connected'||s==='completed'){el.style.color='var(--green)';clearInterval(iceCheckT);L("ICE connected ("+s+")","lok")}
                else if(s==='failed'){el.style.color='var(--red)';clearInterval(iceCheckT);L("ICE FAILED — see diagnosis below","ler");L("If on 5G without VPN: enable VPN and retry","lw")}
                else if(s==='checking'){el.style.color='#ffaa00'}
                else{el.style.color='#888'}
            }
            pc.oniceconnectionstatechange=()=>{iceLog("ICE→"+pc.iceConnectionState)};
            pc.onicecandidate=ev=>{if(ev.candidate)iceLog(ev.candidate.type+': '+ev.candidate.address);else iceLog("ICE gathering done")};
            clearInterval(iceCheckT);
        }catch(e){}
    },300);

    conn.on('open',()=>{
        clearTimeout(retryT);
        document.getElementById('ldNet').classList.add('ng');
        document.getElementById('pttBtn').disabled=false;
        document.getElementById('linkStat').textContent='AES-256 ACTIVE';
        document.getElementById('linkStat').style.color='var(--green)';
        lockInputs(true);
        L("╔══════════════════════════════════╗","lok");
        L("║  SECURE LINK ESTABLISHED         ║","lok");
        L("║  AES-256-GCM E2EE ACTIVE         ║","lok");
        L("║  Hold red button to transmit     ║","lok");
        L("╚══════════════════════════════════╝","lok");
    });

    conn.on('data',async raw=>{
        if(!(raw instanceof ArrayBuffer))return;
        const rx=document.getElementById('ldRx'),rb=document.getElementById('rxBadge');
        rx.classList.add('ng');rb.classList.add('on');
        setTimeout(()=>{rx.classList.remove('ng');rb.classList.remove('on')},700);
        try{
            const blob=new Blob([await dec(raw)],{type:'audio/webm'});
            const a=new Audio(URL.createObjectURL(blob));
            a.onended=()=>URL.revokeObjectURL(a.src);
            a.onerror=()=>{URL.revokeObjectURL(a.src);L("Audio playback error","ler")};
            await a.play();
        }catch(e){L("Decrypt failed — wrong secret?","ler")}
    });

    conn.on('close',()=>{L("Link closed by remote","ler");resetUI()});
    conn.on('error',err=>{
        const m=err?.message||err?.type||typeof err==='string'?err:JSON.stringify(err);
        L("Connection error: "+m,"ler");
        if(m.includes('serialization')||m.includes('binary')||m.includes('ArrayBuffer'))
            L("Serialization error — ensure both devices use same code version","lw");
        else if(m.includes('timeout'))
            L("Connection timed out — check network, try VPN on 5G","lw");
        else
            L("If on 5G: enable VPN, then retry JOIN","lw");
    });

    /* Hard timeout */
    connTimeout=setTimeout(()=>{
        if(conn&&!conn.open){
            L("Connection timeout (20s)","ler");
            L("Diagnosis:","lw");
            L("  • WiFi↔WiFi: check same channel number","ls");
            L("  • 5G device: YOU MUST ENABLE VPN FIRST","lw");
            L("  • Both: check same secret key","ls");
            try{conn.close()}catch(e){}
            resetUI();
        }
    },20000);
}

function lockInputs(lock){
    document.getElementById('bHost').disabled=lock;
    document.getElementById('bJoin').disabled=lock;
    document.getElementById('inChan').disabled=lock;
    document.getElementById('inSec').disabled=lock;
}
function resetUI(){
    clearTimeout(retryT);clearTimeout(connTimeout);clearInterval(iceCheckT);
    ['ldNet','ldTx','ldRx'].forEach(id=>document.getElementById(id).className='ld');
    document.getElementById('pttBtn').disabled=true;
    document.getElementById('pttBtn').classList.remove('tx');
    document.getElementById('linkStat').textContent='OFFLINE';
    document.getElementById('linkStat').style.color='#555';
    document.getElementById('iceStat').textContent='--';
    document.getElementById('iceStat').style.color='#555';
    document.getElementById('iceDbg').textContent='';
    lockInputs(false);
}

/* ── Host ── */
async function goHost(){
    const ch=document.getElementById('inChan').value.trim();
    const pw=document.getElementById('inSec').value.trim();
    if(!ch||ch<1||ch>99)return L("Channel: enter 1-99","ler");
    if(pw.length<4)return L("Secret: min 4 characters","ler");
    role='host';
    const id=PFX+ch;
    document.getElementById('curCh').textContent=id;
    lockInputs(true);
    L("Starting HOST on WiFi...","li");
    try{
        await initAudio();
        cryptoKey=await deriveKey(pw);
        peer=new Peer(id,{config:{iceServers:getIceServers()},debug:0});
        peer.on('open',()=>{L("Host online: "+id,"lok");L("Waiting for client to join...","ls");document.getElementById('linkStat').textContent='LISTENING';document.getElementById('linkStat').style.color='var(--blue)'});
        peer.on('connection',c=>{L("Incoming connection!","li");wireConn(c)});
        peer.on('error',err=>{
            if(err.type==='unavailable-id'){L("Channel "+ch+" occupied — pick different number","ler");lockInputs(false)}
            else{L("Peer error: "+err.type,"ler");if(err.type==='network'||err.type==='server-error'){L("Retrying in 5s...","ls");clearTimeout(retryT);retryT=setTimeout(()=>{peer.destroy();goHost()},5000)}}
        });
        peer.on('disconnected',()=>{L("Server lost, reconnecting...","lw");if(peer&&!peer.destroyed)peer.reconnect()});
    }catch(e){L("Mic error: "+e.message,"ler");lockInputs(false)}
}

/* ── Joiner ── */
async function goJoin(){
    const ch=document.getElementById('inChan').value.trim();
    const pw=document.getElementById('inSec').value.trim();
    if(!ch||ch<1||ch>99)return L("Channel: enter 1-99","ler");
    if(pw.length<4)return L("Secret: min 4 characters","ler");
    role='joiner';
    const target=PFX+ch;
    document.getElementById('curCh').textContent=target;
    lockInputs(true);
    L("Starting CLIENT on mobile...","li");
    L("Target: "+target,"ls");
    try{
        await initAudio();
        cryptoKey=await deriveKey(pw);
        peer=new Peer(undefined,{config:{iceServers:getIceServers()},debug:0});
        peer.on('open',myId=>{
            L("My ID: "+myId,"ls");
            L("Connecting to host...","li");
            L("STUN-only mode — VPN required for 5G CGNAT","lw");
            const c=peer.connect(target,{reliable:true,serialization:'binary'});
            wireConn(c);
        });
        peer.on('error',err=>{
            if(err.type==='peer-unavailable'){
                L("Host NOT FOUND on channel "+ch,"ler");
                L("Is the WiFi device running HOST?","lw");
                L("Retrying in 5s...","ls");
                clearTimeout(retryT);
                retryT=setTimeout(()=>{if(peer&&!peer.destroyed){peer.destroy();goJoin()}},5000);
            }else{
                L("Peer error: "+err.type+(err.message?' — '+err.message:''),"ler");
                if(err.type==='network'||err.type==='server-error'){
                    L("Retrying in 5s...","ls");
                    clearTimeout(retryT);
                    retryT=setTimeout(()=>{if(peer&&!peer.destroyed){peer.destroy();goJoin()}},5000);
                }
            }
        });
        peer.on('disconnected',()=>{L("Server lost, reconnecting...","lw");if(peer&&!peer.destroyed)peer.reconnect()});
    }catch(e){L("Mic error: "+e.message,"ler");lockInputs(false)}
}

/* ── Reset ── */
function doReset(){
    clearTimeout(retryT);clearTimeout(connTimeout);clearInterval(iceCheckT);
    pttOff();
    try{if(recorder?.state!=='inactive')recorder.stop()}catch(e){}
    try{localStream?.getTracks().forEach(t=>t.stop())}catch(e){}
    try{audioCtx?.close()}catch(e){}
    try{conn?.close()}catch(e){}
    if(peer&&!peer.destroyed)peer.destroy();
    peer=null;conn=null;localStream=null;audioCtx=null;recorder=null;analyser=null;cryptoKey=null;isPTT=false;role=null;
    resetUI();
    document.getElementById('output').innerHTML='';
    document.getElementById('meterFill').style.width='0%';
    document.getElementById('meterPct').textContent='0%';
    document.getElementById('curCh').textContent='--';
    L("SYSTEM RESET","ls");
    L("WiFi → HOST | 5G → JOIN (VPN first!)","li");
}

/* ── Boot ── */
L("TAC/COM-04 SECURE VOICE TERMINAL","lok");
L("WebRTC + PeerJS + AES-256-GCM","ls");
L("","ls");
L("SETUP:","li");
L("  1. WiFi device → [HOST]","li");
L("  2. 5G device → enable VPN → [JOIN]","li");
L("  3. Same channel + same secret on both","li");
L("","ls");
L("WARNING: 5G WILL NOT WORK WITHOUT VPN","lw");
</script>
</body>
</html>
