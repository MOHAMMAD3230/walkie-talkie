<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM | GLOBAL</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --amber: #ffb000; --bg: #0d0900; --red: #8c3024; --blue: #00d4ff; --green: #39ff14; }
        body { background: #050505; color: var(--amber); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; touch-action: manipulation; overflow: hidden; }
        .mainframe { width: 95%; max-width: 850px; background: #222; border: 6px solid #111; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 0 60px #000; box-sizing: border-box; }
        @media (min-width: 768px) { .mainframe { display: grid; grid-template-columns: 1fr 280px; height: 500px; gap: 20px; } }
        .monitor { background: var(--bg); border: 8px solid #1a1a1a; border-radius: 10px; padding: 15px; flex-grow: 1; display: flex; flex-direction: column; position: relative; border-left: 4px solid var(--amber); }
        #output { height: 180px; overflow-y: auto; font-size: 0.75rem; scrollbar-width: none; margin-bottom: 10px; opacity: 0.8; }
        .module { background: #111; padding: 10px; border: 1px solid #333; margin-bottom: 10px; }
        .btn-ptt { width: 100%; height: 120px; background: var(--red); color: white; border: 4px solid #5e1e16; font-weight: bold; font-size: 1.1rem; cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent; }
        .btn-ptt:active:not(:disabled) { background: #f00; filter: brightness(1.2); }
        .btn-ptt:disabled { background: #222; color: #444; border-color: #111; }
        .btn-action { width: 100%; padding: 8px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; font-size: 0.7rem; font-weight: bold; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--amber); padding: 8px; box-sizing: border-box; text-align: center; font-size: 1rem; }
        .status-led { width: 10px; height: 10px; border-radius: 50%; background: #200; display: inline-block; margin-right: 5px; }
        .online { background: var(--blue); box-shadow: 0 0 8px var(--blue); }
        .tx { background: #f00; box-shadow: 0 0 8px #f00; }
        #meter { width: 100%; height: 6px; background: #000; border: 1px solid #333; margin-top: auto; overflow: hidden; }
        #meter-fill { width: 0%; height: 100%; background: var(--green); transition: width 0.1s; }
    </style>
</head>
<body>

<div class="mainframe">
    <audio id="remoteAudio" autoplay playsinline style="display:none;"></audio>

    <div class="monitor">
        <div style="font-size: 0.6rem; display:flex; justify-content:space-between; margin-bottom:10px; color:#666;">
            <span>FREQ: <span id="curFreq" style="color:var(--blue)">---</span></span>
            <span>DATA-RELAY: <span id="stat">SCANNING</span></span>
        </div>
        <div id="output"><div>> INITIALIZE SYSTEM HARDWARE...</div></div>
        <div id="meter"><div id="meter-fill"></div></div>
    </div>

    <div class="side-panel">
        <div class="module">
            <input type="number" id="chanInput" value="1" placeholder="CH">
            <button class="btn-action" id="bootBtn" onclick="initSystem()" style="margin-top:8px; border-color:var(--green); color:var(--green);">SYNC CHANNEL</button>
        </div>

        <div class="module" style="text-align:center;">
            <button class="btn-ptt" id="pttBtn" disabled>HOLD TO TALK</button>
            <div style="margin-top:10px; font-size:0.5rem; display:flex; justify-content:space-around; color:#888;">
                <span><div class="status-led" id="ledNet"></div> LINK</span>
                <span><div class="status-led" id="ledTx"></div> TRANS</span>
            </div>
        </div>
        <button class="btn-action" onclick="location.reload()" style="background:#1a0000; color:#f66;">REBOOT</button>
    </div>
</div>

<script>
    let peer, conn, localStream, audioCtx, delayNode, analyser, speakerGain, micSource;
    const APP_ID = "TAC_OMNI_RELAY_"; 

    function log(msg, color="#ffb000") {
        const div = document.createElement('div');
        div.innerHTML = `<span style="color:#555">[${new Date().toLocaleTimeString()}]</span> <span style="color:${color}">${msg}</span>`;
        const out = document.getElementById('output');
        out.appendChild(div); out.scrollTop = out.scrollHeight;
    }

    async function initSystem() {
        const ch = document.getElementById('chanInput').value;
        try {
            // Enhanced constraints for mobile 5G noise environments
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { 
                    echoCancellation: true, 
                    noiseSuppression: true, 
                    autoGainControl: true,
                    channelCount: 1 
                } 
            });

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            speakerGain = audioCtx.createGain();
            speakerGain.gain.value = 1;
            
            delayNode = audioCtx.createDelay(2.0);
            delayNode.delayTime.value = 1.5; // Satellite delay simulator
            
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 256;

            // PRE-MUTE EVERYTHING
            toggleComms(false);

            document.getElementById('bootBtn').disabled = true;
            document.getElementById('curFreq').innerText = "CH-" + ch;
            
            initPeerConnection(APP_ID + ch);
            updateMeter();
            log("HARDWARE READY. ATTEMPTING HANDSHAKE.", "var(--green)");
        } catch(e) { log("MIC ACCESS ERROR", "red"); }
    }

    function initPeerConnection(targetId) {
        // Updated STUN config for better 5G traversal
        const config = {
            'iceServers': [
                { 'urls': 'stun:stun.l.google.com:19302' },
                { 'urls': 'stun:stun1.l.google.com:19302' },
                { 'urls': 'stun:stun.services.mozilla.com' }
            ],
            'sdpSemantics': 'unified-plan'
        };

        peer = new Peer(targetId, { config });

        peer.on('open', () => {
            log("LISTENING ON CHANNEL...", "var(--blue)");
            setTimeout(() => { if(!conn) tryConnect(targetId); }, 1500);
        });

        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                peer.destroy();
                peer = new Peer({ config });
                peer.on('open', () => tryConnect(targetId));
            } else {
                log("NET ERR: " + err.type, "red");
            }
        });

        peer.on('connection', c => { conn = c; setupRemote(); });
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', stream => setupAudio(stream));
        });
    }

    function tryConnect(tid) {
        log("SCANNING FOR PEERS...");
        conn = peer.connect(tid);
        const call = peer.call(tid, localStream);
        call.on('stream', stream => setupAudio(stream));
        setupRemote();
    }

    function setupAudio(stream) {
        const remoteSource = audioCtx.createMediaStreamSource(stream);
        // Connect through delay and gain
        remoteSource.connect(delayNode);
        delayNode.connect(analyser);
        analyser.connect(speakerGain);
        speakerGain.connect(audioCtx.destination);
        log("REMOTE UPLINK SYNCED.", "var(--green)");
    }

    function setupRemote() {
        conn.on('open', () => {
            document.getElementById('ledNet').classList.add('online');
            document.getElementById('pttBtn').disabled = false;
            document.getElementById('stat').innerText = "CONNECTED";
            log("SECURE LINK ESTABLISHED.", "var(--blue)");
        });
        conn.on('data', data => {
            if(data === 'TX_ON') document.getElementById('ledTx').classList.add('tx');
            if(data === 'TX_OFF') {
                document.getElementById('ledTx').classList.remove('tx');
                playBeep(400, 0.2); 
            }
        });
    }

    function toggleComms(isTransmitting) {
        if (!localStream) return;
        // 1. MIC CONTROL
        localStream.getAudioTracks().forEach(t => t.enabled = isTransmitting);
        
        // 2. SPEAKER CONTROL (The Echo Killer)
        // We mute our own speakers while we talk so the mic can't hear the delay
        if (speakerGain) {
            speakerGain.gain.setValueAtTime(isTransmitting ? 0 : 1, audioCtx.currentTime);
        }
    }

    function playBeep(f, d) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = f; g.gain.value = 0.05;
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start();
        g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + d);
        osc.stop(audioCtx.currentTime + d);
    }

    function updateMeter() {
        if(!analyser) return;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
        let sum = dataArray.reduce((a, b) => a + b, 0);
        document.getElementById('meter-fill').style.width = Math.min(100, (sum/dataArray.length)*5) + "%";
        requestAnimationFrame(updateMeter);
    }

    const ptt = document.getElementById('pttBtn');
    const pttOn = (e) => { 
        if(e) e.preventDefault();
        if(!conn || ptt.disabled) return;
        toggleComms(true);
        conn.send('TX_ON');
        document.getElementById('ledTx').classList.add('tx');
        playBeep(1000, 0.05);
    };
    const pttOff = (e) => { 
        if(e) e.preventDefault();
        if(!conn || ptt.disabled) return;
        toggleComms(false);
        conn.send('TX_OFF');
        document.getElementById('ledTx').classList.remove('tx');
        playBeep(400, 0.2);
    };

    ptt.onmousedown = pttOn; ptt.onmouseup = pttOff;
    ptt.addEventListener('touchstart', pttOn);
    ptt.addEventListener('touchend', pttOff);
</script>
</body>
</html>
