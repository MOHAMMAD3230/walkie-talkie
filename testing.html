<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 | HARD-GATE</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --amber: #ffb000; --bg: #0d0900; --red: #8c3024; --blue: #00d4ff; --green: #39ff14; }
        body { background: #050505; color: var(--amber); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; touch-action: manipulation; overflow: hidden; }
        .mainframe { width: 95%; max-width: 850px; background: #222; border: 6px solid #111; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 0 60px #000; box-sizing: border-box; }
        @media (min-width: 768px) { .mainframe { display: grid; grid-template-columns: 1fr 320px; height: 600px; gap: 20px; } }
        .monitor { background: var(--bg); border: 10px solid #1a1a1a; border-radius: 15px; padding: 20px; flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #output { height: 200px; overflow-y: auto; font-size: 0.8rem; scrollbar-width: none; border-bottom: 1px solid #333; margin-bottom: 10px; }
        .module { background: #111; padding: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .btn-ptt { width: 100%; height: 140px; background: var(--red); color: white; border: 5px solid #5e1e16; font-weight: bold; font-size: 1.3rem; cursor: pointer; user-select: none; }
        .btn-ptt:active:not(:disabled) { background: #f00; box-shadow: 0 0 15px #f00; }
        .btn-ptt:disabled { background: #333; opacity: 0.2; }
        .btn-action { width: 100%; padding: 10px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--amber); padding: 10px; box-sizing: border-box; }
        .status-led { width: 12px; height: 12px; border-radius: 50%; background: #200; display: inline-block; }
        .online { background: var(--blue); box-shadow: 0 0 10px var(--blue); }
        .tx { background: #f00; box-shadow: 0 0 10px #f00; }
        #meter { width: 100%; height: 10px; background: #000; border: 1px solid #333; margin-top: auto; }
        #meter-fill { width: 0%; height: 100%; background: var(--amber); transition: width 0.1s; }
    </style>
</head>
<body>

<div class="mainframe">
    <audio id="remoteAudio" autoplay playsinline style="display:none;"></audio>

    <div class="monitor">
        <div style="font-size: 0.6rem; display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>ID: <span id="myId" style="color:var(--blue)">----</span></span>
            <span>GATE: <span id="gateStat" style="color:gray">LOCKED</span></span>
        </div>
        <div id="output"><div>> WAITING FOR INITIALIZATION...</div></div>
        <div id="meter"><div id="meter-fill"></div></div>
    </div>

    <div class="side-panel">
        <div class="module">
            <button class="btn-action" id="bootBtn" onclick="unlockAudio()" style="border-color:var(--green); color:var(--green);">1. BOOT AUDIO ENGINE</button>
        </div>
        <div class="module">
            <input type="text" id="targetId" placeholder="Target Unit ID...">
            <button class="btn-action" onclick="startUplink()" style="margin-top:5px;">2. ESTABLISH LINK</button>
        </div>
        <div class="module" style="text-align:center;">
            <button class="btn-ptt" id="pttBtn" disabled>HOLD TO TRANSMIT</button>
            <div style="margin-top:10px; font-size:0.5rem; display:flex; justify-content:space-around; color:#555;">
                <span><div class="status-led" id="ledNet"></div> LINK</span>
                <span><div class="status-led" id="ledTx"></div> TX</span>
            </div>
        </div>
    </div>
</div>

<script>
    let peer, conn, localStream, audioCtx, delayNode, analyser;
    let isTransmitting = false;

    function log(msg, color="#ffb000") {
        const div = document.createElement('div');
        div.innerText = `> ${msg}`; div.style.color = color;
        const out = document.getElementById('output');
        out.appendChild(div); out.scrollTop = out.scrollHeight;
    }

    async function unlockAudio() {
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true } 
            });

            // FORCE MUTE ON BOOT
            setMicEnabled(false);

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            delayNode = audioCtx.createDelay(5.0);
            delayNode.delayTime.value = 1.5;
            
            analyser = audioCtx.createAnalyser();
            delayNode.connect(analyser);
            analyser.connect(audioCtx.destination);
            
            document.getElementById('bootBtn').style.display = "none";
            updateMeter();
            initPeer();
            log("HARDWARE READY. GATE SECURED.", "var(--green)");
        } catch(e) { log("MIC ACCESS DENIED", "red"); }
    }

    function setMicEnabled(on) {
        if (localStream) {
            localStream.getAudioTracks().forEach(t => t.enabled = on);
            isTransmitting = on;
            document.getElementById('gateStat').innerText = on ? "OPEN" : "LOCKED";
            document.getElementById('gateStat').style.color = on ? "red" : "gray";
        }
    }

    function initPeer() {
        peer = new Peer({ config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] } });
        peer.on('open', id => { document.getElementById('myId').innerText = id; log("ID: " + id, "var(--blue)"); });
        peer.on('connection', c => { conn = c; setupHandlers(); });
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', stream => {
                document.getElementById('remoteAudio').srcObject = stream;
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(delayNode);
                log("INCOMING STREAM DETECTED.");
            });
        });
    }

    function startUplink() {
        const tid = document.getElementById('targetId').value.trim();
        if(!tid) return;
        conn = peer.connect(tid);
        const call = peer.call(tid, localStream);
        call.on('stream', stream => {
            document.getElementById('remoteAudio').srcObject = stream;
            const source = audioCtx.createMediaStreamSource(stream);
            source.connect(delayNode);
        });
        setupHandlers();
    }

    function setupHandlers() {
        conn.on('open', () => {
            document.getElementById('ledNet').classList.add('online');
            document.getElementById('pttBtn').disabled = false;
            log("UPLINK ACTIVE.", "var(--green)");
        });
        conn.on('data', data => {
            if(data === 'TX_ON') document.getElementById('ledTx').classList.add('tx');
            if(data === 'TX_OFF') {
                document.getElementById('ledTx').classList.remove('tx');
                setTimeout(() => playBeep(450, 0.2), 1500);
            }
        });
    }

    function updateMeter() {
        if(!analyser) return;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
        let sum = dataArray.reduce((a, b) => a + b, 0);
        
        // ONLY SHOW METER ACTIVITY IF WE ARE TRANSMITTING
        let val = isTransmitting ? (sum/dataArray.length)*4 : 0;
        document.getElementById('meter-fill').style.width = Math.min(100, val) + "%";
        requestAnimationFrame(updateMeter);
    }

    function playBeep(f, d) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = f; g.gain.value = 0.05;
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start();
        g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + d);
        osc.stop(audioCtx.currentTime + d);
    }

    const ptt = document.getElementById('pttBtn');
    const pttOn = () => { 
        if(!conn || ptt.disabled) return;
        setMicEnabled(true);
        conn.send('TX_ON'); 
        document.getElementById('ledTx').classList.add('tx'); 
        playBeep(1200, 0.05); 
    };
    const pttOff = () => { 
        if(!conn || ptt.disabled) return;
        setMicEnabled(false);
        conn.send('TX_OFF'); 
        document.getElementById('ledTx').classList.remove('tx'); 
        playBeep(450, 0.2); 
    };

    ptt.onmousedown = pttOn; ptt.onmouseup = pttOff;
    ptt.addEventListener('touchstart', (e) => { e.preventDefault(); pttOn(); });
    ptt.addEventListener('touchend', (e) => { e.preventDefault(); pttOff(); });
</script>
</body>
</html>
