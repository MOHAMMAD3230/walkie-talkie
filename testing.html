<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM v11.4 | UNIVERSAL_MOBILE_FRIENDLY</title>
    <script src="https://cdn.jsdelivr.net/npm/mqtt@5.10.4/dist/mqtt.min.js"></script>
    <style>
        :root {
            --g: #39ff14; --b: #00d4ff; --r: #ff3131; --y: #ffcc00;
            --case: #1a1a1a; --chassis-w: clamp(300px, 92vw, 360px);
        }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body {
            background: #000; color: var(--g); font-family: 'Courier New', monospace;
            margin: 0; padding: 10px; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            overflow-x: hidden;
        }
        
        #scannerCanvas { position: fixed; inset: 0; z-index: -1; opacity: 0.08; }

        /* Responsive Chassis */
        .chassis {
            width: var(--chassis-w);
            min-height: 85vh; max-height: 95vh;
            background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
            border: 10px solid #252525; border-radius: 25px 25px 60px 60px;
            padding: 20px; box-shadow: inset 0 0 50px #000, 0 30px 80px rgba(0,0,0,0.8);
            position: relative; border-bottom: 25px solid #080808;
            display: flex; flex-direction: column; gap: 10px;
        }

        /* Top Hardware Detail - Scaled for Mobile */
        .antenna { position: absolute; top: -50px; left: 15%; width: 18px; height: 70px; background: #111; border: 3px solid #333; border-radius: 4px; }
        .knob { position: absolute; top: -35px; right: 15%; width: 50px; height: 45px; background: repeating-linear-gradient(90deg, #111, #111 4px, #222 4px, #222 8px); border: 2px solid #333; border-radius: 6px; }

        /* RF_RSSI Signal - Always visible top-left */
        .net-monitor {
            align-self: flex-start; display: flex; flex-direction: column; gap: 3px;
            padding: 8px; background: #000; border: 1px solid #222; border-radius: 4px;
        }
        .sig-bars { display: flex; gap: 3px; align-items: flex-end; height: 16px; }
        .bar { width: 4px; background: #0a0a0a; transition: 0.3s; }
        .bar:nth-child(1) { height: 4px; }
        .bar:nth-child(2) { height: 7px; }
        .bar:nth-child(3) { height: 10px; }
        .bar:nth-child(4) { height: 13px; }
        .bar:nth-child(5) { height: 16px; }

        .sig-red .bar { background: var(--r); box-shadow: 0 0 8px var(--r); }
        .sig-yellow .bar { background: var(--y); box-shadow: 0 0 8px var(--y); }
        .sig-green .bar { background: var(--g); box-shadow: 0 0 8px var(--g); }

        /* Mechanical Switches */
        .pwr-strip { display: flex; gap: 10px; justify-content: center; }
        .mech-btn {
            flex: 1; padding: 12px 5px; background: #1a1a1a; color: #333; font-weight: 900; font-size: 0.65rem;
            border: 1px solid #333; border-bottom: 5px solid #000; cursor: pointer; border-radius: 4px;
            text-transform: uppercase; transition: 0.1s;
        }
        .mech-btn:active { transform: translateY(3px); border-bottom-width: 2px; }
        .pwr-on.active { color: var(--g); border-color: var(--g); }
        .pwr-off.active { color: var(--r); border-color: var(--r); }

        /* LCD Field Screen */
        .screen {
            background: #050505; border: 4px solid #222; border-radius: 4px; padding: 10px;
            height: 140px; position: relative; box-shadow: inset 0 0 25px #000;
        }
        .lit.screen { background: #000a00; border-color: #333; }
        #scope { width: 100%; height: 60px; opacity: 0; }
        .lit #scope { opacity: 1; }

        /* Controls Grid */
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .field { background: #000; border: 2px solid #222; color: var(--b); padding: 10px; font-family: inherit; text-align: center; width: 100%; font-size: 0.9rem; font-weight: bold; border-radius: 4px; }
        .field:focus { border-color: var(--b); outline: none; }
        .link-btn.active-link { border-color: var(--b); color: var(--b); }

        /* PTT Lever - Central Action Area */
        .ptt-box { flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .ptt-lever {
            width: 80%; height: 70px; background: #0a0a0a; border: 3px solid #1a1a1a;
            border-bottom: 8px solid #000; border-radius: 12px; color: #1a1a1a; font-weight: 900;
            font-size: 1.1rem; cursor: not-allowed; letter-spacing: 2px; transition: 0.1s;
            pointer-events: none;
        }
        .ptt-lever.unlocked { background: #1a0000; border-color: #300; color: #300; cursor: pointer; pointer-events: auto; }
        .ptt-lever.unlocked.ready { border-color: var(--r); color: var(--r); }
        .ptt-lever.unlocked:active { transform: translateY(6px); border-bottom-width: 2px; background: var(--r); color: #000; }

        /* Stats Footer */
        .stats-footer { border-top: 2px solid #222; padding-top: 10px; display: flex; flex-direction: column; gap: 4px; }
        .stat { display: flex; justify-content: space-between; font-size: 0.6rem; font-weight: 900; color: #444; }
        .val { color: #555; transition: 0.3s; }
        .lit .val.con { color: var(--g); text-shadow: 0 0 8px var(--g); }

        @media (max-height: 600px) {
            .chassis { min-height: 95vh; padding: 10px; gap: 5px; }
            .screen { height: 100px; }
            .ptt-lever { height: 50px; }
        }
    </style>
</head>
<body>

<canvas id="scannerCanvas"></canvas>

<div class="chassis">
    <div class="antenna"></div>
    <div class="knob"></div>

    <div id="rssi" class="net-monitor">
        <div style="font-size: 0.4rem; color: #222; font-weight: 900; margin-bottom: 2px;">RF_RSSI</div>
        <div class="sig-bars">
            <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
        </div>
    </div>

    <div class="pwr-strip">
        <button id="bOn" class="mech-btn pwr-on" onclick="pwr(true)">Pwr On</button>
        <button id="bOff" class="mech-btn pwr-off active" onclick="pwr(false)">Pwr Off</button>
    </div>

    <div class="screen" id="scr">
        <canvas id="scope"></canvas>
        <div id="sys" style="height:50px; overflow-y:auto; font-size:0.65rem; opacity:0; color:var(--g); padding:5px;"></div>
    </div>

    <div class="input-grid">
        <input type="number" id="ch" class="field" value="88">
        <input type="password" id="key" class="field" value="TAC">
        <button id="hBtn" class="mech-btn link-btn" onclick="conn('host')">Host</button>
        <button id="jBtn" class="mech-btn link-btn" onclick="conn('client')">Join</button>
    </div>

    <div class="ptt-box">
        <button id="ptt" class="ptt-lever">LOCKED</button>
    </div>

    <div class="stats-footer">
        <div class="stat"><span>RF_LINK_STATE:</span><span id="rfSt" class="val">OFFLINE</span></div>
        <div class="stat"><span>PKT_LATENCY:</span><span id="latSt" class="val">--</span></div>
    </div>
</div>

<script>
let mc, mic, actx, ana, pG, ck, isTx=false, isPwr=false, isConn=false, nxt=0;
const SR=12000, TP='uni_v11_4/';

function setRssiColor(ping) {
    const rssi = document.getElementById('rssi');
    rssi.classList.remove('sig-red', 'sig-yellow', 'sig-green');
    if (!isConn) return; 
    if (ping < 150) rssi.classList.add('sig-green');
    else if (ping < 300) rssi.classList.add('sig-yellow');
    else rssi.classList.add('sig-red');
}

function pwr(s) {
    isPwr = s;
    const scr = document.getElementById('scr');
    document.getElementById('bOn').classList.toggle('active', s);
    document.getElementById('bOff').classList.toggle('active', !s);
    if(s) {
        scr.classList.add('lit');
        document.getElementById('sys').style.opacity = "1";
        log("MOBILE_LINK_OK...");
    } else {
        location.reload(); 
    }
}

function log(m) {
    const el = document.getElementById("sys");
    const d = document.createElement('div');
    d.innerText = `> ${m}`;
    el.appendChild(d); el.scrollTop = el.scrollHeight;
}

const bcvs = document.getElementById('scannerCanvas');
const bctx = bcvs.getContext('2d');
let bgCols = [];
function initBg() {
    bcvs.width = window.innerWidth; bcvs.height = window.innerHeight;
    bgCols = new Array(Math.floor(bcvs.width/20)).fill(0).map(()=>Math.random()*bcvs.height);
}
window.onresize = initBg; initBg();

function draw() {
    bctx.fillStyle = 'rgba(0,0,0,0.1)'; bctx.fillRect(0,0,bcvs.width,bcvs.height);
    bctx.font = 'bold 12px monospace'; bctx.fillStyle = '#010';
    bgCols.forEach((y, i) => {
        bctx.fillText(Math.random()>0.8?"1":"0", i*20, y);
        bgCols[i] = y > bcvs.height ? 0 : y + 10;
    });
    
    if(ana && isPwr) {
        const scvs = document.getElementById('scope');
        const sctx = scvs.getContext('2d');
        const data = new Uint8Array(ana.frequencyBinCount);
        ana.getByteTimeDomainData(data);
        sctx.clearRect(0,0,scvs.width,scvs.height);
        sctx.lineWidth = 4; sctx.strokeStyle = '#39ff14';
        sctx.beginPath();
        let x = 0; const step = scvs.width/data.length;
        for(let i=0; i<data.length; i++) {
            let v = data[i]/128.0; let y = v * scvs.height/2;
            if(i===0) sctx.moveTo(x,y); else sctx.lineTo(x,y);
            x += step;
        }
        sctx.stroke();
    }
    requestAnimationFrame(draw);
}
draw();

async function conn(role) {
    if(!isPwr || isConn) return;
    document.getElementById(role==='host'?'hBtn':'jBtn').classList.add('active-link');
    const ch = document.getElementById('ch').value;
    const pass = document.getElementById('key').value;
    
    try {
        mic = await navigator.mediaDevices.getUserMedia({audio:true});
        actx = new (window.AudioContext || window.webkitAudioContext)();
        const src = actx.createMediaStreamSource(mic);
        ana = actx.createAnalyser(); src.connect(ana);
        const proc = actx.createScriptProcessor(2048, 1, 1);
        proc.onaudioprocess = (e) => { if(isTx) transmit(e.inputBuffer.getChannelData(0), ch, role); };
        ana.connect(proc); proc.connect(actx.destination);
        pG = actx.createGain(); pG.gain.value = 2.5; pG.connect(actx.destination);

        const enc = new TextEncoder();
        const km = await crypto.subtle.importKey('raw', enc.encode(pass), 'PBKDF2', false, ['deriveKey']);
        ck = await crypto.subtle.deriveKey({name:'PBKDF2', salt:enc.encode('X'), iterations:1000, hash:'SHA-256'}, km, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);

        const start = Date.now();
        mc = mqtt.connect('wss://broker.emqx.io:8084/mqtt');
        mc.on('connect', () => {
            const lat = Date.now() - start;
            isConn = true;
            setRssiColor(lat);
            document.getElementById('latSt').innerText = lat + "ms";
            document.getElementById('rfSt').innerText = "SECURE_LINK";
            document.getElementById('rfSt').className = "val con";
            const ptt = document.getElementById('ptt');
            ptt.innerText = "TALK";
            ptt.classList.add('unlocked', 'ready');
            mc.subscribe(`${TP}${ch}/${role==='host'?'client':'host'}`);
            log("UPLINK_STABLE");
        });

        mc.on('message', async (t, pay) => {
            try {
                const iv = pay.slice(0, 12);
                const dec = await crypto.subtle.decrypt({name:'AES-GCM', iv}, ck, pay.slice(12));
                play(dec);
            } catch(e) {}
        });

        const ptt = document.getElementById('ptt');
        const down = (e) => { if(isConn) { e.preventDefault(); isTx = true; } };
        const up = (e) => { if(isConn) { e.preventDefault(); isTx = false; } };
        ptt.onmousedown = down; ptt.onmouseup = up;
        ptt.ontouchstart = down; ptt.ontouchend = up;

    } catch(err) { log("MIC_DENIED"); }
}

async function transmit(samples, ch, role) {
    const i16 = new Int16Array(samples.length);
    for(let i=0; i<samples.length; i++) i16[i] = samples[i] * 32767;
    const iv = crypto.getRandomValues(new Uint8Array(12));
    const enc = await crypto.subtle.encrypt({name:'AES-GCM', iv}, ck, i16.buffer);
    const pkt = new Uint8Array(12 + enc.byteLength);
    pkt.set(iv); pkt.set(new Uint8Array(enc), 12);
    mc.publish(`${TP}${ch}/${role}`, pkt);
}

function play(d) {
    const i16 = new Int16Array(d); const f32 = new Float32Array(i16.length);
    for(let i=0; i<i16.length; i++) f32[i] = i16[i] / 32768;
    const buffer = actx.createBuffer(1, f32.length, SR);
    buffer.getChannelData(0).set(f32);
    const src = actx.createBufferSource();
    src.buffer = buffer; src.connect(pG);
    let start = Math.max(actx.currentTime + 0.05, nxt);
    src.start(start); nxt = start + buffer.duration;
}
</script>
</body>
</html>
