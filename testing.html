<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 | CH-TUNER</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --amber: #ffb000; --bg: #0d0900; --red: #8c3024; --blue: #00d4ff; --green: #39ff14; }
        body { background: #050505; color: var(--amber); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; touch-action: manipulation; overflow: hidden; }
        .mainframe { width: 95%; max-width: 850px; background: #222; border: 6px solid #111; padding: 15px; display: flex; flex-direction: column; box-shadow: 0 0 60px #000; box-sizing: border-box; }
        @media (min-width: 768px) { .mainframe { display: grid; grid-template-columns: 1fr 320px; height: 600px; gap: 20px; } }
        .monitor { background: var(--bg); border: 10px solid #1a1a1a; border-radius: 15px; padding: 20px; flex-grow: 1; display: flex; flex-direction: column; position: relative; }
        #output { height: 220px; overflow-y: auto; font-size: 0.8rem; scrollbar-width: none; border-bottom: 1px solid #333; margin-bottom: 10px; }
        .module { background: #111; padding: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .btn-ptt { width: 100%; height: 140px; background: var(--red); color: white; border: 5px solid #5e1e16; font-weight: bold; font-size: 1.3rem; cursor: pointer; transition: 0.1s; }
        .btn-ptt:active:not(:disabled) { background: #f00; transform: scale(0.98); }
        .btn-ptt:disabled { background: #333; opacity: 0.2; }
        .btn-action { width: 100%; padding: 10px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; font-weight: bold; font-size: 0.7rem; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--amber); padding: 10px; box-sizing: border-box; outline: none; text-align: center; font-size: 1.2rem; letter-spacing: 2px; }
        .status-led { width: 12px; height: 12px; border-radius: 50%; background: #200; display: inline-block; }
        .online { background: var(--blue); box-shadow: 0 0 10px var(--blue); }
        .tx { background: #f00; box-shadow: 0 0 10px #f00; }
        #meter { width: 100%; height: 10px; background: #000; border: 1px solid #333; margin-top: auto; }
        #meter-fill { width: 0%; height: 100%; background: var(--green); transition: width 0.1s; }
    </style>
</head>
<body>

<div class="mainframe">
    <audio id="remoteAudio" autoplay playsinline style="display:none;"></audio>

    <div class="monitor">
        <div style="font-size: 0.6rem; display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>FREQ: <span id="curFreq" style="color:var(--blue)">UNSET</span></span>
            <span>UPLINK: <span id="stat">SCANNING</span></span>
        </div>
        <div id="output"><div>> SELECT FREQUENCY CHANNEL TO START...</div></div>
        <div id="meter"><div id="meter-fill"></div></div>
    </div>

    <div class="side-panel">
        <div class="module">
            <div style="font-size: 0.6rem; color: #555; margin-bottom: 5px; text-align: center;">SET FREQUENCY (1-99)</div>
            <input type="number" id="chanInput" value="1" min="1" max="99">
            <button class="btn-action" id="bootBtn" onclick="initChannel()" style="margin-top:10px; border-color:var(--green); color:var(--green);">SET CHANNEL</button>
        </div>

        <div class="module" style="text-align:center;">
            <button class="btn-ptt" id="pttBtn" disabled>HOLD TO TALK</button>
            <div style="margin-top:10px; font-size:0.5rem; display:flex; justify-content:space-around;">
                <span><div class="status-led" id="ledNet"></div> SYNC</span>
                <span><div class="status-led" id="ledTx"></div> TRANS</span>
            </div>
        </div>
        <button class="btn-action" onclick="location.reload()" style="background:#200;">RESET SYSTEM</button>
    </div>
</div>

<script>
    let peer, conn, localStream, audioCtx, delayNode, analyser, speakerGain;
    const APP_PREFIX = "TAC-COM-V1-"; // Unique prefix to avoid other people's traffic

    function log(msg, color="#ffb000") {
        const div = document.createElement('div');
        div.innerText = `> ${msg}`; div.style.color = color;
        const out = document.getElementById('output');
        out.appendChild(div); out.scrollTop = out.scrollHeight;
    }

    async function initChannel() {
        const chanNum = document.getElementById('chanInput').value;
        const fullId = APP_PREFIX + chanNum;
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } 
            });

            muteMic(true);

            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            speakerGain = audioCtx.createGain();
            speakerGain.gain.value = 1;
            delayNode = audioCtx.createDelay(5.0);
            delayNode.delayTime.value = 1.5;
            analyser = audioCtx.createAnalyser();
            
            delayNode.connect(analyser);
            analyser.connect(speakerGain);
            speakerGain.connect(audioCtx.destination);
            
            document.getElementById('bootBtn').disabled = true;
            document.getElementById('curFreq').innerText = "CH-" + chanNum;
            updateMeter();
            
            // Connect as this specific Channel Name
            initPeer(fullId);
            log("TUNING TO CHANNEL " + chanNum + "...", "var(--blue)");
        } catch(e) { log("HARDWARE ERROR", "red"); }
    }

    function initPeer(myId) {
        peer = new Peer(myId, {
            config: { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] }
        });

        peer.on('open', id => { 
            log("CHANNEL ACTIVE. LISTENING FOR PEERS...", "var(--green)"); 
            // After 1 second, try to auto-find anyone else on this channel
            setTimeout(autoConnect, 1000);
        });

        // If someone else calls us
        peer.on('connection', c => { conn = c; setupHandlers(); });
        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', stream => attachStream(stream));
        });

        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                log("CHANNEL BUSY. ATTEMPTING HANDSHAKE...", "var(--amber)");
                // This means someone else is already "hosting" this channel.
                // We will act as the "caller" instead.
                peer.destroy();
                initCallerMode(myId);
            }
        });
    }

    // This handles the "Slave" or "Caller" side of the channel
    function initCallerMode(targetId) {
        peer = new Peer(); // Random ID for us
        peer.on('open', () => {
            log("HANDSHAKE INITIATED...");
            conn = peer.connect(targetId);
            const call = peer.call(targetId, localStream);
            call.on('stream', stream => attachStream(stream));
            setupHandlers();
        });
    }

    function attachStream(stream) {
        const audioEl = document.getElementById('remoteAudio');
        audioEl.srcObject = stream;
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(delayNode);
        log("REMOTE SYNC SUCCESSFUL.");
    }

    function setupHandlers() {
        conn.on('open', () => {
            document.getElementById('ledNet').classList.add('online');
            document.getElementById('pttBtn').disabled = false;
            document.getElementById('stat').innerText = "SYNCED";
            log("VOICE LINK ESTABLISHED.", "var(--green)");
        });
        conn.on('data', data => {
            if(data === 'TX_ON') document.getElementById('ledTx').classList.add('tx');
            if(data === 'TX_OFF') {
                document.getElementById('ledTx').classList.remove('tx');
                setTimeout(() => playBeep(450, 0.2), 1500);
            }
        });
    }

    function muteMic(shouldMute) {
        if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !shouldMute);
        if (speakerGain) speakerGain.gain.setValueAtTime(shouldMute ? 1 : 0, audioCtx.currentTime);
    }

    function updateMeter() {
        if(!analyser) return;
        const dataArray = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteFrequencyData(dataArray);
        let sum = dataArray.reduce((a, b) => a + b, 0);
        document.getElementById('meter-fill').style.width = Math.min(100, (sum/dataArray.length)*4) + "%";
        requestAnimationFrame(updateMeter);
    }

    function playBeep(f, d) {
        if(!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.value = f; g.gain.value = 0.05;
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start();
        g.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + d);
        osc.stop(audioCtx.currentTime + d);
    }

    const ptt = document.getElementById('pttBtn');
    const pttOn = () => { if(!conn || ptt.disabled) return; muteMic(false); conn.send('TX_ON'); document.getElementById('ledTx').classList.add('tx'); playBeep(1200, 0.05); };
    const pttOff = () => { if(!conn || ptt.disabled) return; muteMic(true); conn.send('TX_OFF'); document.getElementById('ledTx').classList.remove('tx'); playBeep(450, 0.2); };

    ptt.onmousedown = pttOn; ptt.onmouseup = pttOff;
    ptt.addEventListener('touchstart', (e) => { e.preventDefault(); pttOn(); });
    ptt.addEventListener('touchend', (e) => { e.preventDefault(); pttOff(); });
</script>
</body>
</html>
