<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TAC/COM-04 | DEBUG RELAY</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --amber: #ffb000; --bg: #0d0900; --red: #8c3024; --blue: #00d4ff; }
        body { background: #050505; color: var(--amber); font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; touch-action: manipulation; }
        .mainframe { width: 95%; max-width: 800px; background: #222; border: 5px solid #111; padding: 15px; display: flex; flex-direction: column; }
        .monitor { background: var(--bg); border: 8px solid #1a1a1a; padding: 15px; flex-grow: 1; min-height: 250px; display: flex; flex-direction: column; box-shadow: inset 0 0 20px #000; }
        #output { height: 180px; overflow-y: auto; font-size: 0.8rem; scrollbar-width: none; border-bottom: 1px solid #333; margin-bottom: 10px; }
        .module { background: #111; padding: 10px; border: 1px solid #333; margin-top: 10px; }
        .btn-ptt { width: 100%; height: 100px; background: var(--red); color: white; border: 4px solid #5e1e16; font-weight: bold; font-size: 1.2rem; cursor: pointer; }
        .btn-ptt:disabled { background: #333; opacity: 0.3; cursor: not-allowed; }
        .btn-action { width: 100%; padding: 10px; background: #333; color: #fff; border: 1px solid #555; cursor: pointer; margin-bottom: 5px; }
        input { width: 100%; background: #000; border: 1px solid #444; color: var(--amber); padding: 8px; box-sizing: border-box; }
        .status-led { width: 10px; height: 10px; border-radius: 50%; background: #200; display: inline-block; }
        .online { background: var(--blue); box-shadow: 0 0 8px var(--blue); }
    </style>
</head>
<body>

<div class="mainframe">
    <div class="monitor">
        <div style="font-size: 0.6rem; display:flex; justify-content:space-between; margin-bottom:10px;">
            <span>ID: <span id="myId" style="color:var(--blue)">WAITING...</span></span>
            <span>STATUS: <span id="stat">IDLE</span></span>
        </div>
        <div id="output"><div>> SYSTEM READY.</div></div>
        <button class="btn-action" id="bootBtn" onclick="unlockAudio()" style="border-color: #39ff14; color: #39ff14;">1. INITIALIZE SYSTEM</button>
    </div>

    <div class="module">
        <input type="text" id="targetId" placeholder="Enter Remote ID...">
        <button class="btn-action" onclick="startUplink()" style="margin-top:5px;">2. LINK TO REMOTE</button>
    </div>

    <div class="module">
        <button class="btn-ptt" id="pttBtn" disabled>PUSH TO TALK</button>
        <div style="margin-top:10px; font-size:0.6rem; text-align:center;">
            <div class="status-led" id="ledNet"></div> NETWORK LINK
        </div>
    </div>
</div>

<script>
    let peer, conn, localStream, audioCtx, delayNode;

    function log(msg, color="#ffb000") {
        const div = document.createElement('div');
        div.innerText = `> ${msg}`; div.style.color = color;
        document.getElementById('output').appendChild(div);
        document.getElementById('output').scrollTop = 9999;
    }

    async function unlockAudio() {
        try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            delayNode = audioCtx.createDelay(5.0);
            delayNode.delayTime.value = 1.5;
            delayNode.connect(audioCtx.destination);
            
            localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
            log("MIC ACCESS GRANTED.");
            document.getElementById('bootBtn').style.display = "none";
            initPeer();
        } catch(e) { log("MIC ERROR: " + e.message, "red"); }
    }

    function initPeer() {
        peer = new Peer();
        peer.on('open', id => { 
            document.getElementById('myId').innerText = id; 
            log("YOUR GLOBAL ID: " + id, "#00d4ff");
        });

        // Receiver Logic: When someone connects to YOU
        peer.on('connection', c => {
            conn = c;
            log("INCOMING CONNECTION...");
            setupData();
        });

        peer.on('call', call => {
            call.answer(localStream);
            call.on('stream', rem => {
                const src = audioCtx.createMediaStreamSource(rem);
                src.connect(delayNode);
                log("AUDIO STREAM CONNECTED.");
            });
        });

        peer.on('error', e => log("PEER ERROR: " + e.type, "red"));
    }

    function startUplink() {
        const tid = document.getElementById('targetId').value.trim();
        if(!tid) return log("ENTER A VALID ID", "red");
        
        log("CONNECTING TO: " + tid);
        conn = peer.connect(tid);
        const call = peer.call(tid, localStream);
        call.on('stream', rem => {
            const src = audioCtx.createMediaStreamSource(rem);
            src.connect(delayNode);
        });
        setupData();
    }

    function setupData() {
        conn.on('open', () => {
            log("UPLINK SUCCESSFUL!", "#39ff14");
            document.getElementById('ledNet').classList.add('online');
            document.getElementById('stat').innerText = "CONNECTED";
            document.getElementById('pttBtn').disabled = false;
        });
        conn.on('close', () => {
            log("CONNECTION LOST.", "red");
            document.getElementById('pttBtn').disabled = true;
            document.getElementById('ledNet').classList.remove('online');
        });
    }

    // PTT Events
    const ptt = document.getElementById('pttBtn');
    const triggerStart = () => { if(!conn || ptt.disabled) return; conn.send('TX_ON'); log("TRANSMITTING..."); };
    const triggerEnd = () => { if(!conn || ptt.disabled) return; conn.send('TX_OFF'); log("IDLE."); };

    ptt.onmousedown = triggerStart; ptt.onmouseup = triggerEnd;
    ptt.addEventListener('touchstart', (e) => { e.preventDefault(); triggerStart(); });
    ptt.addEventListener('touchend', (e) => { e.preventDefault(); triggerEnd(); });
</script>

</body>
</html>
