    <style>
        :root {
            --g: #39ff14; --b: #00d4ff; --r: #ff3131; --y: #ffcc00;
            --case: #1a1a1a; --chassis-w: clamp(320px, 95vw, 380px);

        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: var(--g); font-family: 'Courier New', monospace; margin: 0; padding: 20px; min-height: 100vh; display: flex; justify-content: center; align-items: center; overflow-x: hidden; }
        
        #scannerCanvas { position: fixed; inset: 0; z-index: -1; opacity: 0.1; }

        .chassis {
            width: var(--chassis-w); min-height: 95vh; 
            background: linear-gradient(180deg, #1e1e1e 0%, #0a0a0a 100%);
            border: 12px solid #2a2a2a; border-radius: 35px 35px 75px 75px;

        .antenna-stub { position: absolute; top: -60px; left: 40px; width: 12px; height: 70px; background: #111; border: 3px solid #333; border-radius: 4px 4px 0 0; z-index: -1; }
        
        .top-deck { height: 50px; display: flex; align-items: center; justify-content: space-between; position: relative; padding: 0 5px; margin-bottom: 5px; }
        .sig-bars { display: flex; gap: 3px; align-items: flex-end; height: 22px; }
        .bar { width: 5px; background: #111; border-radius: 1px; transition: 0.2s; }
        
        .indicator-cluster { display: flex; align-items: center; gap: 15px; }
        .nozzle-dial { 
            width: 42px; height: 42px; 
            background: conic-gradient(#222 0deg 90deg, #111 90deg 180deg, #222 180deg 270deg, #111 270deg 360deg); 
            border-radius: 50%; border: 4px solid #444; cursor: pointer; 
            position: relative; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);

        .nozzle-dial::after { content: ''; position: absolute; top: 4px; left: 50%; width: 4px; height: 8px; background: var(--r); transform: translateX(-50%); border-radius: 2px; }

        @keyframes blink-g { 0%, 49% { background: var(--g); box-shadow: 0 0 6px var(--g); } 50%, 100% { background: #030; box-shadow: none; } }
        @keyframes blink-y { 0%, 49% { background: var(--y); box-shadow: 0 0 6px var(--y); } 50%, 100% { background: #330; box-shadow: none; } }
        .led-red, .sig-red .bar { animation: blink-r 1s steps(1) infinite; }
        .led-green, .sig-green .bar { animation: blink-g 1s steps(1) infinite; }
        .led-orange, .sig-orange .bar { animation: blink-y 1s steps(1) infinite; }

        .speaker-grille { width: 100%; height: 40px; background: radial-gradient(circle, #222 1.5px, transparent 2px); background-size: 7px 7px; border: 1px solid #1a1a1a; border-radius: 4px; opacity: 0.4; margin: 5px 0; }
        
        .pwr-strip { display: flex; gap: 10px; }
        .mech-btn { flex: 1; padding: 12px; background: #151515; color: #444; font-weight: 900; font-size: 0.65rem; border: 1px solid #333; border-bottom: 5px solid #000; cursor: pointer; border-radius: 4px; text-transform: uppercase; transition: 0.15s; }
        .mech-btn:active { transform: translateY(2px); border-bottom-width: 3px; }
        .pwr-on.active { color: var(--g); border-color: var(--g); }
        .pwr-off.active { color: var(--r); border-color: var(--r); }

        .screen { background: #050505; border: 4px solid #222; border-radius: 6px; height: 110px; position: relative; padding: 10px; overflow: hidden; }
        .screen::before { content: ""; position: absolute; inset: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); background-size: 100% 2px, 3px 100%; pointer-events: none; z-index: 2; }
        .lit.screen { background: #000a00; border-color: #333; }
        #scope { width: 100%; height: 45px; opacity: 0; }
        .lit #scope { opacity: 1; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .field { background: #000; border: 1px solid #333; color: var(--b); padding: 10px; font-family: inherit; text-align: center; width: 100%; font-weight: bold; border-radius: 4px; font-size: 1rem; }
        .field:focus { outline: none; border-color: var(--b); }

        .action-bay { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.5); padding: 15px; border-radius: 15px; border: 1px solid #222; margin-top: auto; }
        .anc-stack { display: flex; flex-direction: column; align-items: center; gap: 6px; }
        .anc-led { width: 12px; height: 12px; background: #111; border-radius: 50%; border: 2px solid #333; transition: 0.3s; }

        .anc-toggle.on { color: var(--b); border-color: var(--b); }
        .anc-toggle:active { transform: translateY(1px); border-bottom-width: 1px; }

        .ptt-lever { flex-grow: 1; margin-left: 15px; height: 70px; background: #111; border: 3px solid #222; border-bottom: 8px solid #000; border-radius: 12px; color: #222; font-weight: 900; font-size: 1.1rem; cursor: not-allowed; transition: 0.1s; user-select: none; -webkit-user-select: none; }
        .ptt-lever.unlocked { background: #1a0a0a; border-color: #333; color: #333; cursor: pointer; pointer-events: auto; }
        .ptt-lever.unlocked.ready { border-color: var(--r); color: var(--r); }
        .ptt-lever.unlocked:active, .ptt-lever.unlocked.tx { transform: translateY(4px); border-bottom-width: 2px; background: var(--r); color: #000; }

        .stats-footer { border-top: 1px solid #222; padding-top: 10px; display: flex; flex-direction: column; gap: 5px; }
        .stat-line { display: flex; justify-content: space-between; align-items: center; }
        .stat-label { font-size: 0.55rem; font-weight: 900; color: #444; }

        .official-footer { margin-top: 12px; border-top: 1px dashed #1a1a1a; padding-top: 8px; text-align: center; }

<script>
let mc, mic, actx, ana, pG, ck;
let isTx = false, isPwr = false, isConn = false, isAnc = false;
let nxt = 0, rotA = 0, myRole = null, vltTimer = null;
const TP = 'ashraf_v12_4_1/';

/* ── Nozzle Dial ── */
function handleNoz(e) {
    if (!isPwr) return;
    const r = e.target.getBoundingClientRect();
    const cin = document.getElementById('ch');
    if ((e.clientX - r.left) > (r.width / 2)) {
        rotA += 30; cin.value = parseInt(cin.value || 0) + 1; log("FREQ_INC");
    } else {
        rotA -= 30; cin.value = parseInt(cin.value || 0) - 1; log("FREQ_DEC");
    }
    document.getElementById('nozzle').style.transform = `rotate(${rotA}deg)`;
}

/* ── UI State Manager ── */
function updateUI(mode, noise) {
    const rf = document.getElementById('rfSt');
    const led = document.getElementById('led');
    const rssi = document.getElementById('rssi');
    const al = document.getElementById('ancLed');

    rf.className = 'val-norm';
    led.className = 'status-led';
    rssi.className = 'signal-block';
    al.className = 'anc-led';

    if (!isPwr) return;

    if (mode === 'idle') {
        rf.innerText = 'OFFLINE'; rf.style.color = 'var(--r)';
        led.classList.add('led-red'); rssi.classList.add('sig-red');
    } else if (mode === 'connecting') {
        rf.innerText = 'SYNCING'; rf.style.color = 'var(--y)';
        led.classList.add('led-orange'); rssi.classList.add('sig-orange');
    } else if (mode === 'connected') {
        rf.innerText = 'ONLINE'; rf.style.color = 'var(--g)';
        led.classList.add('led-green'); rssi.classList.add('sig-green');
        if (isAnc && noise > 0.5) al.classList.add('led-red');
        else al.classList.add('led-green');
    }
}

/* ── Power ── */
function pwr(s) {
    isPwr = s;
    document.getElementById('bOn').classList.toggle('active', s);
    document.getElementById('bOff').classList.toggle('active', !s);
    if (s) {
        document.getElementById('scr').classList.add('lit');
        document.getElementById('sys').style.opacity = '1';
        updateUI('idle');
        log('FIELD_OS_BOOT_v12.4.1');
        if (vltTimer) clearInterval(vltTimer);
        vltTimer = setInterval(() => {
            if (isPwr) document.getElementById('vlt').innerText = (11.8 + Math.random() * 0.4).toFixed(2) + 'V';
        }, 2000);
    } else {
        teardown();
        location.reload();
    }
}

/* ── ANC Toggle ── */
function toggleAnc() {
    if (!isPwr) return;
    isAnc = !isAnc;
    const b = document.getElementById('ancBtn');
    b.innerText = isAnc ? 'ANC ON' : 'ANC OFF';
    b.classList.toggle('on', isAnc);
    log(isAnc ? 'ANC_ENABLED' : 'ANC_DISABLED');
}

/* ── System Log ── */
function log(m) {
    const el = document.getElementById('sys');
    const d = document.createElement('div');
    d.innerText = '> ' + m;
    el.appendChild(d);
    el.scrollTop = el.scrollHeight;
    /* Keep log short */
    while (el.childElementCount > 30) el.removeChild(el.firstChild);
}

/* ── Teardown / Cleanup ── */
function teardown() {
    isTx = false;
    isConn = false;
    myRole = null;
    if (mc) { try { mc.end(true); } catch(e){} mc = null; }
    if (mic) { mic.getTracks().forEach(t => t.stop()); mic = null; }
    if (actx) { try { actx.close(); } catch(e){} actx = null; }
    ana = null; pG = null; ck = null; nxt = 0;
    const ptt = document.getElementById('ptt');
    ptt.innerText = 'LOCKED';
    ptt.className = 'ptt-lever';
    ptt.onmousedown = null; ptt.onmouseup = null;
    ptt.ontouchstart = null; ptt.ontouchend = null;
}

/* ── PTT Handlers ── */
function pttDown(e) {
    if (!isConn) return;
    e.preventDefault();
    isTx = true;
    document.getElementById('ptt').classList.add('tx');
    document.getElementById('ptt').innerText = 'TX';
}
function pttUp(e) {
    if (!isConn) return;
    e.preventDefault();
    isTx = false;
    document.getElementById('ptt').classList.remove('tx');
    document.getElementById('ptt').innerText = 'PUSH TO TALK';
}

/* ── Background Rain ── */
const bcvs = document.getElementById('scannerCanvas');
const bctx = bcvs.getContext('2d');
let bgCols = [];
function initBg() {
    bcvs.width = window.innerWidth;
    bcvs.height = window.innerHeight;
    bgCols = new Array(Math.floor(bcvs.width / 20)).fill(0).map(() => Math.random() * bcvs.height);
}
window.onresize = initBg;
initBg();

/* ── Render Loop ── */
function draw() {
    bctx.fillStyle = 'rgba(0,0,0,0.1)';
    bctx.fillRect(0, 0, bcvs.width, bcvs.height);
    bctx.font = '12px monospace';
    bctx.fillStyle = '#010';
    bgCols.forEach((y, i) => {
        bctx.fillText(Math.random() > 0.8 ? '1' : '0', i * 20, y);
        bgCols[i] = y > bcvs.height ? 0 : y + 10;
    });

    /* Scope waveform */
    if (ana && isPwr) {
        const scvs = document.getElementById('scope');
        const sctx = scvs.getContext('2d');
        const data = new Uint8Array(ana.frequencyBinCount);
        ana.getByteTimeDomainData(data);

        let sum = 0;
        for (let i = 0; i < data.length; i++) sum += Math.abs(data[i] - 128);
        const level = sum / data.length / 50;
        if (isTx) updateUI('connected', level);

        sctx.clearRect(0, 0, scvs.width, scvs.height);
        sctx.lineWidth = 3;
        sctx.strokeStyle = isAnc ? '#00d4ff' : '#39ff14';
        sctx.shadowBlur = 4;
        sctx.shadowColor = sctx.strokeStyle;
        sctx.beginPath();
        const step = scvs.width / data.length;
        for (let i = 0; i < data.length; i++) {
            const v = data[i] / 128.0;
            const y = v * scvs.height / 2;
            if (i === 0) sctx.moveTo(0, y);
            else sctx.lineTo(i * step, y);
        }
        sctx.stroke();
        sctx.shadowBlur = 0;
    }
    requestAnimationFrame(draw);
}
draw();

/* ── Main Connection ── */
async function conn(role) {
    if (!isPwr || isConn) return;
    myRole = role;
    updateUI('connecting');
    log('INIT_' + role.toUpperCase() + '_SEQ');

    try {
        /* 1. Microphone with echo cancellation */
        mic = await navigator.mediaDevices.getUserMedia({
            audio: {
                echoCancellation: true,
                noiseSuppression: true,
                autoGainControl: true
            }
        });
        log('MIC_CAPTURE_OK');

        /* 2. Audio Context — MUST resume after user gesture */
        actx = new (window.AudioContext || window.webkitAudioContext)();
        await actx.resume();
        log('ACTX_SAMPLE:' + actx.sampleRate);

        const src = actx.createMediaStreamSource(mic);

        /* 3. Analyser for scope visualization */
        ana = actx.createAnalyser();
        ana.fftSize = 2048;
        src.connect(ana);

        /* 4. ScriptProcessor for transmission — larger buffer = fewer MQTT msgs */
        const proc = actx.createScriptProcessor(4096, 1, 1);
        const chVal = document.getElementById('ch').value;

        proc.onaudioprocess = function(e) {
            /* CRITICAL: mute output to prevent mic-to-speaker feedback */
            e.outputBuffer.getChannelData(0).fill(0);

            if (isTx && mc && mc.connected) {
                transmit(e.inputBuffer.getChannelData(0), chVal, role);
            }
        };
        ana.connect(proc);
        proc.connect(actx.destination);

        /* 5. Playback gain node for received audio */
        pG = actx.createGain();
        pG.gain.value = 1.0;
        pG.connect(actx.destination);

        /* 6. Derive AES-256 encryption key from password */
        const enc = new TextEncoder();
        const pwd = document.getElementById('key').value || 'TAC';
        const km = await crypto.subtle.importKey(
            'raw', enc.encode(pwd), 'PBKDF2', false, ['deriveKey']
        );
        ck = await crypto.subtle.deriveKey(
            { name: 'PBKDF2', salt: enc.encode('TACCOM_SALT_v12'), iterations: 10000, hash: 'SHA-256' },
            km,
            { name: 'AES-GCM', length: 256 },
            false,
            ['encrypt', 'decrypt']
        );
        log('CIPHER_256_READY');

        /* 7. MQTT connection */
        const topic = TP + chVal;
        const listenTopic = topic + '/' + (role === 'host' ? 'client' : 'host');
        const pubTopic = topic + '/' + role;

        log('MQTT_CONNECTING...');

        mc = mqtt.connect('wss://broker.emqx.io:8084/mqtt', {
            connectTimeout: 8000,
            reconnectPeriod: 3000,
            clientId: 'tac_' + role + '_' + Math.random().toString(36).slice(2, 8)
        });

        mc.on('connect', () => {
            isConn = true;
            updateUI('connected');
            log('BROKER_LINK_OK');

            mc.subscribe(listenTopic, { qos: 0 }, (err) => {
                if (err) {
                    log('SUB_FAIL');
                    return;
                }
                log('SUB:' + listenTopic);
                log('PUB:' + pubTopic);
                log('READY_AWAIT_PTT');
            });

            const ptt = document.getElementById('ptt');
            ptt.innerText = 'PUSH TO TALK';
            ptt.className = 'ptt-lever unlocked ready';
            ptt.onmousedown = pttDown;
            ptt.onmouseup = pttUp;
            ptt.onmouseleave = pttUp;
            ptt.ontouchstart = pttDown;
            ptt.ontouchend = pttUp;
            ptt.ontouchcancel = pttUp;
        });

        mc.on('message', async function(t, payload) {
            try {
                if (payload.length < 13) return; /* Need 12-byte IV + at least 1 byte ciphertext */
                const iv = payload.slice(0, 12);
                const ciphertext = payload.slice(12);
                const decrypted = await crypto.subtle.decrypt(
                    { name: 'AES-GCM', iv: iv },
                    ck,
                    ciphertext
                );
                playAudio(decrypted);
            } catch (e) {
                /* Decryption failed — wrong key or corrupted packet, silently ignore */
            }
        });

        mc.on('error', (err) => {
            log('MQTT_ERR:' + (err.message || 'UNKNOWN'));
        });

        mc.on('close', () => {
            if (isConn) {
                log('LINK_DROPPED');
                isConn = false;
                isTx = false;
                updateUI('idle');
                const ptt = document.getElementById('ptt');
                ptt.innerText = 'LOCKED';
                ptt.className = 'ptt-lever';
                ptt.onmousedown = null; ptt.onmouseup = null;
                ptt.ontouchstart = null; ptt.ontouchend = null;
            }
        });

        mc.on('reconnect', () => {
            updateUI('connecting');
            log('RELINK_ATTEMPT');
        });

    } catch (err) {
        log('HW_FAIL:' + (err.name || err.message || 'ERR'));
        updateUI('idle');
        teardown();
    }
}

/* ── Transmit Audio Chunk ── */
async function transmit(samples, ch, role) {
    try {
        /* Optional ANC: simple noise gate */
        if (isAnc) {
            for (let i = 0; i < samples.length; i++) {
                if (Math.abs(samples[i]) < 0.015) samples[i] = 0;
            }
        }

        /* Float32 → Int16 with clamping */
        const i16 = new Int16Array(samples.length);
        for (let i = 0; i < samples.length; i++) {
            const s = Math.max(-1, Math.min(1, samples[i]));
            i16[i] = s < 0 ? s * 32768 : s * 32767;
        }

        /* AES-256-GCM encrypt */
        const iv = crypto.getRandomValues(new Uint8Array(12));
        const encrypted = await crypto.subtle.encrypt(
            { name: 'AES-GCM', iv: iv },
            ck,
            i16.buffer
        );

        /* Pack: [12-byte IV] [ciphertext] */
        const pkt = new Uint8Array(12 + encrypted.byteLength);
        pkt.set(iv, 0);
        pkt.set(new Uint8Array(encrypted), 12);

        /* Publish — role determines the topic suffix */
        const topic = TP + ch + '/' + role;
        mc.publish(topic, pkt, { qos: 0 });
    } catch (e) {
        /* Silent fail — don't spam errors during continuous transmission */
    }
}

/* ── Play Received Audio ── */
function playAudio(rawBuffer) {
    if (!actx || actx.state === 'closed') return;

    /* Ensure context is running */
    if (actx.state === 'suspended') actx.resume();

    const i16 = new Int16Array(rawBuffer);
    const f32 = new Float32Array(i16.length);
    for (let i = 0; i < i16.length; i++) {
        f32[i] = i16[i] / 32768;
    }

    /*
     * CRITICAL FIX: Use actx.sampleRate (not a hardcoded value).
     * The mic captures at actx.sampleRate (44100/48000),
     * so playback MUST use the same rate or audio will be garbled.
     */
    const buf = actx.createBuffer(1, f32.length, actx.sampleRate);
    buf.getChannelData(0).set(f32);

    const src = actx.createBufferSource();
    src.buffer = buf;
    src.connect(pG);

    /*
     * Schedule sequentially with 50ms minimum lead time.
     * If we've fallen behind (>500ms), reset to avoid growing lag.
     */
    const now = actx.currentTime;
    if (nxt < now - 0.5) nxt = now + 0.05;
    const startAt = Math.max(now + 0.05, nxt);
    src.start(startAt);
    nxt = startAt + buf.duration;
}
</script>
