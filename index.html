    <style>
        :root {
            --bg-color: #0d0d0d;
            --panel-bg: #1e1e1e;
            --accent-blue: #0084ff;
            --accent-red: #ff1a1a;
            --accent-amber: #ff9d00;
            --accent-green: #00ff41;
            --text-main: #c0c0c0;
            --metal-shine: linear-gradient(145deg, #2a2a2a, #111111);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        body::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 70%, black 120%);
            pointer-events: none; z-index: 100;
        }

        #shutdown-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000; z-index: 999; display: none;
        }

        header {
            background: var(--metal-shine);
            border-bottom: 4px solid #000;
            padding: 20px 30px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.8);
            position: relative; z-index: 5;
        }

        .sig-cluster { display: flex; align-items: center; gap: 20px; }
        .sig-bars { display: flex; align-items: flex-end; gap: 8px; height: 45px; }
        .bar {
            width: 12px; background: #000; border: 2px solid #333;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-radius: 2px;
        }
        .bar-1 { height: 35%; }
        .bar-2 { height: 65%; }
        .bar-3 { height: 100%; }

        .wrapper { display: flex; flex: 1; overflow: hidden; }

        nav {
            width: 260px; background: #151515; border-right: 6px solid #000;
            display: flex; flex-direction: column; gap: 12px; padding: 15px;
            overflow-y: auto; position: relative; z-index: 5;
        }

        .nav-label {
            font-size: 0.65rem; color: #444; text-transform: uppercase;
            letter-spacing: 2px; padding: 0 5px 8px 5px;
            border-bottom: 2px solid #222;
        }

        .m-btn {
            background: #222; color: #666; border: 3px solid #111; padding: 16px;
            cursor: pointer; text-transform: uppercase; font-weight: 900; font-size: 0.8rem;
            box-shadow: 4px 4px 0px #000, inset 2px 2px 2px #444;
            transition: transform 0.1s, box-shadow 0.1s;
            display: flex; justify-content: space-between; align-items: center;
            font-family: 'Courier New', Courier, monospace;
            text-align: left;
        }
        .m-btn:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0px #000; }
        .m-btn.active { color: #fff; border-color: var(--accent-blue); background: #2a2a2a; }
        .m-btn.active::after {
            content: ""; width: 10px; height: 10px; background: var(--accent-blue);
            border-radius: 50%; box-shadow: 0 0 10px var(--accent-blue); flex-shrink: 0;
        }
        .m-btn.dead { opacity: 0.3; pointer-events: none; }

        .m-btn-wt { background: #1a1a0a; color: var(--accent-amber); border: 3px solid #332200; }
        .m-btn-wt:hover { background: #2a2a10; }
        .m-btn-wt.active { border-color: var(--accent-amber); background: #2a2a10; }
        .m-btn-wt.active::after { background: var(--accent-amber); box-shadow: 0 0 10px var(--accent-amber); }

        main {
            flex: 1; padding: 20px; background: #050505;
            position: relative; z-index: 5;
            display: flex; flex-direction: column;
        }

        #main-screen {
            flex: 1;
            background: #000;
            border: 4px solid #333;
            box-shadow: inset 0 0 60px rgba(0,255,65,0.03), inset 0 0 120px rgba(0,0,0,0.8);
            padding: 25px;
            overflow-y: auto;
            color: var(--accent-green);
            font-size: 0.85rem;
            line-height: 1.7;
            position: relative;
        }

        #main-screen::before {
            content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px);
            pointer-events: none; z-index: 1;
        }

        .screen-header {
            border-bottom: 2px solid #1a3a1a; padding-bottom: 12px; margin-bottom: 18px;
            font-weight: 900; font-size: 0.9rem; color: #00cc33;
            text-shadow: 0 0 8px rgba(0,255,65,0.3);
            position: relative; z-index: 2;
        }
        .screen-body { position: relative; z-index: 2; }
        .scr-line { margin-bottom: 4px; }
        .scr-label { color: #337733; }
        .scr-val { color: var(--accent-green); text-shadow: 0 0 6px rgba(0,255,65,0.2); }
        .scr-warn { color: var(--accent-amber); text-shadow: 0 0 6px rgba(255,157,0,0.2); }
        .scr-err { color: var(--accent-red); text-shadow: 0 0 6px rgba(255,26,26,0.2); font-weight: 900; }
        .scr-dim { color: #225522; }
        .scr-divider { border: none; border-top: 1px solid #1a3a1a; margin: 14px 0; }
        .scr-link {
            color: var(--accent-blue); text-decoration: underline; cursor: pointer;
            font-weight: 900; text-shadow: 0 0 6px rgba(0,132,255,0.2);
            display: inline-block; padding: 2px 0;
        }
        .scr-link:hover { color: #33aaff; }
        .scr-block { background: #050a05; border: 2px solid #1a3a1a; padding: 15px; margin: 10px 0; }
        .scr-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 12px 0; }
        .scr-cell { background: #050a05; border: 1px solid #1a3a1a; padding: 12px; }

        #main-screen.off {
            background: #020202; border-color: #1a1a1a;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.9); color: #0a0a0a;
        }
        #main-screen.off::before { display: none; }

        #screen-log { max-height: 300px; overflow-y: auto; margin-top: 10px; }
        #screen-log::-webkit-scrollbar { width: 6px; }
        #screen-log::-webkit-scrollbar-track { background: #050a05; }
        #screen-log::-webkit-scrollbar-thumb { background: #1a3a1a; }

        footer {
            background: #1a1a1a; padding: 0; display: flex; flex-direction: column;
            border-top: 6px solid #000;
            position: relative;
            z-index: 1001;
        }
        #sys-light-bar {
            height: 12px; width: 100%; background: var(--accent-red);
            box-shadow: 0 0 20px var(--accent-red); transition: 0.5s;
        }
        .footer-controls {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background: var(--metal-shine);
        }

        .power-unit {
            display: flex; align-items: center; gap: 18px;
        }
        .power-info {
            display: flex; flex-direction: column; gap: 4px;
        }
        .power-label-top {
            font-size: 0.55rem; color: #555; text-transform: uppercase;
            letter-spacing: 2px; font-weight: 900;
        }
        #status-text {
            font-weight: 900; letter-spacing: 2px;
            color: var(--accent-red); font-size: 0.75rem;
            transition: color 0.4s;
        }

        .armor-toggle {
            width: 80px; height: 40px;
            background: linear-gradient(180deg, #1a1a1a, #0a0a0a);
            border: 4px solid #000;
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            box-shadow: 3px 3px 0px #000, inset 0 0 15px rgba(0,0,0,0.8);
            transition: all 0.3s ease;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .armor-toggle:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0px #000, inset 0 0 15px rgba(0,0,0,0.8);
        }

        .armor-toggle::before {
            content: ""; position: absolute;
            top: 50%; right: 10px; transform: translateY(-50%);
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--accent-red);
            border: 2px solid #330000;
            box-shadow: 0 0 8px var(--accent-red);
            transition: all 0.4s ease;
            z-index: 3;
        }
        .armor-toggle.on::before {
            background: var(--accent-green);
            border-color: #005500;
            box-shadow: 0 0 12px var(--accent-green), 0 0 25px rgba(0,255,65,0.2);
        }

        .toggle-lever {
            position: absolute;
            top: 3px; left: 3px;
            width: 30px; height: 26px;
            background: linear-gradient(180deg, #444, #222);
            border: 2px solid #000;
            border-radius: 4px;
            box-shadow: inset 1px 1px 0px #666, 2px 2px 4px rgba(0,0,0,0.6);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 2;
        }
        .toggle-lever::after {
            content: ""; position: absolute;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 14px; height: 2px;
            background: #111;
            box-shadow: 0 -5px 0 #111, 0 5px 0 #111;
            border-radius: 1px;
        }

        .armor-toggle.on .toggle-lever {
            left: 39px;
            background: linear-gradient(180deg, #555, #2a2a2a);
            box-shadow: inset 1px 1px 0px #777, 2px 2px 4px rgba(0,0,0,0.6), 0 0 8px rgba(0,255,65,0.15);
        }

        .toggle-labels {
            display: flex; justify-content: space-between;
            width: 80px; margin-top: 4px; padding: 0 6px;
        }
        .toggle-labels span {
            font-size: 0.5rem; font-weight: 900; letter-spacing: 1px;
            color: #333; transition: color 0.3s;
        }
        .toggle-labels .lbl-on.active-lbl { color: var(--accent-green); }
        .toggle-labels .lbl-off.active-lbl { color: var(--accent-red); }

        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        .cursor-blink {
            display: inline-block; width: 8px; height: 14px;
            background: var(--accent-green);
            animation: cursorBlink 1s step-end infinite;
            vertical-align: text-bottom; margin-left: 2px;
        }

        /* Signal bar glow animation for active state */
        .bar.glow-green {
            background: var(--accent-green) !important;
            border-color: rgba(0,255,65,0.6) !important;
            box-shadow:
                0 0 8px var(--accent-green),
                0 0 18px rgba(0,255,65,0.5),
                0 0 35px rgba(0,255,65,0.25),
                0 0 60px rgba(0,255,65,0.1),
                inset 0 0 6px rgba(0,255,65,0.4) !important;
        }
        .bar.glow-green.bar-1 { animation: barPulse1 2.5s ease-in-out infinite; }
        .bar.glow-green.bar-2 { animation: barPulse2 2.5s ease-in-out infinite 0.15s; }
        .bar.glow-green.bar-3 { animation: barPulse3 2.5s ease-in-out infinite 0.3s; }

        @keyframes barPulse1 {
            0%, 100% { box-shadow: 0 0 8px var(--accent-green), 0 0 18px rgba(0,255,65,0.5), 0 0 35px rgba(0,255,65,0.25), inset 0 0 6px rgba(0,255,65,0.4); }
            50% { box-shadow: 0 0 12px var(--accent-green), 0 0 28px rgba(0,255,65,0.6), 0 0 50px rgba(0,255,65,0.35), inset 0 0 10px rgba(0,255,65,0.5); }
        }
        @keyframes barPulse2 {
            0%, 100% { box-shadow: 0 0 10px var(--accent-green), 0 0 22px rgba(0,255,65,0.5), 0 0 40px rgba(0,255,65,0.25), inset 0 0 6px rgba(0,255,65,0.4); }
            50% { box-shadow: 0 0 15px var(--accent-green), 0 0 35px rgba(0,255,65,0.6), 0 0 60px rgba(0,255,65,0.35), inset 0 0 10px rgba(0,255,65,0.5); }
        }
        @keyframes barPulse3 {
            0%, 100% { box-shadow: 0 0 12px var(--accent-green), 0 0 25px rgba(0,255,65,0.5), 0 0 50px rgba(0,255,65,0.25), inset 0 0 8px rgba(0,255,65,0.4); }
            50% { box-shadow: 0 0 18px var(--accent-green), 0 0 40px rgba(0,255,65,0.6), 0 0 75px rgba(0,255,65,0.35), inset 0 0 12px rgba(0,255,65,0.5); }
        }

        @media (max-width: 800px) {
            body { overflow-y: auto; height: auto; }
            .wrapper { flex-direction: column; }
            nav { width: 100%; border-right: none; border-bottom: 6px solid #000; max-height: 40vh; }
            header { flex-direction: column; gap: 10px; padding: 15px; }
            .footer-controls { flex-direction: column; gap: 15px; }
            .scr-grid { grid-template-columns: 1fr; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

                        '<div class="scr-line"><span class="scr-label">MODULE:</span> <span class="scr-warn">WALKIE-TALKIE GLOBAL</span></div>' +
                        '<div class="scr-line"><span class="scr-label">ENCRYPTION:</span> <span class="scr-val">MILITARY GRADE</span></div>' +
                        '<div class="scr-line"><span class="scr-label">FREQ:</span> <span class="scr-val">440.7 MHz</span></div>' +
                        '<div class="scr-line"><span class="scr-label">STATUS:</span> <span class="scr-val">STANDBY</span></div>' +
                    '</div>' +
                    '<hr class="scr-divider">' +
                    '<div class="scr-line"><span class="scr-dim">&gt;</span> AVAILABLE CHANNELS:</div>' +
                    '<div style="margin-top:10px;"><span class="scr-link" onclick="window.open(\'working As secured Miliatry grade.html\',\'_self\')">&#9654; OPEN WALKIE-TALKIE GLOBAL EDITION</span></div>' +
                    '<hr class="scr-divider">' +
                    '<div class="scr-line"><span class="scr-dim">&gt;</span> AWAITING CONNECTION...<span class="cursor-blink"></span></div>' +
                '</div>';
            },
            sys: function() {
                return '<div class="screen-header">[ SYSTEM DIAGNOSTICS ]</div>' +
                '<div class="screen-body">' +
                    '<div class="scr-block">' +
                        '<div class="scr-line"><span class="scr-dim">&gt;</span> SYSTEM CHECK... <span class="scr-val">OK</span></div>' +
                        '<div class="scr-line"><span class="scr-dim">&gt;</span> GPS LOCK... <span class="scr-val">ACQUIRED</span></div>' +
                        '<div class="scr-line"><span class="scr-dim">&gt;</span> FREQUENCY... 440.7 MHz</div>' +
                        '<div class="scr-line"><span class="scr-dim">&gt;</span> PROXY CHAIN... <span class="scr-val">3 NODES</span></div>' +
                        '<div class="scr-line"><span class="scr-dim">&gt;</span> LAT/LON... <span class="scr-err">REDACTED</span></div>' +
                        '<div class="scr-line"><span class="scr-dim">&gt;</span> PLATE READER... <span class="scr-err">OFFLINE</span></div>' +
                        '<div class="scr-line"><span class="scr-dim">&gt;</span> ENCRYPTION LAYER... <span class="scr-val">LOADED</span></div>' +
                        '<div class="scr-line"><span class="scr-dim">&gt;</span> FIREWALL... <span class="scr-val">ACTIVE</span></div>' +
                        '<div class="scr-line"><span class="scr-dim">&gt;</span> SIGNAL INTEGRITY... <span class="scr-val">NOMINAL</span></div>' +
                    '</div>' +
                    '<hr class="scr-divider">' +
                    '<div class="scr-line"><span class="scr-dim">&gt;</span> ALL SUBSYSTEMS REPORTED<span class="cursor-blink"></span></div>' +
                '</div>';
            },
            logs: function() {
                return '<div class="screen-header">[ SYSTEM LOG ]</div>' +
                '<div class="screen-body">' +
                    '<div id="screen-log">' +
                        '<div>[INIT] Booting AIO-Core v3.0...</div>' +
                        '<div>[INIT] Encryption layer loaded.</div>' +
                    '</div>' +
                    '<hr class="scr-divider">' +
                    '<div class="scr-line"><span class="scr-dim">&gt;</span> MONITORING...<span class="cursor-blink"></span></div>' +
                '</div>';
            }
        };

        function togglePower() {
            isPowerOn = !isPowerOn;
            var bar = document.getElementById('sys-light-bar');
            var status = document.getElementById('status-text');
            var shutdown = document.getElementById('shutdown-screen');
            var toggle = document.getElementById('power-toggle');
            var screen = document.getElementById('main-screen');
            var lblOn = document.querySelector('.lbl-on');
            var lblOff = document.querySelector('.lbl-off');
            var btns = document.querySelectorAll('.m-btn[data-screen]');

            if (isPowerOn) {
                bar.style.background = 'var(--accent-green)';
                bar.style.boxShadow = '0 0 30px var(--accent-green)';
                status.innerText = 'SYSTEM: ACTIVE';
                status.style.color = 'var(--accent-green)';
                shutdown.style.display = 'none';
                toggle.classList.add('on');
                lblOn.classList.add('active-lbl');
                lblOff.classList.remove('active-lbl');
                screen.classList.remove('off');
                btns.forEach(function(b) { b.classList.remove('dead'); });
                loadScreen(currentScreen, document.querySelector('.m-btn[data-screen="' + currentScreen + '"]'));
                animateSignal();
            } else {
                bar.style.background = 'var(--accent-red)';
                bar.style.boxShadow = '0 0 20px var(--accent-red)';
                status.innerText = 'SYSTEM: STANDBY';
                status.style.color = 'var(--accent-red)';
                shutdown.style.display = 'block';
                toggle.classList.remove('on');
                lblOn.classList.remove('active-lbl');
                lblOff.classList.add('active-lbl');
                screen.classList.add('off');
                document.getElementById('screen-content').innerHTML = '';
                btns.forEach(function(b) { b.classList.remove('active'); b.classList.add('dead'); });
                /* Kill glow on signal bars */
                document.querySelectorAll('.bar').forEach(function(b) {
                    b.classList.remove('glow-green');
                    b.style.background = '#000';
                    b.style.boxShadow = 'none';
                    b.style.borderColor = '#333';
                });
                document.getElementById('sig-status').innerText = 'OFFLINE';
                document.getElementById('sig-status').style.color = 'var(--accent-red)';
            }
        }

        function loadScreen(id, btn) {
            if (!isPowerOn) return;
            currentScreen = id;
            document.querySelectorAll('.m-btn[data-screen]').forEach(function(b) { b.classList.remove('active'); });
            if (btn) btn.classList.add('active');
            if (screenData[id]) {
                document.getElementById('screen-content').innerHTML = screenData[id]();
            }
        }

        function animateSignal() {
            var bars = document.querySelectorAll('.bar');
            var label = document.getElementById('sig-status');
            if (!isPowerOn) return;
            var online = navigator.onLine;
            label.innerText = online ? 'LINKED' : 'OFFLINE';
            label.style.color = online ? 'var(--accent-green)' : 'var(--accent-red)';

            bars.forEach(function(b, i) {
                setTimeout(function() {
                    if (online) {
                        b.classList.add('glow-green');
                        b.style.background = '';
                        b.style.boxShadow = '';
                        b.style.borderColor = '';
                    } else {
                        b.classList.remove('glow-green');
                        b.style.background = '#000';
                        b.style.boxShadow = 'none';
                        b.style.borderColor = '#333';
                    }
                }, i * 120);
            });
        }

        setInterval(function() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString();
        }, 1000);

        var logMsgs = [
            'Heartbeat signal received.',
            'Node handshake completed.',
            'Scanning frequency bands...',
            'Proxy rotation successful.',
            'Data packet integrity verified.',
            'Encryption key refreshed.',
            'Uplink stability: nominal.',
            'Background sweep clean.',
            'Channel noise within tolerance.',
            'Backup node synchronized.',
            'Decrypting incoming block...',
            'Frequency shift detected.',
            'Secure tunnel established.',
            'Auth token rotated.'
        ];

        setInterval(function() {
            if (!isPowerOn || currentScreen !== 'logs') return;
            var logEl = document.getElementById('screen-log');
            if (!logEl) return;
            var time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            var msg = logMsgs[Math.floor(Math.random() * logMsgs.length)];
            var div = document.createElement('div');
            div.textContent = '[' + time + '] ' + msg;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
            if (logEl.children.length > 40) logEl.removeChild(logEl.firstChild);
        }, 3000);

        /* Keyboard support for toggle */
        document.getElementById('power-toggle').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePower(); }
        });

        /* Starts in OFF state — shutdown overlay visible, nav buttons dead */
        document.getElementById('shutdown-screen').style.display = 'block';
    </script>
</body>
</html>
