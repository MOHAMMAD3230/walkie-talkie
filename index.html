    <title>MY_STUFF_AIO</title>

    <style>
        :root{
            --bg-color:#0d0d0d;--panel-bg:#1e1e1e;--accent-blue:#0084ff;
            --accent-red:#ff1a1a;--accent-amber:#ff9d00;--accent-green:#00ff41;
            --accent-yellow:#ffd000;--accent-cyan:#00e5ff;--accent-magenta:#ff00ff;
            --accent-lime:#b8ff00;--text-main:#c0c0c0;
            --metal-shine:linear-gradient(145deg,#2a2a2a,#111111);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        body{
            background-color:var(--bg-color);color:var(--text-main);
            font-family:'Courier New',Courier,monospace;
            display:flex;flex-direction:column;height:100vh;height:100dvh;
            overflow-x:hidden;user-select:none;
        }
        body::after{
            content:"";position:fixed;top:0;left:0;width:100%;height:100%;
            background:radial-gradient(circle,transparent 60%,black 120%);
            pointer-events:none;z-index:100;
        }

        /* ===== UPPER SHELL: header + sidebar + main ===== */
        #upper-shell{
            flex:1;display:flex;flex-direction:column;min-height:0;
            position:relative;overflow:hidden;
        }

        /* ===== SHUTDOWN OVERLAY — covers only header+main, NOT footer ===== */
        #shutdown-screen{
            position:absolute;inset:0;z-index:2000;
            background:#000;
            display:flex;align-items:center;justify-content:center;
            flex-direction:column;gap:20px;
            transition:opacity .7s ease;
        }
        #shutdown-screen.hidden{opacity:0;pointer-events:none}
        .off-dot{
            width:12px;height:12px;border-radius:50%;
            background:#0f0f0f;border:2px solid #080808;
            animation:offPulse 3s ease-in-out infinite;
        }
        @keyframes offPulse{
            0%,100%{background:#080808;border-color:#040404;box-shadow:none}
            50%{background:#1a1a1a;border-color:#111;box-shadow:0 0 4px rgba(255,26,26,0.06)}
        }
        .off-text{
            color:#111;font-size:.95rem;font-weight:900;
            letter-spacing:8px;text-transform:uppercase;
        }
        .off-hint{
            color:#0a0a0a;font-size:.55rem;font-weight:900;
            letter-spacing:3px;text-transform:uppercase;
            animation:hintPulse 4s ease-in-out infinite;
        }
        @keyframes hintPulse{
            0%,100%{color:#060606}50%{color:#151515}
        }

        /* ===== HEADER ===== */
        header{
            background:var(--metal-shine);border-bottom:4px solid #000;
            padding:16px 20px;display:flex;justify-content:space-between;align-items:center;
            box-shadow:0 4px 10px rgba(0,0,0,0.8);position:relative;z-index:5;flex-shrink:0;
        }
        .sig_cluster{display:flex;align-items:center;gap:12px}
        .sig-bars{display:flex;align-items:flex-end;gap:3px;height:28px}
        .sig-bar{width:9px;background:#222;border:2px solid #111;transition:background .5s ease,box-shadow .5s ease,border-color .5s ease}
        .sig-bar-1{height:25%}.sig-bar-2{height:50%}.sig-bar-3{height:75%}.sig-bar-4{height:100%}
        .sig-bar.good{background:var(--accent-green);border-color:#005500;box-shadow:0 0 5px rgba(0,255,65,0.35)}
        .sig-bar.average{background:var(--accent-yellow);border-color:#665500;box-shadow:0 0 5px rgba(255,208,0,0.35)}
        .sig-bar.low{background:var(--accent-red);border-color:#660000;box-shadow:0 0 5px rgba(255,26,26,0.35)}
        .sig-name{font-size:.48rem;color:#444;letter-spacing:2px;text-transform:uppercase;font-weight:900}

        /* ===== LAYOUT ===== */
        .wrapper{display:flex;flex:1;overflow:hidden;min-height:0}
        nav{
            width:240px;background:#151515;border-right:5px solid #000;
            display:flex;flex-direction:column;gap:10px;padding:12px;
            overflow-y:auto;position:relative;z-index:5;flex-shrink:0;
        }
        .nav-label{font-size:.58rem;color:#444;text-transform:uppercase;letter-spacing:2px;padding:0 4px 6px 4px;border-bottom:2px solid #222}
        .m-btn{
            background:#222;color:#666;border:3px solid #111;padding:14px;cursor:pointer;
            text-transform:uppercase;font-weight:900;font-size:.75rem;
            box-shadow:4px 4px 0 #000,inset 2px 2px 2px #444;
            transition:transform .1s,box-shadow .1s;
            display:flex;justify-content:space-between;align-items:center;
            font-family:'Courier New',Courier,monospace;text-align:left;
            -webkit-tap-highlight-color:transparent;touch-action:manipulation;
        }
        .m-btn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 #000}
        .m-btn.active{color:#fff;border-color:var(--accent-blue);background:#2a2a2a}
        .m-btn.active::after{content:"";width:9px;height:9px;background:var(--accent-blue);border-radius:50%;box-shadow:0 0 8px var(--accent-blue);flex-shrink:0}
        .m-btn.dead{opacity:.3;pointer-events:none}
        .m-btn-wt{background:#1a1a0a;color:var(--accent-amber);border:3px solid #332200}
        .m-btn-wt:hover{background:#2a2a10}
        .m-btn-wt.active{border-color:var(--accent-amber);background:#2a2a10}
        .m-btn-wt.active::after{background:var(--accent-amber);box-shadow:0 0 8px var(--accent-amber)}
        .m-btn-reset{color:var(--accent-red);margin-top:auto}

        /* ===== MAIN CONTENT ===== */
        main{
            flex:1;padding:16px;background:#050505;
            position:relative;z-index:5;display:flex;flex-direction:column;min-height:0;overflow:hidden;
        }
        .screen-scroll{flex:1;overflow-y:auto;padding:16px;min-height:0}
        .screen-scroll::-webkit-scrollbar{width:4px;height:4px}
        .screen-scroll::-webkit-scrollbar-track{background:transparent}
        .screen-scroll::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.1);border-radius:2px}

        #main-screen{
            flex:1;background:#000;border:4px solid #333;
            box-shadow:inset 0 0 40px rgba(0,255,65,0.02),inset 0 0 80px rgba(0,0,0,0.7);
            overflow:hidden;color:var(--accent-green);font-size:.82rem;line-height:1.7;
            position:relative;display:flex;flex-direction:column;min-height:0;
        }
        #main-screen::before{
            content:"";position:absolute;top:0;left:0;right:0;bottom:0;
            background:repeating-linear-gradient(0deg,transparent,transparent 4px,rgba(0,0,0,0.06) 4px,rgba(0,0,0,0.06) 8px);
            pointer-events:none;z-index:1;
        }
        #main-screen.off{
            background:#020202;border-color:#1a1a1a;
            box-shadow:inset 0 0 40px rgba(0,0,0,0.9);color:#0a0a0a;
        }
        #main-screen.off::before{display:none}
        #main-screen.off .cmd-fixed-area{display:none}

        /* Scan sweep */
        .scan-sweep{position:absolute;top:0;left:0;right:0;height:2px;z-index:3;pointer-events:none;opacity:0;transition:opacity .4s}
        .scan-sweep.active{opacity:1}
        .scan-sweep-glow{position:absolute;top:-25px;left:0;right:0;height:50px;background:linear-gradient(180deg,transparent,rgba(0,229,255,0.04),transparent);animation:sweepDown 3s linear infinite}
        .scan-sweep-line{position:absolute;top:0;left:0;right:0;height:100%;background:linear-gradient(180deg,transparent,var(--accent-cyan),transparent);box-shadow:0 0 15px var(--accent-cyan);animation:sweepDown 3s linear infinite}
        @keyframes sweepDown{0%{top:-50px}100%{top:100%}}

        /* Screen text classes */
        .s-header{font-weight:900;font-size:.85rem;color:var(--accent-cyan);text-shadow:0 0 8px rgba(0,229,255,0.35);border-bottom:2px solid rgba(0,229,255,0.12);padding-bottom:10px;margin-bottom:16px}
        .s-green{color:var(--accent-green);text-shadow:0 0 5px rgba(0,255,65,0.15)}
        .s-cyan{color:var(--accent-cyan);text-shadow:0 0 5px rgba(0,229,255,0.15)}
        .s-amber{color:var(--accent-amber);text-shadow:0 0 5px rgba(255,157,0,0.15)}
        .s-red{color:var(--accent-red);text-shadow:0 0 5px rgba(255,26,26,0.15);font-weight:900}
        .s-blue{color:var(--accent-blue);text-shadow:0 0 5px rgba(0,132,255,0.15)}
        .s-yellow{color:var(--accent-yellow);text-shadow:0 0 5px rgba(255,208,0,0.15)}
        .s-lime{color:var(--accent-lime);text-shadow:0 0 5px rgba(184,255,0,0.15)}
        .s-dim{color:#225522}
        .s-label{color:#446644;font-size:.7rem}
        .s-line{margin-bottom:3px}
        .s-divider{border:none;border-top:1px solid rgba(0,229,255,0.06);margin:12px 0}
        .s-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:10px 0}
        .s-cell{background:rgba(0,229,255,0.015);border:1px solid rgba(0,229,255,0.06);padding:10px;border-radius:2px}
        .s-cell-label{font-size:.6rem;color:#336666;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
        .s-cell-val{font-size:1rem;font-weight:900;text-overflow:ellipsis;white-space:nowrap}
        .s-badge{display:inline-block;padding:2px 6px;font-size:.65rem;font-weight:900;border-radius:2px;letter-spacing:1px}
        .s-badge-green{background:rgba(0,255,65,0.08);color:var(--accent-green);border:1px solid rgba(0,255,65,0.15)}
        .s-badge-red{background:rgba(255,26,26,0.08);color:var(--accent-red);border:1px solid rgba(255,26,26,0.15)}
        .s-badge-amber{background:rgba(255,157,0,0.08);color:var(--accent-amber);border:1px solid rgba(255,157,0,0.15)}
        .s-badge-cyan{background:rgba(0,229,255,0.08);color:var(--accent-cyan);border:1px solid rgba(0,229,255,0.15)}
        .s-badge-blue{background:rgba(0,132,255,0.08);color:var(--accent-blue);border:1px solid rgba(0,132,255,0.15)}
        .s-block{background:rgba(0,229,255,0.012);border:1px solid rgba(0,229,255,0.05);padding:12px;margin:8px 0;border-radius:2px}
        .s-link{color:var(--accent-blue);text-decoration:underline;cursor:pointer;font-weight:900;text-shadow:0 0 5px rgba(0,132,255,0.15);display:inline-block;padding:3px 0;border:none;background:none;font-family:inherit;font-size:inherit}
        .s-link:hover{color:#33aaff}
        @keyframes cursorBlink{0%,100%{opacity:1}50%{opacity:0}}
        .cursor-blink{display:inline-block;width:7px;height:12px;background:var(--accent-cyan);animation:cursorBlink 1s step-end infinite;vertical-align:text-bottom;margin-left:2px}

        /* Command prompt */
        .cmd-fixed-area{flex-shrink:0;border-top:1px solid rgba(0,229,255,0.06);padding-top:6px;margin-top:6px;position:relative;z-index:2}
        .cmd-input-wrap{display:flex;align-items:center;background:rgba(0,229,255,0.015);border:1px solid rgba(0,229,255,0.06);padding:0}
        .cmd-prompt{padding:10px;color:var(--accent-cyan);font-weight:900;font-size:.72rem;white-space:nowrap;flex-shrink:0;border-right:1px solid rgba(0,229,255,0.06)}
        .cmd-input{
            flex:1;background:transparent;border:none;outline:none;color:var(--accent-cyan);
            font-family:'Courier New',Courier,monospace;font-size:.82rem;padding:10px;
            caret-color:var(--accent-cyan);user-select:text;-webkit-user-select:text;
        }
        .cmd-input::placeholder{color:rgba(0,229,255,0.12)}
        .cmd-input.rate-limited{color:var(--accent-red)!important;caret-color:var(--accent-red)!important}
        .cmd-output{margin-top:5px;max-height:180px;overflow-y:auto;font-size:.72rem}
        .cmd-output::-webkit-scrollbar{width:4px;height:4px}
        .cmd-output::-webkit-scrollbar-track{background:transparent}
        .cmd-output::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.1);border-radius:2px}
        .cmd-out-line{padding:1px 0}
        .cmd-out-ok{color:var(--accent-green)}
        .cmd-out-err{color:var(--accent-red)}
        .cmd-out-info{color:var(--accent-cyan)}
        .cmd-out-warn{color:var(--accent-amber)}

        /* Iframe */
        .screen-iframe-wrap{flex:1;position:relative;z-index:2;display:none;flex-direction:column;min-height:0}
        .screen-iframe-wrap.active{display:flex}
        .screen-iframe-bar{
            background:#0a0a0a;border:2px solid rgba(0,229,255,0.06);border-bottom:none;
            padding:10px 12px;display:flex;justify-content:space-between;align-items:center;
            font-size:.65rem;color:var(--accent-cyan);flex-shrink:0;
        }
        .screen-iframe-bar button{
            background:#111;color:var(--accent-amber);border:2px solid #332200;
            padding:6px 18px;cursor:pointer;font-family:inherit;font-weight:900;font-size:.65rem;text-transform:uppercase;
            min-height:36px;min-width:80px;display:inline-flex;align-items:center;justify-content:center;
        }
        .screen-iframe-bar button:hover{background:#1a1a0a}
        .screen-iframe-body{flex:1;border:2px solid rgba(0,229,255,0.06);background:#000;position:relative;min-height:0}
        .screen-iframe-body iframe{width:100%;height:100%;border:none;display:block;background:#000}
        .iframe-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#225522;font-size:.78rem;gap:10px}
        .iframe-loading .spinner{width:28px;height:28px;border:3px solid rgba(0,229,255,0.1);border-top-color:var(--accent-cyan);border-radius:50%;animation:spin .8s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}

        /* ===== FOOTER — always visible, always on top ===== */
        footer{
            background:linear-gradient(90deg,rgba(0,0,0,0.5),rgba(8,8,18,0.8),rgba(0,0,0,0.5));
            border-top:5px solid #000;position:relative;z-index:2500;flex-shrink:0;
        }
        #sys-light-bar{height:10px;width:100%;background:var(--accent-red);box-shadow:0 0 16px var(--accent-red);transition:background .5s,box-shadow .5s}
        #sys-light-bar.on{background:var(--accent-green);box-shadow:0 0 30px var(--accent-green)}
        .footer-controls{
            display:flex;justify-content:space-between;align-items:center;
            padding:10px 16px;background:var(--metal-shine);gap:10px;
        }
        .power-unit{display:flex;align-items:center;gap:12px}
        .power-info{display:flex;flex-direction:column;gap:3px}
        .power-label-top{font-size:.48rem;color:#555;text-transform:uppercase;letter-spacing:2px;font-weight:900}
        #status-text{font-weight:900;letter-spacing:2px;color:var(--accent-red);font-size:.7rem;transition:color .4s}
        #status-text.on{color:var(--accent-green)}
        .armor-toggle{
            width:68px;height:34px;
            background:linear-gradient(180deg,#1a1a1a,#0a0a0a);
            border:4px solid #000;border-radius:6px;cursor:pointer;position:relative;
            box-shadow:3px 3px 0 #000,inset 0 0 12px rgba(0,0,0,0.8);
            transition:all .3s ease;-webkit-tap-highlight-color:transparent;flex-shrink:0;
        }
        .armor-toggle:active{border-color:var(--accent-green)}
        .armor-toggle::before{
            content:"";position:absolute;top:50%;right:8px;transform:translateY(-50%);
            width:8px;height:8px;border-radius:50%;background:var(--accent-red);
            border:2px solid #330000;box-shadow:0 0 8px var(--accent-red);
            transition:all .4s ease;z-index:3;
        }
        .armor-toggle.on::before{
            background:var(--accent-green);border-color:#005500;
            box-shadow:0 0 10px var(--accent-green),0 0 20px rgba(0,255,65,0.15);
        }
        .toggle-lever{
            position:absolute;top:2px;left:2px;width:24px;height:20px;
            background:linear-gradient(180deg,#444,#222);border:2px solid #000;border-radius:4px;
            box-shadow:inset 1px 1px 0 #666,2px 2px 4px rgba(0,0,0,0.6);
            transition:left .3s cubic-bezier(.4,0,.2,1);z-index:2;
        }
        .toggle-lever::after{
            content:"";position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
            width:10px;height:1.5px;background:#111;
            box-shadow:0 -3px 0 #111,0 3px 0 #111;border-radius:1px;
        }
        .armor-toggle.on .toggle-lever{
            left:32px;background:linear-gradient(180deg,#555,#2a2a2a);
            box-shadow:inset 1px 1px 0 #777,2px 2px 4px rgba(0,0,0,0.6),0 0 6px rgba(0,255,65,0.12);
        }
        .toggle-labels{display:flex;justify-content:space-between;width:68px;margin-top:3px;padding:0 4px}
        .toggle-labels span{font-size:.42rem;font-weight:900;letter-spacing:1px;color:#333;transition:color .3s}
        .toggle-labels .lbl-on.active-lbl{color:var(--accent-green)}
        .toggle-labels .lbl-off.active-lbl{color:var(--accent-red)}
        .scan-mech{
            background:linear-gradient(145deg,#001a1a,#000a0a);color:var(--accent-cyan);
            border:3px solid #003333;padding:10px 24px;font-weight:900;cursor:pointer;
            box-shadow:3px 3px 0 #000,inset 1px 1px 0 #004444;
            text-transform:uppercase;font-family:'Courier New',Courier,monospace;transition:all .3s;
            -webkit-tap-highlight-color:transparent;min-width:80px;
            display:inline-flex;align-items:center;justify-content:center;
        }
        .scan-mech:hover{background:linear-gradient(145deg,#002a2a,#001515);border-color:var(--accent-cyan)}
        .scan-mech.active{
            background:linear-gradient(145deg,#002020,#001010);border-color:var(--accent-cyan);
            box-shadow:3px 3px 0 #000,0 0 18px rgba(0,229,255,0.12),inset 0 0 8px rgba(0,229,255,0.04);
            animation:scanPulse 2s ease-in-out infinite;
        }
        @keyframes scanPulse{
            0%,100%{box-shadow:3px 3px 0 #000,0 0 8px rgba(0,229,255,0.08)}
            50%{box-shadow:3px 3px 0 #000,0 0 20px rgba(0,229,255,0.2)}
        }
        .footer-text{color:#444;font-size:.62rem;white-space:nowrap;text-align:center}

        /* ===== RESPONSIVE ===== */
        @media(max-width:900px){
            nav{width:200px;padding:10px;gap:8px}
            .m-btn{padding:11px;font-size:.7rem;box-shadow:3px 3px 0 #000,inset 1px 1px 1px #444}
            .s-grid{grid-template-columns:1fr 1fr}
            .s-cell{padding:8px}.s-cell-val{font-size:.85rem}
            .s-header{font-size:.78rem;padding-bottom:8px;margin-bottom:10px}
        }
        @media(max-width:700px){
            body{height:auto;height:100dvh;overflow-y:auto;-webkit-overflow-scrolling:touch}
            .wrapper{flex-direction:column}
            nav{

<body>

    <!-- ===== UPPER SHELL: header + sidebar + main (shutdown overlay lives here) ===== -->

        <div class="wrapper">

            </nav>

            <main>
                <div id="main-screen" class="off">
                    <div class="scan-sweep" id="scan-sweep">
                        <div class="scan-sweep-glow"></div>
                        <div class="scan-sweep-line"></div>

    <!-- ===== FOOTER: always visible, z-index above everything ===== -->

                </div>
            </div>

    <script>
        /* ===== STATE ===== */
        var isPowerOn = false,
            isScanOn  = false,
            currentScreen = 'dash',
            netSpeed  = 0,
            cmdHistory = [],
            cmdHistoryIdx = -1,
            cmdBound = false;

        /* ===== SECURITY: Input sanitization ===== */
        function sanitizeInput(raw) {
            if (typeof raw !== 'string') return '';
            var c = raw.replace(/\0/g, '').replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '');
            if (/<[a-zA-Z\/!]/.test(c)) return '';
            if (/(?:script|eval|function|onclick|onerror|onload|javascript|data:text)/i.test(c)) return '';
            if (/(?:expression|behavior|binding|url\()/i.test(c)) return '';
            return c;
        }

        /* ===== SECURITY: Rate limiter ===== */
        var cmdTimestamps = [], CMD_RATE_LIMIT = 10, CMD_RATE_WINDOW = 1000, CMD_COOLDOWN_MS = 500;
        function isRateLimited() {
            var now = Date.now();
            while (cmdTimestamps.length > 0 && cmdTimestamps[0] < now - CMD_RATE_WINDOW) cmdTimestamps.shift();
            if (cmdTimestamps.length >= CMD_RATE_LIMIT) return true;
            cmdTimestamps.push(now);
            return false;
        }

        /* ===== SECURITY: URL allowlist ===== */
        var ALLOWED_ORIGINS = ['https://mohammad3230.github.io'];
        function isUrlAllowed(url) {
            if (typeof url !== 'string') return false;
            if (/^\.?\/?[^:]/.test(url) && !url.includes('://')) return true;
            try {
                var p = new URL(url, window.location.href);
                if (p.protocol !== 'https:') return false;
                for (var i = 0; i < ALLOWED_ORIGINS.length; i++) {
                    if (p.origin === ALLOWED_ORIGINS[i]) return true;
                }
            } catch (e) { return false; }
            return false;
        }

        /* ===== CMD OUTPUT HELPER ===== */
        function addCmdOutput(lines) {
            var el = document.getElementById('cmd-output');
            if (!el) return;
            for (var i = 0; i < lines.length; i++) {
                var d = document.createElement('div');
                d.className = 'cmd-out-line ' + (lines[i].c || 'cmd-out-info');
                d.textContent = lines[i].t;
                el.appendChild(d);
            }
            el.scrollTop = el.scrollHeight;
        }

        /* ===== BIND COMMAND INPUT (once) ===== */
        function bindCmdInput() {
            if (cmdBound) return;
            cmdBound = true;
            var input = document.getElementById('cmd-input');
            if (!input) return;

            input.addEventListener('keydown', function(e) {
                if (!isPowerOn) return;

                /* History arrows */
                if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (cmdHistory.length > 0 && cmdHistoryIdx < cmdHistory.length - 1) {
                        cmdHistoryIdx++;
                        input.value = cmdHistory[cmdHistory.length - 1 - cmdHistoryIdx];
                    }
                    return;
                }
                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (cmdHistoryIdx > 0) { cmdHistoryIdx--; input.value = cmdHistory[cmdHistory.length - 1 - cmdHistoryIdx]; }
                    else { cmdHistoryIdx = -1; input.value = ''; }
                    return;
                }

                if (e.key !== 'Enter') return;
                e.preventDefault();

                var raw = input.value.trim();
                input.value = '';
                if (!raw) return;

                /* Rate limit */
                if (isRateLimited()) {
                    input.classList.add('rate-limited');
                    addCmdOutput([{ t: 'RATE LIMIT: too many commands', c: 'cmd-out-err' }]);
                    setTimeout(function() { input.classList.remove('rate-limited'); }, CMD_COOLDOWN_MS);
                    return;
                }

                var cmd = sanitizeInput(raw);
                if (!cmd) { addCmdOutput([{ t: 'BLOCKED: invalid input', c: 'cmd-out-err' }]); return; }

                cmdHistory.push(cmd);
                if (cmdHistory.length > 50) cmdHistory.shift();
                cmdHistoryIdx = -1;

                addCmdOutput([{ t: 'AIO> ' + cmd, c: 'cmd-out-info' }]);

                var lc = cmd.toLowerCase();
                if (lc === 'help') {
                    addCmdOutput([
                        { t: '  help      - show commands', c: 'cmd-out-ok' },
                        { t: '  clear     - clear output', c: 'cmd-out-ok' },
                        { t: '  status    - system status', c: 'cmd-out-ok' },
                        { t: '  speed     - bandwidth test', c: 'cmd-out-ok' },
                        { t: '  scan      - toggle scan mode', c: 'cmd-out-ok' },
                        { t: '  dash      - load dashboard', c: 'cmd-out-ok' },
                        { t: '  logs      - load system log', c: 'cmd-out-ok' },
                        { t: '  poweroff  - shut down', c: 'cmd-out-ok' }
                    ]);
                } else if (lc === 'clear') {
                    document.getElementById('cmd-output').innerHTML = '';
                } else if (lc === 'status') {
                    addCmdOutput([
                        { t: '  Power:  ' + (isPowerOn ? 'ON' : 'OFF'), c: 'cmd-out-ok' },
                        { t: '  Scan:   ' + (isScanOn ? 'ACTIVE' : 'OFF'), c: isScanOn ? 'cmd-out-warn' : 'cmd-out-ok' },
                        { t: '  Speed:  ' + (netSpeed > 0 ? (netSpeed > 1000000 ? (netSpeed/1000000).toFixed(1)+' Mbps' : Math.round(netSpeed/1000)+' Kbps') : 'UNKNOWN'), c: 'cmd-out-info' },
                        { t: '  Screen: ' + currentScreen.toUpperCase(), c: 'cmd-out-info' }
                    ]);
                } else if (lc === 'speed') {
                    addCmdOutput([{ t: '  Running bandwidth test...', c: 'cmd-out-info' }]);
                    runSpeedTest();
                } else if (lc === 'scan') {
                    toggleScan();
                    addCmdOutput([{ t: '  Scan mode: ' + (isScanOn ? 'ACTIVE' : 'OFF'), c: isScanOn ? 'cmd-out-warn' : 'cmd-out-ok' }]);
                } else if (lc === 'dash') {
                    loadScreen('dash', document.querySelector('.m-btn[data-screen="dash"]'));
                    addCmdOutput([{ t: '  Loaded: DASHBOARD', c: 'cmd-out-ok' }]);
                } else if (lc === 'logs') {
                    loadScreen('logs', null);
                    addCmdOutput([{ t: '  Loaded: SYSTEM LOG', c: 'cmd-out-ok' }]);
                } else if (lc === 'poweroff') {
                    addCmdOutput([{ t: '  Shutting down...', c: 'cmd-out-err' }]);
                    setTimeout(togglePower, 600);
                } else {
                    addCmdOutput([{ t: '  Unknown command: ' + cmd, c: 'cmd-out-err' }]);
                }
            });
        }

        /* ===== SPEED TEST ===== */
        function runSpeedTest() {
            if (!isPowerOn) return;
            var img = new Image(), start = performance.now(), done = false, sz = 500000;
            img.onload = img.onerror = function() {
                if (done) return; done = true;
                var e = (performance.now() - start) / 1000;
                if (e < 0.1) e = 0.1;
                netSpeed = Math.round(sz * 8 / e);
                updateSignalBars();
            };
            setTimeout(function() { if (!done) { done = true; netSpeed = 0; updateSignalBars(); } }, 8000);
            img.src = 'https://speed.cloudflare.com/__down?bytes=' + sz + '&r=' + Date.now();
        }

        function updateSignalBars() {
            var bars = [document.getElementById('bar1'), document.getElementById('bar2'), document.getElementById('bar3'), document.getElementById('bar4')];
            bars.forEach(function(b, i) { b.className = 'sig-bar sig-bar-' + (i + 1); });
            if (!isPowerOn || netSpeed === 0) return;
            var m = netSpeed / 1000000, c;
            if (m >= 2) { c = 'good'; bars.forEach(function(b) { b.classList.add(c); }); }
            else if (netSpeed / 1000 >= 150) { c = 'average'; bars[0].classList.add(c); bars[1].classList.add(c); bars[2].classList.add(c); }
            else { c = 'low'; bars[0].classList.add(c); }
        }

        /* ===== SCAN MODE ===== */
        function toggleScan() {
            if (!isPowerOn) return;
            isScanOn = !isScanOn;
            var sw = document.getElementById('scan-sweep'), btn = document.getElementById('scan-btn');
            if (isScanOn) { sw.classList.add('active'); btn.classList.add('active'); btn.textContent = 'STOP SCAN'; }
            else { sw.classList.remove('active'); btn.classList.remove('active'); btn.textContent = 'SCAN'; }
        }

        /* ===== POWER TOGGLE ===== */
        function togglePower() {
            isPowerOn = !isPowerOn;

            var bar = document.getElementById('sys-light-bar'),
                st  = document.getElementById('status-text'),
                sd  = document.getElementById('shutdown-screen'),
                tg  = document.getElementById('power-toggle'),
                sc  = document.getElementById('main-screen'),
                ln  = document.querySelector('.lbl-on'),
                lf  = document.querySelector('.lbl-off'),
                bs  = document.querySelectorAll('.m-btn[data-screen]');

            if (isPowerOn) {
                /* --- POWER ON --- */
                bar.classList.add('on');
                st.textContent = 'SYSTEM: ACTIVE';
                st.classList.add('on');
                sd.classList.add('hidden');
                tg.classList.add('on');
                ln.classList.add('active-lbl');
                lf.classList.remove('active-lbl');
                sc.classList.remove('off');
                bs.forEach(function(b) { b.classList.remove('dead'); });

                /* Load dashboard immediately */
                currentScreen = 'dash';
                bs.forEach(function(b) { b.classList.remove('active'); });
                var dashBtn = document.querySelector('.m-btn[data-screen="dash"]');
                if (dashBtn) dashBtn.classList.add('active');
                document.getElementById('screen-content').innerHTML = screenData.dash();

                runSpeedTest();
                bindCmdInput();
            } else {
                /* --- POWER OFF --- */
                bar.classList.remove('on');
                st.textContent = 'SYSTEM: STANDBY';
                st.classList.remove('on');
                sd.classList.remove('hidden');
                tg.classList.remove('on');
                ln.classList.remove('active-lbl');
                lf.classList.add('active-lbl');
                sc.classList.add('off');
                document.getElementById('screen-content').innerHTML = '';
                document.getElementById('cmd-output').innerHTML = '';
                bs.forEach(function(b) { b.classList.remove('active'); b.classList.add('dead'); });
                netSpeed = 0;
                updateSignalBars();
                if (isScanOn) toggleScan();
                closeIframe();
            }
        }

        /* ===== IFRAME MANAGEMENT ===== */
        function openInScreen(url, title) {
            if (!isPowerOn) return;
            if (!isUrlAllowed(url)) {
                addCmdOutput([{ t: 'SECURITY: URL blocked — origin not in allowlist', c: 'cmd-out-err' }]);
                return;
            }
            var w = document.getElementById('iframe-wrap'),
                s = document.getElementById('screen-scroll'),
                f = document.getElementById('screen-iframe'),
                l = document.getElementById('iframe-loader');

            l.style.display = 'flex';
            l.innerHTML = '<div class="spinner"></div><span>CONNECTING...</span>';
            f.src = 'about:blank';
            s.style.display = 'none';
            w.classList.add('active');
            f.onload = function() { l.style.display = 'none'; };
            f.onerror = function() { l.innerHTML = '<span style="color:var(--accent-red)">CONNECTION FAILED</span>'; };
            f.src = url;
        }

        function closeIframe() {

        /* ===== SCREEN DATA ===== */
        var screenData = {

            currentScreen = id;
            document.querySelectorAll('.m-btn[data-screen]').forEach(function(b) { b.classList.remove('active'); });
            if (btn) btn.classList.add('active');
            if (screenData[id]) document.getElementById('screen-content').innerHTML = screenData[id]();
        }

        /* ===== CLOCK ===== */
        setInterval(function() {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString();
        }, 1000);

        /* ===== LIVE LOG FEED ===== */
        var logMsgs = [
            'Heartbeat signal received.','Node handshake completed.','Scanning frequency bands...',
            'Proxy rotation successful.','Data packet integrity verified.','Encryption key refreshed.',
            'Uplink stability: nominal.','Background sweep clean.','Channel noise within tolerance.',
            'Backup node synchronized.','Decrypting incoming block...','Frequency shift detected.',
            'Secure tunnel established.','Auth token rotated.'
        ];
        var logColors = ['var(--accent-green)','var(--accent-cyan)','var(--accent-amber)','var(--accent-blue)','var(--accent-lime)'];

        setInterval(function() {
            if (!isPowerOn || currentScreen !== 'logs') return;
            var el = document.getElementById('screen-log');
            if (!el) return;
            var t = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit' });
            var m = logMsgs[Math.floor(Math.random() * logMsgs.length)];
            var d = document.createElement('div');
            if (isScanOn) {
                d.style.color = 'var(--accent-cyan)'; d.style.fontWeight = '900';
                d.textContent = '[SCAN][' + t + '] DETECTED: ' + m;
            } else {
                d.style.color = logColors[Math.floor(Math.random() * logColors.length)];
                d.textContent = '[' + t + '] ' + m;
            }
            el.appendChild(d); el.scrollTop = el.scrollHeight;
            if (el.children.length > 50) el.removeChild(el.firstChild);
        }, 3000);

        /* ===== PERIODIC SPEED TEST ===== */
        setInterval(function() { if (isPowerOn) runSpeedTest(); }, 15000);

        /* ===== KEYBOARD POWER TOGGLE ===== */
        document.getElementById('power-toggle').addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePower(); }
        });
    </script>
</body>
</html>
