    <style>
        :root{--bg-color:#0d0d0d;--panel-bg:#1e1e1e;--accent-blue:#0084ff;--accent-red:#ff1a1a;--accent-amber:#ff9d00;--accent-green:#00ff41;--accent-yellow:#ffd000;--accent-cyan:#00e5ff;--accent-magenta:#ff00ff;--accent-lime:#b8ff00;--text-main:#c0c0c0;--metal-shine:linear-gradient(145deg,#2a2a2a,#111111)}

    <script>
        /* ================================================================
           SECURITY LAYER — runs before any application logic
           ================================================================ */

        /* [INJ-2] Input sanitization: strips control chars, null bytes,
           HTML/script tags, and non-printable characters.
           Returns empty string if input fails validation. */
        function sanitizeInput(raw) {
            if (typeof raw !== 'string') return '';
            /* Strip null bytes — prevents null byte injection in downstream */
            var cleaned = raw.replace(/\0/g, '');
            /* Remove control characters except space, tab, newline (U+000A) */
            cleaned = cleaned.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '');
            /* Reject if contains HTML tag-like patterns */
            if (/<[a-zA-Z\/!]/.test(cleaned)) return '';
            /* Reject if contains script/eval/function patterns */
            if (/(?:script|eval|function|onclick|onerror|onload|javascript|data:text)/i.test(cleaned)) return '';
            /* Reject if contains CSS expression patterns */
            if (/(?:expression|behavior|binding|url\()/i.test(cleaned)) return '';
            /* Length check already enforced by maxlength=100 on input */
            return cleaned;
        }

        /* [RATE-1] Command rate limiter: max 10 commands per second */
        var cmdTimestamps = [];
        var CMD_RATE_LIMIT = 10;
        var CMD_RATE_WINDOW = 1000;
        var CMD_COOLDOWN_MS = 500;

        function isRateLimited() {
            var now = Date.now();
            /* Remove timestamps outside the window */
            while (cmdTimestamps.length > 0 && cmdTimestamps[0] < now - CMD_RATE_WINDOW) {
                cmdTimestamps.shift();
            }
            if (cmdTimestamps.length >= CMD_RATE_LIMIT) return true;
            cmdTimestamps.push(now);
            return false;
        }

        /* [URL-1] URL allowlist for iframe loading.
           Only allow HTTPS URLs from trusted origins or relative paths. */
        var ALLOWED_ORIGINS = [
            'https://mohammad3230.github.io'
        ];

        function isUrlAllowed(url) {
            if (typeof url !== 'string') return false;
            /* Allow relative paths (starting with ./ or just filename) */
            if (/^\.?\/?[^:]/.test(url) && !url.includes('://')) return true;
            /* Check against allowed origins */
            try {
                var parsed = new URL(url, window.location.href);
                if (parsed.protocol !== 'https:') return false;
                for (var i = 0; i < ALLOWED_ORIGINS.length; i++) {
                    if (parsed.origin === ALLOWED_ORIGINS[i]) return true;
                }
            } catch (e) {
                /* Invalid URL */
                return false;
            }
            return false;
        }

        /* ================================================================
           APPLICATION STATE
           ================================================================ */
        var isPowerOn = false;
        var isScanOn = false;
        var currentScreen = 'dash';
        var netSpeed = 0;
        var cmdHistory = [];
        var cmdHistoryIdx = -1;
        var bootTime = performance.now();
        var cmdCooldown = false;

        /* ================================================================
           SPEED TEST — real bandwidth measurement via Cloudflare
           ================================================================ */
        function runSpeedTest() {
            if (!isPowerOn) return;
            var img = new Image();
            var start = performance.now();
            var done = false;
            var sz = 500000;
            img.onload = img.onerror = function () {
                if (done) return;
                done = true;
                var elapsed = (performance.now() - start) / 1000;
                if (elapsed < 0.1) elapsed = 0.1;
                netSpeed = Math.round((sz * 8) / elapsed);
                updateSignalBars();
            };
            /* Timeout prevents hung requests from blocking state */
            setTimeout(function () {
                if (!done) { done = true; netSpeed = 0; updateSignalBars(); }
            }, 8000);
            /* Cache-bust to prevent browser cache from skewing results */
            img.src = 'https://speed.cloudflare.com/__down?bytes=' + sz + '&r=' + Date.now();
        }

        function updateSignalBars() {
            var bars = [
                document.getElementById('bar1'),
                document.getElementById('bar2'),
                document.getElementById('bar3'),
                document.getElementById('bar4')
            ];
            bars.forEach(function (b) { b.className = 'sig-bar sig-bar-' + (bars.indexOf(b) + 1); });
            if (!isPowerOn || netSpeed === 0) return;
            var k = netSpeed / 1000, m = netSpeed / 1000000, c;
            if (m >= 2) { c = 'good'; bars[0].classList.add(c); bars[1].classList.add(c); bars[2].classList.add(c); bars[3].classList.add(c); }
            else if (k >= 150) { c = 'average'; bars[0].classList.add(c); bars[1].classList.add(c); bars[2].classList.add(c); }
            else { c = 'low'; bars[0].classList.add(c); }
        }

        /* ================================================================
           SCAN MODE — active monitoring sweep
           ================================================================ */
        function toggleScan() {
            if (!isPowerOn) return;
            isScanOn = !isScanOn;
            var sweep = document.getElementById('scan-sweep');
            var btn = document.getElementById('scan-btn');
            if (isScanOn) { sweep.classList.add('active'); btn.classList.add('active'); btn.textContent = 'STOP SCAN'; }
            else { sweep.classList.remove('active'); btn.classList.remove('active'); btn.textContent = 'SCAN'; }
        }

        /* ================================================================
           POWER TOGGLE
           ================================================================ */
        function togglePower() {
            isPowerOn = !isPowerOn;
            var bar = document.getElementById('sys-light-bar'),
                st = document.getElementById('status-text'),
                sd = document.getElementById('shutdown-screen'),
                tg = document.getElementById('power-toggle'),
                sc = document.getElementById('main-screen'),
                ln = document.querySelector('.lbl-on'),
                lf = document.querySelector('.lbl-off'),
                bs = document.querySelectorAll('.m-btn[data-screen]');

            if (isPowerOn) {
                bar.style.background = 'var(--accent-green)';
                bar.style.boxShadow = '0 0 30px var(--accent-green)';
                st.innerText = 'SYSTEM: ACTIVE';
                st.style.color = 'var(--accent-green)';
                sd.style.display = 'none';
                tg.classList.add('on');
                ln.classList.add('active-lbl');
                lf.classList.remove('active-lbl');
                sc.classList.remove('off');
                bs.forEach(function (b) { b.classList.remove('dead'); });
                loadScreen(currentScreen, document.querySelector('.m-btn[data-screen="' + currentScreen + '"]'));
                runSpeedTest();
                bindCmdInput();
            } else {
                bar.style.background = 'var(--accent-red)';
                bar.style.boxShadow = '0 0 20px var(--accent-red)';
                st.innerText = 'SYSTEM: STANDBY';
                st.style.color = 'var(--accent-red)';
                sd.style.display = 'block';
                tg.classList.remove('on');
                ln.classList.remove('active-lbl');
                lf.classList.add('active-lbl');
                sc.classList.add('off');
                document.getElementById('screen-content').innerHTML = '';
                bs.forEach(function (b) { b.classList.remove('active'); b.classList.add('dead'); });
                netSpeed = 0;
                updateSignalBars();
                if (isScanOn) toggleScan();
                closeIframe();
            }
        }

        /* ================================================================
           IFRAME MANAGEMENT
           [XSS-3] [FS-1] [FS-2] [URL-1] — all security checks applied
           ================================================================ */
        function openInScreen(url, title) {
            if (!isPowerOn) return;
            /* [URL-1] Validate URL against allowlist before loading */
            if (!isUrlAllowed(url)) {
                addCmdOutput([{ t: 'SECURITY: URL blocked — origin not in allowlist', c: 'cmd-out-err' }]);
                return;
            }
            var w = document.getElementById('iframe-wrap'),
                s = document.getElementById('screen-scroll'),
                f = document.getElementById('screen-iframe'),
                l = document.getElementById('iframe-loader');
            document.getElementById('iframe-title').textContent = title || 'LOADING...';
            l.style.display = 'flex';
            f.src = 'about:blank'; /* Clear previous content first */
            s.style.display = 'none';
            w.classList.add('active');
            f.onload = function () { l.style.display = 'none'; };
            f.onerror = function () { l.innerHTML = '<span style="color:var(--accent-red)">CONNECTION FAILED</span>'; };
            /* Set src after handlers to prevent race conditions */
            f.src = url;
        }

        function closeIframe() {
            document.getElementById('iframe-wrap').classList.remove('active');
            document.getElementById('screen-iframe').src = 'about:blank';
            document.getElementById('screen-scroll').style.display = 'block';
        }

        /* [FS-1] Focus steal protection: if iframe gains focus, immediately
           return it to the command input. Prevents loaded content from
           trapping keyboard focus or simulating user input. */
        document.getElementById('screen-iframe').addEventListener('focus', function () {
            if (isPowerOn) {
                window.focus();
                var cmdInput = document.getElementById('cmd-input');
                if (cmdInput) cmdInput.focus();
            }
        }, true);

        /* ================================================================
           COMMAND SYSTEM
           [PP-1] commandMap frozen to prevent prototype pollution
           [INJ-2] All user input sanitized before processing
           [RATE-1] Rate limiting enforced
           ================================================================ */
        var commandMap = {
            help: function () {
                return [
                    { t: 'AVAILABLE COMMANDS:', c: 'cmd-out-cyan' },
                    { t: '  help          Show this list', c: 'cmd-out-dim' },
                    { t: '  status        System status overview', c: 'cmd-out-dim' },
                    { t: '  sysinfo       Hardware & software info', c: 'cmd-out-dim' },
                    { t: '  netstat       Network statistics', c: 'cmd-out-dim' },
                    { t: '  ping          Test connection latency', c: 'cmd-out-dim' },
                    { t: '  speed         Run bandwidth test', c: 'cmd-out-dim' },
                    { t: '  freq          Show radio frequency', c: 'cmd-out-dim' },
                    { t: '  proxy         Proxy chain status', c: 'cmd-out-dim' },
                    { t: '  encrypt       Encryption status', c: 'cmd-out-dim' },
                    { t: '  clear         Clear terminal output', c: 'cmd-out-dim' },
                    { t: '  uptime        System uptime', c: 'cmd-out-dim' },
                    { t: '  whoami        Current user identity', c: 'cmd-out-dim' },
                    { t: '  scan          Toggle scan mode', c: 'cmd-out-dim' },
                    { t: '  scanstat      Scan detection stats', c: 'cmd-out-dim' },

                ];
            },
            status: function () {
                var u = navigator.onLine ? 'ONLINE' : 'OFFLINE', uc = navigator.onLine ? 'cmd-out-ok' : 'cmd-out-err',
                    sp = netSpeed === 0 ? 'SCANNING...' : (netSpeed >= 1e6 ? (netSpeed / 1e6).toFixed(1) + ' Mbps' : Math.round(netSpeed / 1e3) + ' Kbps');
                return [
                    { t: 'SYSTEM STATUS REPORT', c: 'cmd-out-cyan' },
                    { t: '  Power:       ACTIVE', c: 'cmd-out-ok' },
                    { t: '  Uplink:      ' + u, c: uc },
                    { t: '  Bandwidth:   ' + sp, c: 'cmd-out-dim' },

                    { t: '  Proxy:       3 NODES', c: 'cmd-out-dim' }
                ];
            },
            sysinfo: function () {
                /* [SE-1] Only expose data already available to any browser extension */
                var ua = navigator.userAgent, pl = navigator.platform || 'Unknown',
                    la = navigator.language || 'Unknown', co = navigator.hardwareConcurrency || '?',
                    me = navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'N/A';
                return [
                    { t: 'SYSTEM INFORMATION', c: 'cmd-out-cyan' },
                    { t: '  Platform:    ' + pl, c: 'cmd-out-dim' },
                    { t: '  Cores:       ' + co, c: 'cmd-out-dim' },
                    { t: '  Memory:      ' + me, c: 'cmd-out-dim' },
                    { t: '  Language:    ' + la, c: 'cmd-out-dim' },
                    { t: '  Screen:      ' + screen.width + 'x' + screen.height, c: 'cmd-out-dim' },
                    { t: '  Color Depth: ' + screen.colorDepth + ' bit', c: 'cmd-out-dim' },
                    { t: '  User Agent:', c: 'cmd-out-dim' },
                    { t: '  ' + ua.substring(0, 70), c: 'cmd-out-dim' },
                    { t: '  ' + ua.substring(70), c: 'cmd-out-dim' }
                ];
            },
            netstat: function () {
                var sp = netSpeed === 0 ? 'SCANNING...' : (netSpeed >= 1e6 ? (netSpeed / 1e6).toFixed(1) + ' Mbps' : Math.round(netSpeed / 1e3) + ' Kbps'),
                    u = navigator.onLine ? 'ONLINE' : 'OFFLINE', uc = navigator.onLine ? 'cmd-out-ok' : 'cmd-out-err',
                    cn = navigator.connection ? navigator.connection : null,

                return [
                    { t: 'NETWORK STATISTICS', c: 'cmd-out-cyan' },
                    { t: '  Status:       ' + u, c: uc },
                    { t: '  Measured:     ' + sp, c: 'cmd-out-dim' },
                    { t: '  Eff. Type:    ' + et, c: 'cmd-out-dim' },
                    { t: '  Est. RTT:     ' + rt, c: 'cmd-out-dim' },
                    { t: '  Est. Down:    ' + dl, c: 'cmd-out-dim' },
                    { t: '  Protocol:     TLS 1.3', c: 'cmd-out-dim' },
                    { t: '  DNS:          ENCRYPTED', c: 'cmd-out-ok' },
                    { t: '  Proxy:        3 NODES ACTIVE', c: 'cmd-out-dim' }
                ];
            },
            ping: function () {
                if (!navigator.onLine) return [{ t: 'PING FAILED: NO CONNECTION', c: 'cmd-out-err' }];
                var l = Math.floor(Math.random() * 80 + 10), j = Math.floor(Math.random() * 15);
                return [
                    { t: 'PING gateway.aio-core.net', c: 'cmd-out-dim' },
                    { t: '  Reply: time=' + l + 'ms TTL=64', c: 'cmd-out-ok' },
                    { t: '  Reply: time=' + (l + j) + 'ms TTL=64', c: 'cmd-out-ok' },
                    { t: '  Reply: time=' + (l - Math.floor(j / 2)) + 'ms TTL=64', c: 'cmd-out-ok' },
                    { t: '  Reply: time=' + (l + Math.floor(j / 3)) + 'ms TTL=64', c: 'cmd-out-ok' },
                    { t: '  --- 4 sent, 4 received ---', c: 'cmd-out-dim' },
                    { t: '  Avg: ' + l + 'ms | Jitter: ' + j + 'ms', c: 'cmd-out-dim' }
                ];
            },
            speed: function () { runSpeedTest(); return [{ t: 'BANDWIDTH TEST INITIATED...', c: 'cmd-out-warn' }, { t: 'Results will update signal bars.', c: 'cmd-out-dim' }]; },
            freq: function () { var fs = ['440.700 MHz', '460.025 MHz', '460.150 MHz', '465.900 MHz', '154.825 MHz'], a = fs[Math.floor(Math.random() * fs.length)]; return [{ t: 'RADIO FREQUENCY MODULE', c: 'cmd-out-cyan' }, { t: '  Active Freq:  ' + a, c: 'cmd-out-ok' }, { t: '  Band:         VHF/UHF', c: 'cmd-out-dim' }, { t: '  Modulation:   FM', c: 'cmd-out-dim' }, { t: '  Power:        50W', c: 'cmd-out-dim' }, { t: '  Squelch:      CLOSED', c: 'cmd-out-dim' }]; },
            proxy: function () { var n = []; for (var i = 1; i <= 3; i++) { var la = (Math.random() * 180 - 90).toFixed(2), lo = (Math.random() * 360 - 180).toFixed(2), ms = Math.floor(Math.random() * 200 + 30); n.push({ t: '  Node ' + i + ': ' + la + ', ' + lo + ' [' + ms + 'ms]', c: 'cmd-out-ok' }); } return [{ t: 'PROXY CHAIN STATUS', c: 'cmd-out-cyan' }].concat(n).concat([{ t: '  Chain integrity: VERIFIED', c: 'cmd-out-ok' }]); },
            encrypt: function () { return [{ t: 'ENCRYPTION MODULE', c: 'cmd-out-cyan' }, { t: '  Algorithm:    AES-256-GCM', c: 'cmd-out-dim' }, { t: '  Key Length:   256 bit', c: 'cmd-out-dim' }, { t: '  Key Status:   ' + (Math.random() > 0.1 ? 'ROTATED' : 'ROTATING...'), c: 'cmd-out-ok' }, { t: '  Session:      ACTIVE', c: 'cmd-out-ok' }, { t: '  Last Rotate:  ' + new Date().toLocaleTimeString(), c: 'cmd-out-dim' }, { t: '  Forward Sec:  YES', c: 'cmd-out-dim' }]; },
            clear: function () { return 'CLEAR'; },
            uptime: function () { var s = Math.floor((performance.now() - bootTime) / 1000), h = Math.floor(s / 3600); s %= 3600; var m = Math.floor(s / 60); s %= 60; return [{ t: 'SYSTEM UPTIME', c: 'cmd-out-cyan' }, { t: '  ' + String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0'), c: 'cmd-out-dim' }]; },
            whoami: function () { return [{ t: 'USER: operator@aio-core', c: 'cmd-out-ok' }, { t: '  Group:    admin', c: 'cmd-out-dim' }, { t: '  Session:  encrypted', c: 'cmd-out-dim' }, { t: '  Clearance: LEVEL 3', c: 'cmd-out-warn' }]; },
            scan: function () { toggleScan(); return [{ t: 'SCAN MODE: ' + (isScanOn ? 'ENGAGED' : 'DISABLED'), c: isScanOn ? 'cmd-out-cyan' : 'cmd-out-dim' }, { t: isScanOn ? '  Sweeping all data channels...' : '  Scan halted.', c: 'cmd-out-dim' }]; },
            scanstat: function () { return [{ t: 'SCAN DETECTION STATS', c: 'cmd-out-cyan' }, { t: '  Mode:         ' + (isScanOn ? 'ACTIVE' : 'OFF'), c: isScanOn ? 'cmd-out-ok' : 'cmd-out-dim' }, { t: '  Detections:   ' + (isScanOn ? Math.floor(Math.random() * 20 + 5) : 0), c: isScanOn ? 'cmd-out-cyan' : 'cmd-out-dim' }, { t: '  Anomalies:    ' + (isScanOn ? Math.floor(Math.random() * 3) : 0), c: isScanOn ? 'cmd-out-warn' : 'cmd-out-dim' }, { t: '  Last Sweep:   ' + (isScanOn ? new Date().toLocaleTimeString() : 'N/A'), c: 'cmd-out-dim' }]; },
            trace: function () { var h = []; for (var i = 1; i <= 6; i++) { var ms = Math.floor(Math.random() * 100 + i * 10), ip = '10.' + Math.floor(Math.random() * 255) + '.' + Math.floor(Math.random() * 255) + '.' + i; h.push({ t: '  Hop ' + i + ': ' + ip + ' [' + ms + 'ms]', c: 'cmd-out-dim' }); } h.push({ t: '  Destination reached.', c: 'cmd-out-ok' }); return [{ t: 'TRACEROUTE: gateway.aio-core.net', c: 'cmd-out-cyan' }].concat(h); },
            decrypt: function () { var p = Math.floor(Math.random() * 100), ls = [{ t: 'DECRYPTION MODULE v2.1', c: 'cmd-out-cyan' }, { t: '  Loading cipher block...', c: 'cmd-out-dim' }, { t: '  Key exchange: COMPLETE', c: 'cmd-out-ok' }, { t: '  Block size: 128 bit', c: 'cmd-out-dim' }, { t: '  Progress: ' + p + '%', c: p > 80 ? 'cmd-out-ok' : 'cmd-out-warn' }, { t: '  Status: ' + (p > 90 ? 'DECRYPTED' : 'PROCESSING...'), c: p > 90 ? 'cmd-out-ok' : 'cmd-out-warn' }]; if (p > 90) ls.push({ t: '  Output: [REDACTED - CLEARANCE 4 REQUIRED]', c: 'cmd-out-err' }); return ls; },
            logout: function () { setTimeout(function () { if (isPowerOn) togglePower(); }, 300); return [{ t: 'POWERING DOWN...', c: 'cmd-out-warn' }, { t: 'GOODBYE.', c: 'cmd-out-dim' }]; }
        };
        /* [PP-1] Freeze commandMap to prevent prototype pollution attacks */
        Object.freeze(commandMap);

        /* [XSS-1] [INJ-2] Command execution — sanitized input, textContent only display */
        function executeCommand(raw) {
            var sanitized = sanitizeInput(raw);
            if (sanitized === '') return; /* Silently reject bad input */

            var inp = sanitized.trim().toLowerCase();
            if (inp.length === 0) return;

            cmdHistory.unshift(sanitized.trim());
            if (cmdHistory.length > 50) cmdHistory.pop();
            cmdHistoryIdx = -1;

            /* [RATE-1] Enforce rate limit */
            if (isRateLimited()) {
                addCmdOutput([{ t: 'RATE LIMITED: too many commands', c: 'cmd-out-err' }]);
                /* Visual cooldown feedback on input */
                var ci = document.getElementById('cmd-input');
                if (ci) {
                    ci.classList.add('rate-limited');
                    cmdCooldown = true;
                    setTimeout(function () {
                        ci.classList.remove('rate-limited');
                        cmdCooldown = false;
                    }, CMD_COOLDOWN_MS);
                }
                return;
            }

            /* [XSS-1] All output uses textContent — never innerHTML with user data */
            addCmdOutput([{ t: '> ' + sanitized.trim(), c: 'cmd-out-cmd' }]);

            var handler = commandMap[inp];
            if (!handler) {
                addCmdOutput([{ t: "  UNKNOWN: '" + inp + "' — type 'help'", c: 'cmd-out-err' }]);
            } else if (handler === 'CLEAR') {
                document.getElementById('cmd-output').innerHTML = '';
            } else {
                try {
                    var lines = handler();
                    if (Array.isArray(lines)) {
                        addCmdOutput(lines);
                    }
                } catch (e) {
                    /* Error boundary: prevent command handler crash from breaking UI */
                    addCmdOutput([{ t: '  ERROR: Command execution failed', c: 'cmd-out-err' }]);
                }
            }
        }

        /* [XSS-1] All output through textContent — no innerHTML with user data */
        function addCmdOutput(lines) {
            var out = document.getElementById('cmd-output');
            if (!out) return;
            lines.forEach(function (l) {
                var d = document.createElement('div');
                d.className = 'cmd-out-line ' + (l.c || 'cmd-out-dim');
                d.textContent = l.t;
                out.appendChild(d);
            });
            out.scrollTop = out.scrollHeight;
        }

        function bindCmdInput() {
            var inp = document.getElementById('cmd-input');
            if (!inp) return;
            /* Replace node to clear any stale event listeners (defense-in-depth) */
            var newInp = inp.parentNode.replaceChild(inp.cloneNode(true), inp);
            newInp.focus();
            newInp.onkeydown = function (e) {
                /* Reject input during cooldown */
                if (cmdCooldown) { e.preventDefault(); return; }
                if (e.key === 'Enter') { e.preventDefault(); executeCommand(newInp.value); newInp.value = ''; }
                else if (e.key === 'ArrowUp') { e.preventDefault(); if (cmdHistory.length > 0 && cmdHistoryIdx < cmdHistory.length - 1) { cmdHistoryIdx++; newInp.value = cmdHistory[cmdHistoryIdx]; } }
                else if (e.key === 'ArrowDown') { e.preventDefault(); if (cmdHistoryIdx > 0) { cmdHistoryIdx--; newInp.value = cmdHistory[cmdHistoryIdx]; } else { cmdHistoryIdx = -1; newInp.value = ''; } }
                /* Block Tab from leaving the input — prevents focus-stealing attacks */
                else if (e.key === 'Tab') { e.preventDefault(); }
            };
        }
